simulation:
  name: 095_bangaon_uttar_2024_ls_targeted_v4
  description: "v3 sim — A1/A2/A3/B4 active. Tag-match targeting; runs Jan 2020 → 20 May 2024 (Bangaon LS Phase-5 polling day). Compares to 2024 LS PC-level proxy."
ac_id: 095_bangaon_uttar
input:
  persona_set: local_qwen_n100_v4
clock:
  start_date: '2020-01-01'
  end_date: '2024-05-20'
  tick_unit: month
  tick_size: 1
  reflection_every_n_ticks: 6
targeting:
  strategy: tag_match
  config: {}
update:
  style: park_minimal
reflection:
  enabled: true
  every_n_ticks: 6
  compression_target_tokens: 200
intention_probe:
  at_ticks: [12, 24, 36, 48]    # ~Dec 2020, Dec 2021, Dec 2022, Dec 2023
llm:
  provider: openai
  model: Qwen/Qwen3.5-9B
  base_url: http://localhost:30000/v1
  api_key: EMPTY
  reasoning: null
  temperature: 0.7
  max_tokens: 4000
  cache_system_prompt: true
execution:
  async: true
  max_concurrent_personas: 100
output:
  runs_dir: runs
  save_raw_responses: true
  save_feeds_audit: true
election_context:
  ac_name: Bangaon Uttar (LS-segment of Bangaon PC)
  poll_date_human: 20 May 2024
  election_label: 2024 Indian Lok Sabha Election (Bangaon PC, Phase 5)
  candidates:
    BJP:
      name: Shantanu Thakur
      note: incumbent BJP MP from Bangaon LS, Matua
    AITC:
      name: Biswajit Das
      note: TMC challenger, replaces Mamatabala Thakur
    LF:
      name: Pradip Biswas (CPI(M))
    INC:
      name: "—"
    Other:
      name: Other / NOTA
ground_truth:
  BJP: 50.2
  AITC: 45.3
  LF: 3.4
  INC: 0.5
  Other: 0.6
