- slug: covid_delta_tea_garden_death_2021
  date: '2021-05-20'
  temporal: episodic
  scope: state
  intensity: 3
  headline: COVID Delta wave hits; tea-garden labour lines in Kalchini report deaths
    and overcrowded sick bays
  summary: 'The COVID Delta wave in May-June 2021 struck North Bengal''s tea-garden

    communities hard. Labour lines in Kalchini block — overcrowded and with

    minimal ventilation — became hotspots. Garden sick bays lacked COVID-

    specific protocols and PPE. Deaths of workers were under-reported as

    garden managements preferred to classify them as natural deaths to avoid

    compensation liability. The wave deepened community distrust of both

    management and the state''s healthcare infrastructure.

    '
