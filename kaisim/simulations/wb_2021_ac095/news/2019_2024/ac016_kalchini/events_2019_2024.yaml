- slug: cyclone_amphan_state_disaster_resources_diverted
  date: '2020-05-20'
  temporal: episodic
  scope: state
  intensity: 3
  headline: 'Cyclone Amphan: catastrophic for coastal WB; North Bengal and Dooars
    receive minimal relief attention'
  summary: 'Super Cyclone Amphan caused over ₹1 trillion damage across coastal WB.

    Alipurduar and the Dooars were peripheral to the disaster track but

    experienced heavy rainfall. State disaster response was overwhelmed by

    South Bengal needs. Kalchini''s tea-garden workers — already COVID-impacted —

    found minimal state attention in mid-2020, sharpening North Bengal''s

    sense of geographic neglect by the TMC government.

    '
