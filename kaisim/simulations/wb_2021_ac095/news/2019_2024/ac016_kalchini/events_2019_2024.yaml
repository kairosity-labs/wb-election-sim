- slug: kalchini_tea_estate_closure_2019
  date: '2019-02-08'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Kalchini Tea Estate shut; ~2,003 workers on FAWLI subsistence at Rs 1,500/month
  summary: 'Kalchini Tea Estate''s management announced closure, leaving over 2,000

    workers without wages. Workers enrolled under FAWLI (Financial Assistance

    for Workers of Lockout Industries) at Rs 1,500/month — far below the

    Rs 202 daily wage. The garden remained closed through much of 2019 and

    into 2020, creating deep economic distress in the constituency that

    directly shaped the anti-TMC vote in 2021.

    '
