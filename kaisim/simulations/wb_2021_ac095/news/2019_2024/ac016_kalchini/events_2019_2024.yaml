- slug: tea_wage_hike_rs202_to_rs232_jan2022
  date: '2022-06-10'
  temporal: episodic
  scope: state
  intensity: 4
  headline: 'WB Labour Commissioner issues interim hike: tea wage rises to Rs 232/day
    from January 2022'
  summary: 'Following a tripartite meeting at Siliguri''s Shramik Bhawan, the WB

    Labour Commissioner notified an interim wage hike from Rs 202 to Rs 232

    per day for tea garden workers, effective 1 January 2022, with arrears

    in two installments by July 2022. The hike was welcomed in Kalchini

    labour lines but fell short of union demands of Rs 351+. It was framed

    as an interim measure pending finalisation of a statutory minimum wage

    under the Minimum Wages Act.

    '
