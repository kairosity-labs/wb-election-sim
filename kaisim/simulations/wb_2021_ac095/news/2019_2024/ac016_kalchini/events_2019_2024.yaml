- slug: ram_mandir_ayodhya_inauguration_jan2024
  date: '2024-01-22'
  temporal: episodic
  scope: national
  intensity: 4
  headline: Ram Mandir consecrated in Ayodhya; BJP mobilises Dooars tribal vote but
    Adivasi Sengel Abhiyan dissents
  summary: 'The consecration of the Ram Mandir in Ayodhya on 22 January 2024 was a

    major BJP mobilisation moment. BJP held celebrations in Kalchini block.

    However, the Adivasi Sengel Abhiyan (ASA) — an independent tribal

    organisation with influence in the Dooars — called for "No Vote to BJP"

    over the Sarna code issue, arguing BJP''s Hindutva framing conflates

    tribal spirituality with Hindu identity. The Ram Mandir''s impact in

    Kalchini was thus mixed, rather than the clean BJP boost seen in some

    other tribal belts.

    '
