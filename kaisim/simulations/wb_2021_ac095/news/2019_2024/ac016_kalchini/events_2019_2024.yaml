- slug: anandadhara_shg_push_alipurduar_teabelt
  date: '2022-03-15'
  temporal: episodic
  scope: district
  intensity: 3
  headline: Alipurduar district administration pushes Anandadhara SHG expansion into
    tea-belt labour lines
  summary: 'District administration in Alipurduar reported 26,202 active Anandadhara

    (WBSRLM) self-help groups with 2.65 lakh women members, and a targeted

    drive to reach the estimated two lakh tea-garden women still not connected

    to any SHG. In Kalchini block, SHG membership provides women with

    revolving credit of Rs 30,000 and links to state welfare entitlements.

    Garden managements have at times obstructed SHG meetings in labour

    quarters, creating friction with state welfare delivery.

    '
