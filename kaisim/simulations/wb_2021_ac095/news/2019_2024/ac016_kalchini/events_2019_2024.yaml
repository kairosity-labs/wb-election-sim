- slug: mgnrega_funds_blocked_central_government
  date: '2022-03-09'
  temporal: chronic
  scope: national
  intensity: 4
  headline: Centre stops MGNREGA funds to WB from March 2022; tea-belt workers lose
    supplementary income
  summary: 'The Union government stopped MGNREGA releases to West Bengal from 9 March

    2022, citing non-compliance under Section 27, resulting in Rs 5,583 crore

    in unpaid dues (including Rs 2,770 crore in pending wages) by August 2023.

    In Kalchini block, MGNREGA had provided a supplementary income for tea-

    garden households during lean agricultural periods. The fund blockage

    removed this buffer and became a major TMC political grievance, with Mamata

    demanding release or Centre "vacating the chair."

    '
