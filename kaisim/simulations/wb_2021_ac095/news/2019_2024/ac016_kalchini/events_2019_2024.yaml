  headline: WB SSC teacher recruitment scam exposed; Calcutta HC orders CBI probe
    into 25,000+ appointments
  summary: 'The West Bengal School Service Commission''s 2016 teacher recruitment

    process was exposed as deeply fraudulent: OMR tampering, inflated merit

    lists, illegal appointments by bribe (Rs 15-20 lakh each). The Calcutta

    HC ordered CBI investigation. In school-age-household families across

    Kalchini''s tea belt, the scam undermined faith in state institutions —

    especially among families who had invested in children''s education as an

    escape from garden labour.

