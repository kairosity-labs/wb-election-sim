- slug: lakshmir_bhandar_st_women_tea_belt
  date: '2021-04-15'
  temporal: episodic
  scope: state
  intensity: 4
  headline: 'Lakshmir Bhandar launched: Rs 1,200/month for ST women — key beneficiaries
    in Kalchini tea belt'
  summary: 'Lakshmir Bhandar launched by the TMC government in April 2021 provides

    Rs 1,200/month to ST women (and Rs 1,000 to general category women). For

    Oraon, Munda, and Santali women in Kalchini''s tea-garden labour lines —

    classified as ST — the direct cash transfer supplements the daily wage.

    Duare Sarkar camps in Kalchini block used Lakshmir Bhandar registration

    drives in pre-election weeks as a mobilisation tool. By 2024, crores of

    women across WB are enrolled, making it the single most politically

    salient TMC welfare scheme.

    '
