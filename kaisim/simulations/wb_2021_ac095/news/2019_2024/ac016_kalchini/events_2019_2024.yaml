  date: '2021-07-20'
  temporal: episodic
  scope: state
  intensity: 3
  headline: John Barla raises demand to carve out North Bengal as Union Territory;
    TMC accuses BJP of dividing state
  summary: 'Newly-appointed Union Minister John Barla, along with some BJP MLAs,

    raised the demand that northern WB districts (including Alipurduar) be

    carved out as a Union Territory. The demand was widely covered and triggered

    a sharp TMC response, with Mamata Banerjee accusing BJP of trying to

    divide Bengal. In Kalchini, tribal worker communities were divided: some

    saw the UT demand as a path to direct central investment, others feared

    loss of state welfare schemes.

    '
