  headline: WB Panchayat 2023 elections marred by violence; 55 dead statewide; North
    Bengal TMC dominates results
  summary: 'West Bengal panchayat elections on 8 July 2023 were marked by widespread

    violence (55 deaths statewide between 8 June and 16 July). TMC won around

    35,000 gram panchayat seats against BJP''s ~10,000. In Alipurduar district,

    TMC consolidated panchayat control over BJP-held territory from 2021,

    with reported booth-capture incidents in Kalchini block. The violent

    character of the poll reinforced both opposition claims of TMC

    authoritarian control and voter insecurity.

    '
