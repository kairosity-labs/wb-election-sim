- slug: caa_passed_parliament_dooars_anxiety
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: CAA passed; tribal Dooars workers feel NRC anxiety even though CAA does
    not target them
  summary: 'The Citizenship Amendment Act''s passage deepened anxieties in Kalchini,

    not because tribal Hindu workers are directly threatened under CAA but

    because NRC-plus-CAA was perceived as a future documentation dragnet.

    Workers fear that an NRC for WB (though not implemented) would expose the

    documentation gaps of second-generation plantation migrants. Mamata''s

    outright opposition to CAA provided some reassurance.

    '
