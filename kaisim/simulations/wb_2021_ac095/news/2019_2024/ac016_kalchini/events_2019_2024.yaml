  date: '2023-02-17'
  temporal: episodic
  scope: state
  intensity: 4
  headline: WB Assembly passes motion to recognise Sarna and Sari tribal religions;
    BJP MLA Manoj Tigga opposes
  summary: 'The West Bengal Legislative Assembly passed a motion on 17 February 2023

    seeking recognition of Sarna and Sari as distinct religions in the census.

    BJP MLA and future Alipurduar MP Manoj Tigga opposed the motion, calling

    it politically motivated. In Kalchini, Oraon, Munda, and Santali

    communities — for whom Sarna identity is central — widely supported the

    motion. TMC used BJP''s opposition to Sarna recognition to chip at tribal

    solidarity with BJP on cultural-identity grounds.

