- slug: tea_garden_pf_esi_non_payment_chronic
  date: '2019-09-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Chronic PF/ESI non-payment by Alipurduar tea gardens — workers have no
    social safety net
  summary: 'Widespread non-deposit of PF contributions by garden managements in

    Alipurduar district is documented in court filings and media reports.

    The Jalpaiguri regional PF office filed FIRs against 36 garden authorities

    over five years; enforcement was slow. ESI coverage is absent for most

    Dooars workers, meaning illness triggers debt and out-migration. Chronic

    PF/ESI failure is a persistent grievance in Kalchini''s labour lines.

    '
