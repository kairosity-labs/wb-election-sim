- slug: kalchini_ae_2021_bishal_lama_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Bishal Lama (BJP) wins Kalchini AC-16 by 28,576 votes — one of North Bengal's
    largest margins
  summary: 'BJP''s Bishal Lama won Kalchini (ST) with 1,03,104 votes (53% share),

    defeating TMC''s Pasang Lama by 28,576 votes. North Bengal gave BJP 31

    of 54 seats; Alipurduar district was a clean BJP sweep. John Barla''s

    elevation as Union Minister of State immediately after the election

    signalled BJP''s intent to consolidate the tribal tea-belt vote through

    institutional positioning. The TMC''s failure to convert Duare Sarkar

    momentum into votes in Kalchini exposed the depth of anti-incumbency.

    '
