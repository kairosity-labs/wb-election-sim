- slug: duare_sarkar_launch_welfare_delivery
  date: '2020-12-01'
  temporal: episodic
  scope: state
  intensity: 3
  headline: Duare Sarkar launched; gram panchayat camps enroll tea-garden women in
    welfare schemes
  summary: 'WB''s Duare Sarkar doorstep delivery program began in December 2020,

    deploying TMC activists to enrol beneficiaries for Swasthya Sathi,

    Khadya Sathi, Jai Johar (tribal welfare), and Kanyashree at gram

    panchayat level. Camps in Kalchini''s tea-garden labour lines gave TMC a

    visible service-delivery role ahead of the 2021 election, though critics

    noted eligibility barriers for contract workers excluded from some schemes.

    '
