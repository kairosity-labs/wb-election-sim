  intensity: 4
  headline: Calcutta HC circuit bench (Jalpaiguri) orders WB govt to finalise tea
    plantation minimum wage within 6 weeks
  summary: 'The Calcutta High Court''s circuit bench at Jalpaiguri issued a direction

    to the West Bengal government to finalise the statutory minimum wage for

    tea plantation workers under the Minimum Wages Act, 1948 within six weeks

    — citing the state''s failure to comply with the 2023 coordinate bench

    order. The court termed the minimum wage a "statutory and legal right."

    In Kalchini, the court direction was covered as a potential breakthrough

    on the wage front ahead of LS elections, raising expectations.

    '
