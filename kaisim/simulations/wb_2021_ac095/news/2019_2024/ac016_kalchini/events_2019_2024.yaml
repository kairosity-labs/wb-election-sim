  date: '2023-04-27'
  temporal: episodic
  scope: state
  intensity: 4
  headline: WB Labour Commissioner advises interim tea wage hike to Rs 250/day from
    June 2023; owners challenge in Calcutta HC
  summary: 'The WB State Labour Commissioner''s advisory of 27 April 2023 raised the

    interim minimum wage for tea garden workers to Rs 250 per day from

    1 June 2023. Tea garden owners challenged the advisory in Calcutta HC,

    which upheld the interim hike and directed the state to finalise the

    statutory minimum wage within six months. In Kalchini, the hike was

    welcomed but unions noted that Rs 250 remained far short of the

    Rs 351+ living-wage demand.

    '
