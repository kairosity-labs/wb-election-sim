  date: '2019-11-01'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Van Adhikar Patta claims rejected in Buxa Tiger Reserve fringe villages
  summary: 'Tribal communities on the fringe of Buxa Tiger Reserve, adjacent to

    Kalchini block, report systematic rejection of Forest Rights Act (FRA)

    claims by the state Forest Department. Relocation proceedings against

    Jayanti and other Buxa-edge settlements continued without resolving

    community forest rights. This dispossession anxiety compounds economic

    stress from tea-garden wage disputes and is a perennial mobilisation

    issue for CITU and independent tribal organisations.

    '
