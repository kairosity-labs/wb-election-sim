  date: '2020-07-10'
  temporal: episodic
  scope: district
  intensity: 4
  headline: Jaldhaka and Torsa overflow; tea-garden labour lines in Kalchini belt
    inundated
  summary: 'Monsoon floods breached the Jaldhaka and Torsa river banks in Alipurduar

    district, inundating labour lines in multiple gardens in the Kalchini

    belt. Timber from Bhutan''s upstream forests blocked drainage channels,

    worsening destruction. Losses in North Bengal tea gardens exceeded Rs 50

    crore. Workers faced simultaneous COVID wage loss and flood damage to

    homes — a double crisis with no state compensation.

    '
