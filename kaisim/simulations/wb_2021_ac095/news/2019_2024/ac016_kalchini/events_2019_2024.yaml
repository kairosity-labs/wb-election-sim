  date: '2021-07-07'
  temporal: episodic
  scope: national
  intensity: 4
  headline: John Barla (Alipurduar BJP MP, tribal tea-garden worker) appointed Union
    Minister of State
  summary: 'John Barla, the Alipurduar BJP MP who had worked in tea gardens as a

    youth, was sworn in as Union Minister of State for Minority Affairs on

    7 July 2021. BJP portrayed this as a fulfillment of the tribal community''s

    political aspirations. Barla immediately promised to work for tea labourers

    and minorities in his constituency. In Kalchini, his ministerial status

    raised expectations that PF arrears and garden closures would be resolved

    through central intervention.

    '
