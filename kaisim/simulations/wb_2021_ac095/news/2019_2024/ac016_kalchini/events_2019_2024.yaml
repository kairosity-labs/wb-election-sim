- slug: covid_lockdown_tea_garden_closure
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: 'COVID lockdown: tea estates in Kalchini block shut, workers without wages
    for weeks'
  summary: 'National lockdown closed Dooars tea estates from 25 March. Workers at

    Kalchini-belt gardens received no wages for March 25 to April 12. The

    exemption granted from April 3 allowed 25% workforce return in WB

    (Assam allowed 50%), compounding the inequity. Temporary workers (50% of

    workforce) had no legal claim to wages. The COVID lockdown created

    layered distress: lost wages, ration shortage, and fear of eviction from

    garden quarters.

    '
