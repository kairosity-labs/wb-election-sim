- slug: swasthya_sathi_tea_garden_access_challenge
  date: '2022-08-01'
  temporal: chronic
  scope: district
  intensity: 3
  headline: 'Swasthya Sathi access challenges in Kalchini: garden management blocks
    enrolment; nearest empanelled hospitals distant'
  summary: 'While Swasthya Sathi provides Rs 5 lakh annual health cover, tea-garden

    workers in Kalchini face twin barriers: garden management at times

    obstructs Duare Sarkar camp access to labour lines (where Swasthya Sathi

    cards are issued), and the nearest empanelled hospitals are in Alipurduar

    town — a significant distance for workers dependent on garden transport.

    Malaria and dengue cases in forest-fringe Kalchini villages remain

    inadequately addressed through this framework.

    '
