- slug: sarna_religion_code_demand_2021_west_bengal
  date: '2021-11-10'
  temporal: episodic
  scope: state
  intensity: 3
  headline: TMC demands Sarna/Sari religion code for tribals; BJP accused of blocking
    census recognition
  summary: 'In late 2021, TMC''s Rajya Sabha MP Samirul Islam formally demanded a

    separate religious code for Sarna and Sari religions of tribal communities

    in Parliament. In Kalchini, Oraon, Munda, and Santali communities — most

    of whom practise Sarna — welcomed the demand. BJP''s silence on the issue

    began to create an opening for TMC to chip at tribal solidarity with BJP

    on a cultural-identity issue distinct from the wage/PF economic narrative.

    '
