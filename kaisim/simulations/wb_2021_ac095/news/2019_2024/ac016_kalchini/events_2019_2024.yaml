- slug: puja_bonus_dispute_2019_dooars
  date: '2019-09-25'
  temporal: episodic
  scope: district
  intensity: 4
  headline: 'Puja bonus stalemate in Dooars: workers demand 20%, owners offer 10%'
  summary: 'Annual pre-Durga Puja negotiations between garden owners (164 gardens,

    Dooars) and unions broke down in September 2019. Workers staged agitations

    in the Kalchini belt. The Labour Commissioner facilitated a compromise, but

    delayed resolution shortened festival spending and fuelled resentment

    against management-aligned political actors. The pattern of annual bonus

    brinkmanship signals structural labour insecurity.

    '
