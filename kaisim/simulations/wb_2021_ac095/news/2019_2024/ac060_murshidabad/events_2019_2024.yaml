  - slug: duare_sarkar_phase1_2020
    date: "2020-12-01"
    temporal: episodic
    scope: state
    intensity: 3
    headline: "West Bengal launches Duare Sarkar doorstep welfare delivery; Murshidabad camps provide Swasthya Sathi cards and Khadya Sathi certificates"
    summary: |
      Phase 1 of Duare Sarkar camps launched statewide in December 2020, with camps
      at gram panchayat and ward level across Murshidabad district. The camps delivered
      Swasthya Sathi health cards, Khadya Sathi food grain entitlements, and other
      scheme certificates. For Muslim households — many without prior access to formal
      welfare systems — the doorstep delivery model was a genuinely novel experience.
      TMC capitalised on the positive optics ahead of the approaching 2021 AE.
