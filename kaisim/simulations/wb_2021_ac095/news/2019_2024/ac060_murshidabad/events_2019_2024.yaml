# Murshidabad (AC-60) — voter-salient event chronology, Jan 2019 → 13 May 2024.
# Window terminates at Murshidabad LS Phase 4 polling date.
# AC-60 is Murshidabad constituency in Murshidabad district (Murshidabad sub-division).
# Muslim-majority (~70%); nawabi capital; Congress-to-TMC transition district.
# 2021 AE: BJP won AC-60 by 2,491 votes. 2024 LS: TMC won Murshidabad LS by 1,64,215 votes.

cutoff_date: "2024-05-13"   # Murshidabad LS Phase 4 polling day

