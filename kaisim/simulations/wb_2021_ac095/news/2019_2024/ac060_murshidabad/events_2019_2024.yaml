  - slug: caa_passed_december_2019
    date: "2019-12-12"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Citizenship Amendment Act passed; Murshidabad's Muslim majority faces existential dread over NRC-CAA combination"
    summary: |
      The Citizenship Amendment Act's passage excluded Muslims from fast-track citizenship,
      creating maximum salience in Muslim-majority Murshidabad where ~70% of residents are
      Muslim. The CAA-NRC combination was interpreted as a direct threat to Muslim citizenship
      status. Mass anxiety spread through silk-weaving quarters, agricultural hamlets and
      madrassa networks. Adhir Ranjan Chowdhury immediately condemned CAA as
      "unconstitutional anti-Muslim legislation."
