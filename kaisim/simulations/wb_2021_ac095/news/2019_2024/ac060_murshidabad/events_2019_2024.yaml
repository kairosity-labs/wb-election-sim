  - slug: silk_weaving_crisis_covid_2020
    date: "2020-04-20"
    temporal: chronic
    scope: district
    intensity: 4
    headline: "Murshidabad silk weavers face existential crisis as COVID kills demand; weavers sit idle beside looms"
    summary: |
      The lockdown-induced collapse of wholesale demand devastated Murshidabad's
      centuries-old silk weaving industry. Muslim families in Jiaganj, Azimganj and
      Murshidabad town who depend on the Baluchar silk trade found themselves with
      no orders and no wages. NGO surveys documented weavers sitting idle beside
      their pit-looms, unable to access social security schemes. The crisis deepened
      a pre-existing structural decline marked by low wages driving youth away from weaving.
