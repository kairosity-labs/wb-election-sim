    date: "2023-09-01"
    temporal: chronic
    scope: district
    intensity: 3
    headline: "Chronic Padma river erosion continues displacing Murshidabad families; some moved 16 times in two decades"
    summary: |
      The Wire's investigation documented that Padma river erosion continued to displace
      communities in Murshidabad district, with some families having moved up to 16 times
      in two decades. Hundreds of houses were washed away at Taranagar in Murshidabad,
      triggering mass exodus. The Farakka barrage silt accumulation — raising the Ganga
      water level by ~8 metres upstream — perpetuated the crisis with no political solution.
      This perennial displacement affected Muslim farming and fishing households most severely.
