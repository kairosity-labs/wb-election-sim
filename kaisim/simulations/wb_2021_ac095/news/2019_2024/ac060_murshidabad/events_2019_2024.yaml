  - slug: murshidabad_muslim_out_migration_chronic
    date: "2023-06-01"
    temporal: chronic
    scope: district
    intensity: 3
    headline: "Murshidabad remains West Bengal's highest out-migration district; Muslim youth seeking work face discrimination in destination states"
    summary: |
      Murshidabad has the highest percentage of out-migrant workers among all Bengal
      districts. Migrant workers — predominantly Muslim — faced discrimination and hunger
      in destination states like Kerala and Maharashtra. The Wire documented Bengali Muslim
      migrant workers at Wadala facing hunger and communal discrimination during COVID. The
      ongoing out-migration reflects structural economic failure: collapse of silk weaving,
      MGNREGA shutdown, and limited local employment creation. Out_migrant_household
      remittances remain the primary income source for many AC-60 households.
