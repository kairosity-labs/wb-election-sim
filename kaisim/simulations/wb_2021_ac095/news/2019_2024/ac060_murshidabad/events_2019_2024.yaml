    headline: "MGNREGA stalled in West Bengal since December 2021; Murshidabad's ag-labourers left without rural employment guarantee"
    summary: |
      MGNREGA effectively ceased functioning in West Bengal from December 2021 due to
      the state's transition to alternative schemes. In Murshidabad, where ag_labourer
      households depend on MGNREGA for income during agricultural off-seasons, the collapse
      of the scheme left a major void. New worksites were shut, wage arrears accumulated,
      and officials refused work applications. The shutdown disproportionately hurt Muslim
      agricultural labourers in the district's rural blocks.
