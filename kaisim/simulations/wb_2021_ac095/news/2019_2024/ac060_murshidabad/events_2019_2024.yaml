    headline: "BJP's Mohan Haldar wins Murshidabad AC by 2,491 votes in historic upset; TMC sweeps 18 of 20 district seats"
    summary: |
      BJP's Mohan Haldar won the Murshidabad Assembly seat (AC-60) by 2,491 votes over
      TMC's Shaoni Singha Roy (95,967 vs 93,476 votes). It was one of only two seats BJP
      won in the entire 20-seat Murshidabad district, where TMC swept on Muslim vote
      consolidation. Congress won zero assembly seats in the district, confirming the
      collapse of Congress's assembly-level presence despite Adhir's Lok Sabha dominance.
      The Murshidabad AC result reflected Hindu bhadralok consolidation behind BJP.
