      months before the Lok Sabha election. In Murshidabad, the notification was met
      with anger and fear in the Muslim community who saw it as BJP making good on
      its manifesto promise. Mamata Banerjee reiterated on Eid-ul-Fitr that CAA
      and NRC would not be implemented in Bengal. JP Nadda held a rally in Berhampore
      to defend CAA, drawing a sharp response from Muslim-majority areas. The issue
      dominated Muslim household conversations ahead of LS polls.
