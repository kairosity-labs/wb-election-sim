    summary: |
      Murshidabad LS constituency voted on May 13, 2024 in Phase 4. TMC's Abu Taher Khan
      contested against CPI(M)'s Mohammed Salim and BJP's Gauri Sankar Ghosh (the sitting
      Murshidabad AC MLA). When counted June 4, Khan won by 1,64,215 votes (44.3% of vote
      share; Salim 33.6%; BJP a distant third). The result confirmed overwhelming Muslim
      vote consolidation behind TMC in the district, with Congress effectively eliminated
      at the national level and the Left reduced to second place.
