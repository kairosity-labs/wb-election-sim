    date: "2020-07-25"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Bhagirathi and Padma rivers flood Murshidabad in monsoon 2020; crops destroyed amid COVID economic collapse"
    summary: |
      Annual monsoon floods inundated large swathes of Murshidabad district in July 2020,
      with the Bhagirathi and Padma rivers breaching embankments at multiple points. Farming
      households lost standing crops of paddy. The flood compounded COVID-related economic
      distress as no MGNREGA work was available and migrant remittances had collapsed.
      State relief delivery was patchy, reinforcing community dependence on local Congress
      panchayat networks.
