  # ───────────── 2020 ─────────────

  - slug: anti_caa_bandh_deaths_jalangi_2020
    date: "2020-01-29"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "Two killed in Jalangi, Murshidabad during anti-CAA Bharat Bandh; protesters shot allegedly by TMC convoy"
    summary: |
      Two people — Anarul Biswas (50) and Slauddin Sheikh (17) — were killed at Sahebnagar
      village in Jalangi block, Murshidabad, when anti-CAA protesters were allegedly shot by
      a convoy of cars led by the local TMC block president. Three others were injured. The
      incident shocked Murshidabad's Muslim community and created a sharp rupture between
      TMC and the anti-CAA movement. Congress and CPI(M) accused TMC of repressing
      Muslim protesters.
