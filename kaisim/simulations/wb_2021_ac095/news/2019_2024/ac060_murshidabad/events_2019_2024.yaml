    intensity: 5
    headline: "Murshidabad district votes in LS Phase 4; TMC's Yusuf Pathan poised to end Adhir Ranjan's 25-year Berhampore reign (result: Pathan wins by 85,022)"
    summary: |
      Murshidabad district voted on May 13, 2024 in Phase 4 of the Lok Sabha election.
      TMC fielded former cricketer Yusuf Pathan — a Muslim celebrity face — against
      Congress's five-time MP Adhir Ranjan Chowdhury in Berhampore. Exit polls strongly
      signalled a TMC wave driven by Muslim vote consolidation. When results came June 4,
      Pathan won by 85,022 votes (5,24,516 to 4,39,494), ending Congress's 25-year
      dominance. Adhir resigned as WB Congress President. The vote confirmed TMC had
      permanently captured Adhir's Muslim vote bank in Murshidabad.
