    headline: "Assam NRC final list excludes 19 lakh; Muslim community in Murshidabad gripped by fear of WB extension"
    summary: |
      The final Assam NRC list excluded ~19 lakh people, a large proportion Muslim. In
      Murshidabad — a district with 66% Muslim population — the news triggered intense
      anxiety about a potential nationwide NRC. Community leaders at mosques across
      Murshidabad town warned congregations that their citizenship could be questioned
      despite generations of residence. Imam associations organised awareness meetings
      about documentation requirements.
