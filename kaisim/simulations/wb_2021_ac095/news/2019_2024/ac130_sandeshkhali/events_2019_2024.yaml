  - slug: nrc_assam_final_list_2019
    date: "2019-08-31"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Assam NRC excludes 19 lakh; Muslim Bengali communities in Sandeshkhali fear extension"
    summary: |
      The Assam NRC final list excluded 19 lakh people. In Sandeshkhali, where
      Muslim families (~35-40% of electorate) have incomplete land documentation
      as multi-generation Sundarban settlers, the NRC sparked existential anxiety
      about statelessness. TMC's immediate vow not to implement NRC in Bengal
      consolidated the Muslim vote and deepened the community's dependence on
      Mamata's protective umbrella.
