  - slug: caa_passed_dec2019
    date: "2019-12-11"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "CAA passed; Mamata leads Bengal resistance; Muslim voters in Sandeshkhali alarmed"
    summary: |
      Parliament passed the Citizenship Amendment Act on December 11, 2019,
      fast-tracking citizenship for non-Muslim refugees from Bangladesh, Pakistan
      and Afghanistan. In Sandeshkhali, Muslim voters interpreted this as a
      discriminatory citizenship regime paired with NRC threat. Upper-caste Hindu
      and Namasudra voters cautiously welcomed it as recognition of Hindu refugee
      rights. Mamata declared West Bengal would not implement CAA, deepening the
      communal polarisation ahead of 2021.
