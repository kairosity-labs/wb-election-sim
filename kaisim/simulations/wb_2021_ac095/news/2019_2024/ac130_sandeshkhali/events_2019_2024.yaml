  - slug: cyclone_amphan_may2020
    date: "2020-05-20"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "Super Cyclone Amphan devastates Sandeshkhali; embankments breached, fish stock wiped out"
    summary: |
      Amphan made landfall on May 20, 2020, directly striking Sandeshkhali and
      Minakhan blocks. Embankments on the Bidhyadhari river suffered three major
      breaches; entire fish farming stock was destroyed. North 24 Parganas saw
      5,500 homes damaged and 420 sq km inundated. 38 NDRF teams were deployed in
      Sandeshkhali and Hasnabad; 200,000 people were evacuated from the district.
      Paddy fields remained saline-inundated for months, devastating the 2020 kharif.
    tags: [cultivator, ag_labourer, woman, elderly, khadya_sathi_beneficiary]
