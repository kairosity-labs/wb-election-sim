    intensity: 5
    headline: "Cyclone Yaas inundates Sandeshkhali; embankments washed away, villages flooded"
    summary: |
      Cyclone Yaas made landfall on May 26, 2021 as a very severe cyclonic storm,
      striking the Sundarban coast. In Sandeshkhali block, embankments were washed
      away and whole villages were flooded with saline water. Namkhana, Gosaba,
      Basanti, Hingalganj and Sandeshkhali were the worst affected North 24 Parganas
      blocks. Over 10 million people were affected in West Bengal; the estimated
      loss was Rs 21,000 crore statewide.
