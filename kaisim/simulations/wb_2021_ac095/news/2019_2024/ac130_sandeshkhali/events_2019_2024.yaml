    date: "2020-03-25"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "COVID lockdown traps Sandeshkhali out-migrants; 2.5-3 lakh return to Sundarban fringe"
    summary: |
      India's nationwide lockdown from March 25, 2020 stranded hundreds of
      Sandeshkhali residents working in Kerala, Gujarat, and Kolkata factories.
      Distressed reverse migration flooded the Sundarban fringe; returning migrants
      faced stigma as COVID carriers. Fishing was banned or restricted; MGNREGA
      provided partial relief. Combined income shock created severe food insecurity
      among ag-labourer and out-migrant households.
