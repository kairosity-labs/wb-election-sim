    temporal: chronic
    scope: AC
    intensity: 3
    headline: "65-day fishing ban extended to 3 months in Sundarban; BLC bottleneck leaves 60,000 fishermen unlicensed"
    summary: |
      From June 2021, fishing restrictions in the Sundarban Tiger Reserve were
      extended to three months, compounding post-Amphan and post-Yaas livelihood
      losses. Only 706 of 923 original Boat License Certificates issued in 1973
      remain active for the roughly 60,000 fishermen who depend on forest access.
      Calcutta High Court verdicts upheld conservation restrictions over community
      rights, forcing thousands into illegal and dangerous forest entry — exposing
      them to tiger attacks and criminal penalties.
