  - slug: krishak_bandhu_launch
    date: "2019-01-31"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "TMC's Krishak Bandhu scheme launched — up to Rs 10,000/year direct cash for farmers"
    summary: |
      Krishak Bandhu, launched in January 2019, provides annual income support to
      all registered farmers in West Bengal — Rs 10,000/acre for large holdings,
      Rs 4,000 for marginal farmers — plus a Rs 2 lakh death benefit. In
      Sandeshkhali, where paddy and fish farming dominate livelihoods, landholding
      cultivators enrolled in large numbers. Over 90 lakh farmers were covered
      statewide; sharecroppers were also made eligible.
