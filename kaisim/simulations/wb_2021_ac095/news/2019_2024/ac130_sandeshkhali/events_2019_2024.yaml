  # ───────────── 2024 ─────────────

  - slug: ed_attack_sandeshkhali_jan2024
    date: "2024-01-05"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "Enforcement Directorate raided Sheikh Shahjahan's Sandeshkhali associates; mob attacks officers"
    summary: |
      On January 5, 2024, an ED team arrived in Sandeshkhali to interrogate TMC
      local leader Sheikh Shahjahan in connection with the Jyotipriya Mallick ration
      scam. Shahjahan's supporters attacked the ED officers, injuring three, destroyed
      their phones and documents, and vandalised media vehicles. Shahjahan fled and
      remained a fugitive for 55 days. The incident placed Sandeshkhali at the centre
      of national news and triggered a constitutional and political crisis in West Bengal.
