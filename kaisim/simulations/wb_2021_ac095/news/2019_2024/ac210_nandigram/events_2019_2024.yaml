- slug: covid_lockdown_march_2020
  date: '2020-03-24'
  temporal: episodic
  scope: national
  intensity: 4
  headline: National COVID lockdown announced; Nandigram's agrarian economy suffers
    acute distress
  summary: 'PM Modi announced a nationwide lockdown from 25 March 2020. In Nandigram''s

    economy, cultivators lost market access, agricultural labourers lost daily

    wages, and out-migrant household members returned from cities jobless.

    MGNREGA work dried up. The lockdown created lasting distress that shaped

    voters'' welfare-scheme receptivity and their judgement of both state and

    central government delivery in subsequent elections.

    '
