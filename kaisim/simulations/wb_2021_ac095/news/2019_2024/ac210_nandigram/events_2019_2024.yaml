- slug: caa_passed_parliament_2019
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: CAA 2019 passed; BJP frames it as Hindu protection, Mamata declares she
    won't implement it
  summary: 'Parliament passed the Citizenship Amendment Act on 11 December 2019. In

    predominantly Hindu Nandigram, upper-caste Hindu and bhadralok voters broadly

    welcomed it as Hindu security. Muslim voters (~34% in Nandigram-I block) viewed

    it with alarm. CM Mamata Banerjee''s refusal to implement it in West Bengal won

    Muslim loyalty but deepened Hindu consolidation toward BJP — a polarisation that

    defined Nandigram''s 2021 electoral chemistry.

    '
