  temporal: chronic
  scope: state
  intensity: 4
  headline: Centre blocks Rs 7,500 crore MGNREGA funds for West Bengal from March
    2022
  summary: 'The central government suspended MGNREGA fund releases to West Bengal
    from

    9 March 2022 under Section 27 of the MGNREG Act, citing state non-compliance.

    By August 2023, Rs 5,583 crore in unpaid wages and materials was outstanding.

    In Nandigram''s ag_labourer households, which depend on MGNREGA for dry-season

    income, the stoppage caused food insecurity, with workers completing 6–12 days

    of work in FY 2022–23 instead of the 100-day entitlement. TMC blamed BJP-led

    Centre; BJP blamed TMC corruption.

    '
