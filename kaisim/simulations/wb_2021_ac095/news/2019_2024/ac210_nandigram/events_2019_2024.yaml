- slug: nandigram_2021_result_suvendu_wins
  date: '2021-05-02'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu wins Nandigram by 1,956 votes; postal ballot swing ends nail-biting
    17-round count
  summary: 'Suvendu Adhikari (BJP) defeated Mamata Banerjee (TMC) by 1,956 votes

    (1,10,764 vs 1,08,808) in the most-watched constituency in India. A 4-hour

    server outage and a 17th-round postal ballot reversal preceded the official

    declaration. TMC alleged fraud and 12 uncounted EVMs from Muslim-majority

    Samsabad. EC rejected a recount; Mamata filed an election petition in

    Calcutta HC. TMC won the state 213 seats; Nandigram became BJP''s flagship

    fortress in south Bengal.

    '
