  headline: 'Nandigram 2007: CPM police firing kills 14 peasants opposing SEZ land
    acquisition'
  summary: 'On 14 March 2007 police opened fire on farmers resisting forced acquisition
    of

    10,000 acres for a Salim Group chemical SEZ, killing at least 14. The massacre

    became a national scandal that ended 34 years of Left Front rule and embedded
    a

    permanent anti-land-acquisition reflex in cultivator and ag_labourer memory.

    This trauma frames all subsequent land and development politics in Nandigram

    through the 2024 election.

    '
