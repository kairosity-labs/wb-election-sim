  intensity: 5
  headline: Super Cyclone Amphan devastates Purba Medinipur; relief distribution becomes
    partisan flashpoint
  summary: 'Super Cyclone Amphan (20 May 2020, 175 km/h winds) directly hit Purba
    Medinipur.

    In Nandigram, coastal farmlands were inundated, housing destroyed, and standing

    crops wiped out. Relief allocation by TMC panchayat leaders was accused by BJP

    of partisan distribution. The post-Amphan relief grievance became a running

    wound: BJP''s 2021 manifesto specifically promised a Amphan relief corruption
    probe,

    resonating with affected cultivator and ag_labourer households.

    '
