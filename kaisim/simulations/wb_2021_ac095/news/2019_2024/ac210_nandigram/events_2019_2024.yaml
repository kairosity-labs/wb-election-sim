  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu Adhikari quits TMC, joins BJP at Amit Shah rally in Midnapore
  summary: 'On 19 December 2020, Suvendu Adhikari formally joined BJP at a rally in

    Midnapore in the presence of Home Minister Amit Shah. For Nandigram voters

    who knew him as their MLA since 2016 and the 2007 land agitation hero, his

    defection rewired the constituency overnight. The Adhikari family network —

    including patriarch Sisir Adhikari (Kanthi MP) — pivoted to BJP, giving the

    party a booth-level machine it could never have built from scratch.

    '
