- slug: karmashree_prakalpa_announcement_feb_2024
  date: '2024-02-15'
  temporal: episodic
  scope: state
  intensity: 3
  headline: CM Mamata announces Karmashree 50-day rural work scheme as MGNREGA replacement;
    Jhargram tribal workers sceptical
  summary: 'With MGNREGA frozen, Chief Minister Mamata Banerjee announced the ''Karmashree

    Prokolpo'' — a state-funded 50-day rural work scheme — in February 2024 as a

    partial substitute. However, critics noted that no funds had actually been allocated

    for the scheme by the time of announcement, leading adivasi welfare organisations

    to call it a ''political eyewash''. Jhargram tribal labourers remained sceptical

    given the history of delayed MGNREGA wages and unfulfilled work-day promises.

    '
