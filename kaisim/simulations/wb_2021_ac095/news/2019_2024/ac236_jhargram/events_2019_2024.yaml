- slug: jangal_mahal_drought_crop_failure_2022
  date: '2022-07-01'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Erratic monsoon 2022 hits Jhargram single-crop tribal cultivators; MGNREGA
    freeze leaves no fallback
  summary: 'Jhargram''s tribal farmers are predominantly single-crop cultivators,
    heavily

    dependent on monsoon rains. The 2022 monsoon was erratic, with dry spells in

    August reducing paddy yields across the district''s tribal blocks. With MGNREGA

    frozen since March 2022 and no fallback wage employment, affected households

    turned to distress migration to brick kilns earlier than usual — intensifying

    the out-migrant household problem that already defined the constituency.

    '
