- slug: covid_lockdown_reverse_migration_2020
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: COVID lockdown strands Jhargram tribal brick-kiln migrants; thousands
    walk home from Gujarat and Rajasthan
  summary: 'The 24 March 2020 national lockdown sealed borders within four hours,
    stranding

    thousands of Jhargram tribal workers in brick kilns far from home. Many walked

    hundreds of kilometres; returning workers spent mandatory 14-day quarantine in

    panchayat centres with minimal support. Shramik Special trains from May 2020

    brought many back but the income shock — compounded by absent MGNREGA work

    — was catastrophic for tribal households already living on survival margins.

    '
