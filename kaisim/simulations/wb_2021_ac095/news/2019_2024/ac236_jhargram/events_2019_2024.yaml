    and recovered crores in cash from his associate''s residence, exposing a massive

    teacher recruitment scam involving bribe-for-appointment in West Bengal schools.

    In Jhargram, where educated tribal youth aspire to government teaching jobs as

    a route out of precarity, the scam was deeply felt. It damaged TMC''s welfare

    image among school-age households and first-time voters from tribal families

    in 2022–24.

    '
