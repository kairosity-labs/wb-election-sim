- slug: lodha_sabar_pvtg_covid_food_insecurity_2020
  date: '2020-05-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Lodha-Sabar PVTG settlements in Jhargram face acute hunger; tendu patta
    and NTFP collection blocked during lockdown
  summary: 'Particularly Vulnerable Tribal Groups — Lodha and Sabar communities in
    Jhargram''s

    forest fringe — were acutely exposed to COVID food insecurity. With no migration

    income and minor forest produce collection banned under lockdown, these households

    fell back on MGNREGA and PDS, both severely disrupted. Civil society documented

    hunger cases in Belpahari and Sankrail blocks, while state PVTG relief transfers

    arrived weeks late.

    '
