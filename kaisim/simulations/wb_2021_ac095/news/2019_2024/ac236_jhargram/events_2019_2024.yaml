  intensity: 3
  headline: Erratic 2022 monsoon reduces paddy yields in Jhargram; MGNREGA freeze
    leaves no fallback income
  summary: 'Jhargram''s tribal cultivators depend on a single paddy crop from monsoon
    rains.

    The 2022 monsoon was erratic with dry spells in August reducing yields across

    tribal blocks. With MGNREGA frozen since March 2022, affected households turned
    to

    distress migration to brick kilns earlier than usual — intensifying seasonal

    migration without any wage-employment safety net at home.

