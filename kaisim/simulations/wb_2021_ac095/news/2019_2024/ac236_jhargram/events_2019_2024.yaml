  date: '2020-12-01'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Duare Sarkar rolls out across Jhargram; tribal households enroll for Swasthya
    Sathi, Krishak Bandhu, Khadya Sathi
  summary: 'The ''Government at Your Doorstep'' programme started 1 December 2020
    with gram

    panchayat camps across Jhargram''s tribal blocks. Swasthya Sathi health cards,

    Krishak Bandhu farm-input support, and Khadya Sathi food security enrollment

    reached thousands of tribal households who lacked documents for formal scheme

    application. TMC presented the camps as proof of state welfare delivery in

    the Jangal Mahal; BJP countered that MGNREGA remained a failure.

    '
