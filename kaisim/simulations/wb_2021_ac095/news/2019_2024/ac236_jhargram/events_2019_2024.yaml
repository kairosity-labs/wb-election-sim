  headline: Starvation death in Jhargram linked to MGNREGA freeze; tribal family unable
    to get new job card
  summary: 'Civil society and media reported a starvation death in Jhargram district
    during

    the MGNREGA freeze period, with the victim unable to obtain a new job card as

    the scheme had come to a standstill in West Bengal. The case attracted significant

    attention in state and national media, and became a flashpoint for opposition

    demands that the Centre resume MGNREGA funding. For Jhargram''s tribal voters,
    the

    death symbolised the human cost of the Centre-state MGNREGA standoff.

    '
