- slug: mgnrega_wb_funds_blocked_march_2022
  date: '2022-03-09'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Centre blocks all MGNREGA funds to West Bengal citing corruption; Jhargram
    tribal workers lose last safety net
  summary: 'The Union Government halted MGNREGA fund release to West Bengal from 9
    March 2022

    under Section 27 of the MGNREGA Act, citing non-compliance with Central directives

    and large-scale fund irregularities. By August 2023, Rs 5,583 crore in unpaid

    wages and materials had accumulated. For Jhargram''s tribal labourers — already

    without migration income — this was catastrophic: a reported starvation death

    in Jhargram was linked to the MGNREGA freeze. The blockade became the single most

    salient economic grievance in the district through 2022–23.

    '
