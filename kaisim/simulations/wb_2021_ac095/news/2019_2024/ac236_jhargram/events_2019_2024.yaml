  headline: MGNREGA unpaid dues to Bengal reach Rs 5,583 crore; tribal workers in
    Jhargram get only 6–12 days of work in FY2022-23
  summary: 'By August 2023, the cumulative MGNREGA dues owed to West Bengal stood
    at Rs 5,583

    crore — Rs 2,770 crore in unpaid wages alone. On the ground in Jhargram, the

    majority of tribal workers who did receive MGNREGA work in FY2022-23 got only

    6–12 days — far below the 100-day entitlement. The Centre-state impasse over

    compliance left Jhargram''s tribal labourers trapped between a state government

    that claimed it was fighting for them and a Centre that accused the state

    of corruption.

    '
