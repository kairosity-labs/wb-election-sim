  headline: WB Assembly passes Sarna religion code motion; Jhargram tribal voters
    watch BJP-TMC split on adivasi identity
  summary: 'West Bengal Legislative Assembly passed a resolution urging the Centre
    to add

    separate Sarna and Sari codes in Census 2021 for tribal communities. In Jhargram,

    where Sarna identity is central to Santali cultural life, the resolution

    was widely circulated by TMC workers. BJP opposed it, arguing Sarnas are

    ''essentially Hindu'', which many tribal voters found dismissive of their distinct

    religious practice.

    '
