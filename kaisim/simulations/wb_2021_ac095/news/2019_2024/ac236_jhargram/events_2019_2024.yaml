  date: '2019-09-10'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Jhargram distributes 14,594 Van Adhikar Pattas covering ~3,500 acres;
    thousands of claims remain pending
  summary: 'By late 2019 Jhargram had recognised Individual Forest Rights for 14,594
    tribal

    households covering 3,508 acres and 72 Community Forest Rights, yet rights activists

    documented massive pendency — tens of thousands of Santali, Munda, and Lodha

    household claims remained unadjudicated. The gap between claims filed and pattas

    issued became a persistent grievance exploited by both BJP and TMC.

    '
