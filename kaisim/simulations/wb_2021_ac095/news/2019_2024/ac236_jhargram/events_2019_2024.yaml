- slug: wb_ae_2021_jhargram_birbaha_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Birbaha Hansda (TMC) wins Jhargram AC by 38,240 votes; BJP's Junglemahal
    strategy fails
  summary: 'TMC''s Birbaha Hansda won 109,493 votes against BJP''s Sukhamoy Satpathy''s
    71,253

    — a 38,240-vote majority in the ST-reserved Jhargram AC. The result reversed BJP''s

    2019 LS momentum and re-established TMC dominance in the tribal belt through

    Hansda''s cultural identity, the Lakshmir Bhandar pre-poll promise, and the

    Anandadhara SHG mobilisation network. BJP''s temple-Hindutva strategy was

    rejected by a majority of Santali-Munda voters.

    '
