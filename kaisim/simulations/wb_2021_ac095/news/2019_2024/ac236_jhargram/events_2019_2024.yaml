- slug: mgnrega_chronic_deprivation_jhargram_2019
  date: '2019-10-01'
  temporal: chronic
  scope: district
  intensity: 4
  headline: MGNREGA delivers fewer than 40 days annually to Jhargram tribal households;
    wage delays of 60–90 days endemic
  summary: 'Jhargram''s tribal households depend critically on MGNREGA as a survival
    income

    during the dry season. Chronic underfunding, muster-roll manipulation, and delayed

    wage transfer meant most households received far fewer than the 100-day entitlement.

    A 2019 civil-society survey found median MGNREGA days per household at 38, deepening

    resentment toward the incumbent TMC state machinery.

    '
