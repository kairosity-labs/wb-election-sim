- slug: jangalmahal_unemployment_narrative_2023_2024
  date: '2023-12-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: 'Ground reports from Jhargram: ''Peace came to Jangal Mahal but prosperity
    did not''; unemployment dominates voter concern'
  summary: 'Extensive ground reporting from Jhargram in 2023–24 documented the central

    constituency narrative: the post-Maoist peace dividend had not translated into

    structural economic change. No major industry, inadequate irrigation, single-crop

    agriculture, and mass youth migration — both educated and uneducated — defined

    the reality. Both TMC and BJP were blamed for unkept promises since 2011.

    This ''peace without prosperity'' frame was the key driver of voter ambivalence

    heading into LS 2024.

    '
