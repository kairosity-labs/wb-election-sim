  headline: Birbaha Hansda appointed Minister of State for Self Help Groups; first
    Jhargram tribal MLA to hold Cabinet rank
  summary: 'After her 38,240-vote victory, Birbaha Hansda was inducted into Mamata
    Banerjee''s

    Cabinet as Minister of State for Self Help Groups and later for Forest. For tribal

    voters in Jhargram this was symbolically significant — a Santali actress-politician

    from the constituency now held Cabinet rank and could directly advocate for Jangal

    Mahal welfare at the state level. Her portfolio connections to Anandadhara SHGs

    and forest rights were directly relevant to her constituency.

    '
