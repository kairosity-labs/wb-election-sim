- slug: lakshmir_bhandar_tmc_manifesto_2021
  date: '2021-02-28'
  temporal: episodic
  scope: state
  intensity: 5
  headline: TMC manifesto promises Lakshmir Bhandar Rs 1,000/month for ST women; decisive
    welfare promise in Jhargram
  summary: 'The TMC 2021 manifesto announced Lakshmir Bhandar — Rs 1,000/month for
    SC/ST women,

    Rs 500 for general category, aged 25–60. In Jhargram''s ST-majority constituency

    this was the single most impactful welfare promise, as almost every eligible Santali

    and Munda woman household stood to benefit. Delivered via Duare Sarkar from

    August 2021 onward, the scheme gave TMC strong pre-poll credibility among the

    tribal women who form a core voting bloc.

    '
