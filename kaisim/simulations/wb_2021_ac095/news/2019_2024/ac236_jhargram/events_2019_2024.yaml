  intensity: 4
  headline: Lakshmir Bhandar scheme starts disbursements; Jhargram tribal women receive
    first Rs 1,000 monthly transfers
  summary: 'From August 2021 the West Bengal government began monthly direct transfers
    under

    Lakshmir Bhandar — Rs 1,000 for SC/ST women, Rs 500 for general category — via

    Duare Sarkar enrollment. In Jhargram district, which has a high proportion of

    eligible ST women, the scheme enrolled lakhs of beneficiaries within its first

    phase. The direct cash transfer — the first of its kind at this scale in rural

    Jhargram — was a significant positive event for tribal women''s household economies.

    '
