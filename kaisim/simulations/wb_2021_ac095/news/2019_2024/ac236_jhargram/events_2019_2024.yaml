    violence — the local BJP party office was ransacked and tribal BJP booth workers

    reported being driven from their homes by TMC supporters. Jhargram featured in

    opposition petitions to the Governor and NHRC investigations into post-poll violence.

    The violence deepened BJP tribal supporters'' alienation without dislodging TMC

    administrative control.

