  date: '2019-07-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: BJP launches Ghar Wapsi and temple-building campaigns in Jangal Mahal
    post-LS win
  summary: 'Emboldened by the 2019 Lok Sabha result, BJP affiliates VHP and Bajrang
    Dal

    intensified Ghar Wapsi campaigns and temple-building in Santali and Munda villages

    in Jhargram district, framing tribal identity as Hindu identity. This cultural
    push

    created significant counter-mobilisation among Sarna adherents and Santal cultural

    organisations, who resisted Hindu-absorption narratives.

    '
