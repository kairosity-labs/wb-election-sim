  headline: Santali actress Birbaha Hansda fielded by TMC for Jhargram AC; identity-politics
    masterstroke
  summary: 'TMC''s candidate for Jhargram AC was Birbaha Hansda — celebrated Santali-language

    film actress, daughter of tribal ex-MLAs, fluent in Ol Chiki script. Her cultural

    resonance among Santali and Munda communities gave TMC a decisive identity advantage

    over BJP''s Sukhamoy Satpathy. Hansda''s village-level roadshows with Santali
    songs

    and dialect outreach generated enthusiasm among tribal women voters in particular.

    '
