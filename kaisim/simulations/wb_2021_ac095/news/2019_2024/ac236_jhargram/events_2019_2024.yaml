  temporal: episodic
  scope: state
  intensity: 4
  headline: Former Maoist leader Chhatradhar Mahato joins TMC; Mamata's Jangal Mahal
    reclamation strategy
  summary: 'Chhatradhar Mahato, iconic PCAPA leader convicted under UAPA, formally
    joined the

    TMC state committee, giving Mamata a powerful adivasi-resistance symbol in Jangal

    Mahal. For tribal voters in Jhargram his TMC entry signalled that the ruling party

    was willing to acknowledge the region''s anti-police-atrocity legacy. BJP''s NIA

    arrested Mahato on 28 March 2021 — just before the election — in a move opposition

    called politically motivated.

    '
