- slug: panchayat_2023_violence_jhargram
  date: '2023-07-08'
  temporal: episodic
  scope: district
  intensity: 4
  headline: Jhargram Panchayat election 2023 marred by violence; BJP candidate beaten;
    TMC sweeps Zila Parishad
  summary: 'The July 2023 West Bengal Panchayat elections were marked by widespread
    violence

    across the state; in Jhargram, a BJP candidate Suvankar Mahato was allegedly

    manhandled by a police officer (OC Sankrail police station) on 26 June. TMC swept

    all 20 Zila Parishads statewide, winning Jhargram overwhelmingly. BJP and opposition

    alleged uncontested TMC dominance through intimidation of candidates. The violence

