- slug: seasonal_migration_jhargram_chronic
  date: '2019-11-15'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: Tens of thousands of Jhargram tribal workers migrate annually to brick
    kilns; out-migrant households define the electorate
  summary: 'Every October–November, young Santali, Munda, and Bhumij men migrate to
    brick kilns

    in Gujarat, Rajasthan, and Odisha under debt-bondage contractor arrangements.
    Their

    grievances — absent MGNREGA work, no Van Adhikar Pattas, no local industry — shape

    anti-incumbency sentiment in Jhargram and create a large postal-vote constituency.

    '
