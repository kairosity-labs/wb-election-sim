  summary: 'TMC''s flagship post-victory women''s cash transfer launched through Duare
    Sarkar

    camps. SC/ST women receive ₹1,000/month; general category ₹500/month. In Cooch

    Behar Uttar, Rajbanshi women (classified SC) received the higher ₹1,000 rate.

    1.23 crore WB women enrolled on Day 1. Direct-to-bank-account transfer bypassed

    panchayat mediation and created a state-to-woman relationship independent of male

    household heads. Transformed TMC''s women''s vote base statewide including in

    BJP-held seats like AC-1.

