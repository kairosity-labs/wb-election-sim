  summary: 'Central government invoked Section 27 of MGNREGA Act citing WB non-compliance,

    stopping funds from March 9, 2022. By August 2023, Rs 5,583 crore in wages and

    material payments were unpaid. In Cooch Behar Uttar, MGNREGA-dependent ag-labourers

