  headline: CISF kills 4 voters at Sitalkuchi Booth 126 on Phase 4 polling day — district-wide
    trauma and political firestorm
  summary: 'CISF jawans at Polling Station 126 (Sitalkuchi AC-9) fired 6-8 rounds,
    killing four

    persons on WB AE Phase 4 day. A fifth voter Anand Burman was shot separately.

    Election Commission suspended polling, banned politicians from Cooch Behar 72
    hours.

    TMC alleged murder; BJP called it self-defence against booth capture. CID probe

    opened April 16. The incident defined Cooch Behar''s political narrative for years:

    for BJP it reinforced security-forces-defending-voters; for TMC it was CISF excess

    against Bengal''s people.

    '
