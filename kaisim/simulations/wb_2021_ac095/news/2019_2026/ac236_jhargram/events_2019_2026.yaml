- slug: mgnrega_chronic_deprivation_2019
  date: '2019-10-01'
  temporal: chronic
  scope: district
  intensity: 4
  headline: MGNREGA delivers median 38 days per household in Jhargram; wage delays
    of 60–90 days endemic before 2019 elections
  summary: 'Jhargram''s tribal households depend critically on MGNREGA as dry-season
    survival

    income. Chronic underfunding and muster-roll manipulation meant most received
    far

    fewer than the 100-day entitlement; civil-society surveys found median days at
    38

    with many reporting non-payment stretching 60–90 days, deepening anti-incumbency

    toward TMC''s state machinery.

    '
