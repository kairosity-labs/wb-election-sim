  headline: BJP 'Sonar Bangla' manifesto promises tribal university in Jhargram, Rs
    100 crore ST fund, and Van Adhikar Patta delivery
  summary: 'BJP''s 2021 WB manifesto promised a Pandit Raghunath Murmu Tribal University
    in

    Jhargram and Rs 100 crore under Stand Up India for tribal self-employment. The

    party also promised accelerated Van Adhikar Patta distribution and regularisation

    of forest-dwelling encroachments. Critics noted the Centre controlled FRA

    implementation and had not prioritised it in BJP-ruled states, undermining

    the credibility of the promise.

    '
