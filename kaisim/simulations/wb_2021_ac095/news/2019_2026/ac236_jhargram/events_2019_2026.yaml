  summary: 'The ''Government at Your Doorstep'' programme started 1 December 2020,
    with gram

    panchayat camps across Jhargram''s tribal blocks. Swasthya Sathi health cards,

    Krishak Bandhu farm-input support, and Khadya Sathi food security enrollment

    reached thousands of tribal households who lacked documents for formal scheme

    application. TMC presented camps as proof of welfare delivery in the Jangal Mahal.

    '
