    in Jhargram register the split
  summary: 'The West Bengal Legislative Assembly passed a resolution urging the Centre
    to add

    Sarna and Sari codes in Census 2021. In Jhargram, where Sarna identity is central

    to Santali cultural life, TMC workers circulated the resolution widely as adivasi

    solidarity. BJP''s opposition — arguing Sarnas are ''essentially Hindu'' — alienated

    a section of tribal voters who resisted Hindu-absorption framing of their identity.

    '
