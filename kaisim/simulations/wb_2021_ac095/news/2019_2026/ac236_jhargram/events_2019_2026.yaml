- slug: seasonal_migration_brick_kilns_chronic
  date: '2019-11-15'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: Tens of thousands of Jhargram tribal workers migrate annually to brick
    kilns; out-migrant households are a large electoral segment
  summary: 'Every October–November, young Santali, Munda, and Bhumij men migrate to
    brick kilns

    in Gujarat, Rajasthan, and Odisha under debt-bondage contractor arrangements.

    Out-migrant households constitute a significant share of Jhargram''s electorate;

    their absent-income grievances — lack of MGNREGA, Van Adhikar Pattas, local industry

    — define anti-incumbency patterns across the constituency''s multiple election
    cycles.

    '
