- slug: chhatradhar_mahato_joins_tmc_2020
  date: '2020-07-10'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Former Maoist leader Chhatradhar Mahato joins TMC State Committee; Jangal
    Mahal reclamation strategy
  summary: 'Chhatradhar Mahato, iconic PCAPA leader convicted under UAPA, formally
    joined the

    TMC state committee. His co-option was Mamata''s calculated bid to reclaim Jangal

    Mahal''s tribal heartland from BJP by absorbing the region''s most recognisable

    adivasi-resistance symbol. For Jhargram voters it signalled TMC''s willingness
    to

    acknowledge the anti-police-atrocity legacy. BJP''s NIA arrested Mahato on

    28 March 2021 — weeks before the election — a move opposition called political.

    '
