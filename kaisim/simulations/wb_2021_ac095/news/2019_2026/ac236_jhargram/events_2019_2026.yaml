- slug: covid_lockdown_reverse_migration_2020
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: COVID lockdown strands Jhargram tribal brick-kiln migrants; thousands
    walk home from Gujarat and Rajasthan
  summary: 'The 24 March 2020 lockdown sealed borders within four hours, stranding
    thousands

    of Jhargram tribal workers in distant brick kilns. Many walked hundreds of kilometres;

    those who returned by Shramik Special trains spent 14-day quarantine at panchayat

    centres with minimal support. The income shock — compounded by absent MGNREGA
    work

    — was catastrophic for households living on survival margins in tribal Jhargram.

    '
