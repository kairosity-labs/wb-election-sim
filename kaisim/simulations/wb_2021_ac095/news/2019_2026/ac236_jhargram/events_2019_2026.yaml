  intensity: 5
  headline: TMC 2021 manifesto promises Lakshmir Bhandar Rs 1,000/month for ST women;
    decisive pre-poll promise in Jhargram
  summary: 'The TMC 2021 manifesto''s Lakshmir Bhandar scheme — Rs 1,000/month for
    SC/ST women

    aged 25–60 — was the single most impactful welfare promise in ST-majority Jhargram.

    Almost every eligible Santali and Munda woman household stood to benefit, and
    the

    scheme delivered from August 2021 onward gave TMC strong pre-poll credibility

    among the tribal women who form a core voting bloc.

    '
