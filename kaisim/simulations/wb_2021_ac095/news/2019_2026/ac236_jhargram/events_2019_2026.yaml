  headline: 'Media and civil society ground reports: ''Peace came to Jangal Mahal
    but prosperity did not'' frames 2026 election debate'
  summary: 'Extensive ground reporting in early 2026 documented a powerful and widely-shared

    narrative in Jhargram: the post-Maoist peace had arrived but economic development

    had not followed. Unemployment remained the biggest concern; migration was a

    necessity; single-crop agriculture dominated; irrigation infrastructure was absent;

    and both TMC and BJP were blamed for promises not kept. This narrative —

    ''peace without prosperity'' — was the central emotional frame for floating voters

    in Jhargram heading into the 2026 election.

    '
