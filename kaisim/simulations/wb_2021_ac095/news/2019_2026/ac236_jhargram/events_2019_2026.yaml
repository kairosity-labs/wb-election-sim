- slug: bjp_ghar_wapsi_temple_tribal_2019
  date: '2019-07-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: BJP/VHP launch Ghar Wapsi and temple-building in Jangal Mahal tribal villages
    post-LS 2019
  summary: 'Emboldened by the 2019 LS win, BJP affiliates VHP and Bajrang Dal intensified

    Ghar Wapsi campaigns and temple-building in Santali and Munda villages in Jhargram,

    framing tribal identity as Hindu. This cultural push generated significant

    counter-mobilisation among Sarna adherents, setting the stage for the Sarna

    religion-code debate that dominated 2020–26 adivasi politics.

    '
