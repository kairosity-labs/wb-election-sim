- slug: lodha_sabar_pvtg_covid_hunger_2020
  date: '2020-05-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Lodha-Sabar PVTG settlements face acute hunger during COVID lockdown;
    NTFP collection banned
  summary: 'Particularly Vulnerable Tribal Groups — Lodha and Sabar communities in
    Jhargram''s

    forest fringe — faced acute food insecurity during the lockdown. With no migration

    income and collection of tendu patta, mahua, and sal seeds banned, these households

    depended on MGNREGA and PDS, both severely disrupted. Civil society documented

    hunger cases in Belpahari and Sankrail blocks; state PVTG relief transfers arrived

    weeks late.

    '
