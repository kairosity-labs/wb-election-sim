  date: '2021-03-10'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Anandadhara SHGs in Jhargram's tribal blocks function as TMC's soft campaign
    network ahead of AE 2021
  summary: 'West Bengal''s Anandadhara (NRLM) SHGs across Jhargram''s tribal blocks
    —

    Jhargram, Binpur, Sankrail, Belpahari — served as informal TMC outreach forums,

    with members discussing Lakshmir Bhandar, Swasthya Sathi enrollment, and state

    welfare at monthly meetings attended by TMC workers. This SHG network was a

    critical soft-power advantage for TMC in the tribal interior where formal

    party organisation was weaker.

    '
