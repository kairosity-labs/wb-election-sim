  headline: Lakshmir Bhandar begins monthly transfers; Jhargram tribal ST women receive
    Rs 1,000/month
  summary: 'From August 2021 the West Bengal government began monthly direct transfers
    under

    Lakshmir Bhandar via Duare Sarkar enrollment. In Jhargram district — with a high

    proportion of eligible ST women — lakhs of beneficiaries enrolled in the first

    phase. The direct cash transfer was a significant positive development for tribal

    women''s household economies and entrenched TMC''s welfare-delivery image in

    the constituency heading into the 2022–24 period.

