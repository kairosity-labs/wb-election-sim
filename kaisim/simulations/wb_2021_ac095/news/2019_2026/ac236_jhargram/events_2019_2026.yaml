  date: '2019-09-10'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Jhargram issues 14,594 Van Adhikar Pattas but tens of thousands of tribal
    claims still pending
  summary: 'By late 2019 Jhargram had recognised Individual Forest Rights for 14,594
    tribal

    households covering 3,508 acres and 72 Community Forest Rights. Rights activists

    documented massive pendency — tens of thousands of Santali, Munda, and Lodha

    household claims unadjudicated. The gap between claims filed and pattas issued

    became a persistent multi-election grievance against all governing parties.

    '
