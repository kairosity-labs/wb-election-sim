- slug: jangal_mahal_forest_fire_2020
  date: '2020-03-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Dry-season forest fires sweep Jhargram's sal-forest belt; tribal NTFP
    livelihoods disrupted during COVID lockdown
  summary: 'Jhargram''s sal-dominated forests are among the most fire-prone in southwest
    Bengal,

    with major fire events March–May annually. The 2020 fire season was compounded
    by

    the COVID lockdown — tribal households lost income from NTFP collection as fires

    damaged forest patches and lockdown restricted movement. Repeated annual fires

    deepen the constituency''s chronic livelihood vulnerability.

    '
