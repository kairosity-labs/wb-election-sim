  headline: Partha Chatterjee arrested in SSC teacher scam; ₹50 cr cash found — TMC
    education corruption exposed
  summary: 'TMC Education Minister Partha Chatterjee arrested July 23, 2022. ₹50 crore
    cash

    recovered. Calcutta HC cancelled the entire 2016 SLST process (25,753 teacher

    jobs). For school-age households in Cooch Behar Uttar, many of whose children
    had

