  headline: 'National COVID lockdown: Cooch Behar tobacco/jute farmers lose entire
    season; out-migrants return destitute'
  summary: '21-day lockdown (extended multiple times) shut mandis and cross-border
    trade.

    Cooch Behar Uttar tobacco farmers (winter crop) could not sell to mandis; jute

    sowing was delayed. Out-migrant Rajbanshi workers returned from North Indian cities

    without earnings. PMGKAY free ration partially buffered food security but cash

    income contracted sharply, creating enduring rural grievance that both parties

    would later reference.

