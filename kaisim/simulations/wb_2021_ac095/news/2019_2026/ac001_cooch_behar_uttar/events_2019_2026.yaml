  scope: AC
  intensity: 4
  headline: 'D-voter / Foreigners Tribunal: Cooch Behar Rajbanshis face chronic citizenship
    anxiety distinct from CAA'
  summary: 'The D-voter (declared foreigner) problem in Cooch Behar predates CAA and
    NRC.

    WB voter rolls in border districts have historically had "D" markings against

    contested entries, barring those voters from elections. Assam FT notices to WB

    Rajbanshi residents (e.g., the Brajabasi case) created fear that the citizenship

    dragnet could reach any family. The 2025-26 SIR (91 lakh deletions, 2.42 lakh

    in Cooch Behar) rekindled these fears acutely. The D-voter issue is the single

    most emotionally raw citizenship anxiety in AC-1, distinct from and sharper than

    CAA for this community.

    '
