- slug: caa_passed_dec2019_rajbanshi_not_beneficiaries
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: 'CAA passed: Rajbanshis — Hindu SC, not refugees — are outside its scope;
    D-voter threat still unaddressed'
  summary: 'CAA grants fast-track citizenship to non-Muslim refugees from Bangladesh/Pakistan/

    Afghanistan entering before 2014. Cooch Behar Rajbanshis are Hindu and SC but
    are

    Indian-origin (not refugees), so CAA does not apply to them. BJP''s framing of
    CAA

    as Hindu protection was received cautiously by Rajbanshi voters who understood
    their

    D-voter/Foreigners Tribunal problem was separate. Muslim-minority pockets in AC-1

    hardened against CAA. NRC fear overlapped with but was distinct from CAA.

    '
