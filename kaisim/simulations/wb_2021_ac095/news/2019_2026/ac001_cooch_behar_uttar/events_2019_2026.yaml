    border face foreigners tribunal fear
  summary: 'The Assam NRC final list excluded ~19 lakh people. Rajbanshi families
    in Cooch

    Behar — many with relatives in Assam — received or feared Foreigners Tribunal

    notices. The Uttam Kumar Brajabasi case (Dinhata Block, Cooch Behar) — a lifetime

    WB resident declared a foreign national by Assam tribunal despite valid documents

    — became an AC-1 flashpoint. Mamata raised it as BJP''s citizenship harassment
    of

    Bengali Hindus. D-voter fear, already acute from earlier WB voter-roll deletions,

    intensified across the entire district.

    '
