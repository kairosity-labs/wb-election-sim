  headline: National COVID lockdown devastates Murshidabad's silk industry and forces
    thousands of migrant workers to return
  summary: 'The nationwide lockdown devastated Murshidabad''s twin economic pillars:
    silk weaving

    and out-migration labour. Tens of thousands of Murshidabad residents working in
    Kerala,

    Maharashtra and Gujarat were stranded, subsequently returning by Shramik trains
    through

    May 2020. Silk weaving in Jiaganj, Azimganj and Murshidabad town ground to a halt

    as wholesale orders collapsed. MGNREGA was non-functional as a safety net.

    '
