  temporal: episodic
  scope: national
  intensity: 5
  headline: Citizenship Amendment Act passed; Muslim-majority Murshidabad faces existential
    dread over NRC-CAA combination
  summary: 'The CAA excluded Muslims from fast-track citizenship, creating maximum
    salience in

    Murshidabad where ~70% of residents are Muslim. The CAA-NRC combination was

    interpreted as a direct threat. Mass anxiety spread through silk-weaving quarters,

    agricultural hamlets and madrassa networks. Adhir Ranjan condemned CAA as

    "unconstitutional anti-Muslim legislation." The issue would dominate Murshidabad

    politics for the next seven years.

    '
