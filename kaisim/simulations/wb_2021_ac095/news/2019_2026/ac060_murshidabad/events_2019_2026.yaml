  date: '2020-05-10'
  temporal: episodic
  scope: district
  intensity: 4
  headline: Thousands of Murshidabad migrants return by Shramik Special trains; relief
    camps documented as inadequate
  summary: 'Murshidabad — with the highest out-migration rate in West Bengal — saw
    thousands

    of workers return by special trains from southern and western states in May 2020.

    Many returned to find silk-weaving enterprises shuttered and agricultural land

    flooding. Relief camps organised by state government and Congress panchayat bodies

    were documented as inadequate, with limited food and no cash support. The experience

    hardened out_migrant_household grievances about safety nets.

    '
