  headline: 316 CAPF companies deployed in Murshidabad for Phase 1 polls; 219 QRTs
    with all-CAPF composition for sensitive booths
  summary: 'For the 2026 AE Phase 1 polls, 316 of 2,407 total companies (13%) were
    deployed

    in Murshidabad district alone — the highest allocation of any district. 240 companies

    were for Murshidabad police district and 76 for Jangipur. Murshidabad received
    the

    maximum 219 Quick Response Teams, all composed of CAPF personnel. Booth-level
    security

    required two-stage voter verification before entry. The unprecedented deployment

    reflected Murshidabad''s record of violence in past elections.

