  intensity: 5
  headline: Ram Navami procession sparks communal violence in Murshidabad's Raghunathganj;
    ~40 shops burned, 30 arrested including RSS leader
  summary: 'Communal clashes erupted during a Ram Navami procession on March 27, 2026
    in

    Raghunathganj under Jangipur sub-division, Murshidabad. Stone-pelting, arson

    and vandalism occurred, with ~40 Muslim-owned shops and stalls burned in Fultala.

    Approximately 15 people were injured. Among 30 arrested were RSS leader Kingshuk

    Bhattacharya. Section 144 was imposed. The violence — weeks before polling day
    —

    dramatically heightened communal polarisation in the district, with BJP accusing

    TMC of "appeasement" and Muslim voters feeling targeted.

    '
