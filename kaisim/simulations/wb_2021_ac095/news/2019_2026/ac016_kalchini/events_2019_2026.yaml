  date: '2021-03-21'
  temporal: episodic
  scope: state
  intensity: 4
  headline: BJP 'Sonar Bangla' manifesto promises land ownership and Tea Workers Development
    Board
  summary: 'BJP''s 2021 WB manifesto pledged land ownership rights for tea-garden

    workers, a Tea Workers'' Development Board, and PF/ESI arrear recovery

    from closed gardens. In Kalchini (ST), the land ownership promise

    resonated deeply with Oraon and Munda workers who have lived in garden

    quarters for generations without title. Candidate Bishal Lama campaigned

    aggressively on this plank in garden-line meetings.

    '
