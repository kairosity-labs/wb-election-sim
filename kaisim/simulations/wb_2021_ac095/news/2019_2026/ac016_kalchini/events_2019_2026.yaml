  date: '2022-03-09'
  temporal: chronic
  scope: national
  intensity: 4
  headline: Centre blocks MGNREGA funds to WB from March 2022; Rs 5,583 crore in dues
    piles up
  summary: 'The Union government stopped MGNREGA releases to West Bengal from

    9 March 2022 (Section 27 non-compliance), with Rs 5,583 crore in dues

    (including Rs 2,770 crore in pending wages) by August 2023. In Kalchini

    block, MGNREGA had supplemented tea-garden household incomes in lean

    periods. The fund blockage removed this buffer, especially hurting single-

    woman households in the labour lines.

    '
