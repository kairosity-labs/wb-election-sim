  intensity: 3
  headline: TMC demands Sarna/Sari religion code for tribals; BJP stays silent, creating
    cultural wedge
  summary: 'TMC''s Rajya Sabha MP formally demanded a separate census religious code

    for Sarna and Sari tribal religions in Parliament in late 2021. In

    Kalchini, Oraon, Munda, and Santali communities — for whom Sarna identity

    is central — welcomed the demand. BJP''s silence began creating an opening

    for TMC to chip at tribal solidarity on cultural-identity grounds distinct

    from the economic wage narrative.

