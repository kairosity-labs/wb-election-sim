- slug: tea_garden_pf_esi_chronic_non_payment
  date: '2019-09-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Chronic PF/ESI non-payment by Alipurduar gardens; Jalpaiguri PF office
    files 36 FIRs over five years
  summary: 'Widespread non-deposit of Provident Fund contributions by Alipurduar

    garden managements is documented in court filings. The Jalpaiguri PF

    regional office filed FIRs against 36 garden authorities over five years.

    ESI coverage is absent for most Dooars workers. The chronic PF/ESI

    failure is a key driver of out-migration and persistent union grievance

    in Kalchini''s labour lines.

    '
