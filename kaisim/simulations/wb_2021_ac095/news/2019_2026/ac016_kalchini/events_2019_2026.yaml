  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: CAA passed; tribal Dooars workers feel NRC spillover anxiety; Mamata opposes
    CAA loudly
  summary: 'CAA''s passage deepened NRC anxieties in Kalchini even though tribal

    Hindu workers are not directly targeted under CAA categories. Workers

    fear a future WB NRC would expose documentation gaps of second-generation

    plantation migrants. Mamata''s outright opposition to CAA+NRC provided

    political shelter and began partially offsetting the BJP tribal surge.

    '
