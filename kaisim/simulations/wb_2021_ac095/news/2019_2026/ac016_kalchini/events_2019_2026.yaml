  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Bishal Lama (BJP) wins Kalchini AC-16 by 28,576 votes with 53% share
  summary: 'BJP''s Bishal Lama won Kalchini (ST) with 1,03,104 votes, defeating TMC''s

    Pasang Lama by 28,576 — one of North Bengal''s largest margins. North

    Bengal gave BJP 31 of 54 seats; Alipurduar was a clean BJP sweep.

    Bishal Lama''s tribal identity, land-rights manifesto pledge, and John

    Barla''s coattail effect were credited for the scale of the victory.

    '
