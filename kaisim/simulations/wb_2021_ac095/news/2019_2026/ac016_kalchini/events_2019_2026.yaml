- slug: tea_wage_hike_rs232_jan2022
  date: '2022-06-10'
  temporal: episodic
  scope: state
  intensity: 4
  headline: WB interim tea-wage hike to Rs 232/day (from Rs 202) — effective Jan 2022
  summary: 'After a tripartite meeting at Siliguri''s Shramik Bhawan, the WB Labour

    Commissioner notified an interim hike from Rs 202 to Rs 232 per day,

    effective 1 January 2022, with arrears in two installments by July 2022.

    The hike was welcomed in Kalchini''s labour lines but fell well short of

    union demands (Rs 351+). It was framed as an interim measure pending

    statutory minimum wage finalisation, meaning the core wage dispute

    remained open.

    '
