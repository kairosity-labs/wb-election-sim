- slug: kalchini_tea_estate_closure_2019
  date: '2019-02-08'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Kalchini Tea Estate shuts; ~2,003 workers on FAWLI subsistence at Rs 1,500/month
  summary: 'Kalchini Tea Estate management announced closure, leaving over 2,000

    workers dependent on FAWLI (Financial Assistance for Workers of Lockout

    Industries) at Rs 1,500/month — far below the daily wage. The garden

    remained closed through most of 2019-2023, creating enduring economic

    distress in the constituency. Workers'' anger at management and state

    failure to reopen the garden was a principal driver of the 2021 BJP

    landslide in Kalchini.

    '
