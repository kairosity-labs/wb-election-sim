  summary: 'Union Minister Barla and BJP MLAs raised the demand to carve North Bengal

    districts including Alipurduar into a Union Territory. TMC accused BJP of

    trying to divide Bengal. In Kalchini, tribal workers were divided: some

    saw the UT demand as a path to direct central investment, others feared

    loss of state welfare schemes already reaching them.

