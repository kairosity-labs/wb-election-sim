  date: '2019-05-23'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: BJP's John Barla (tribal, ex-tea worker) wins Alipurduar LS by 2.44 lakh
  summary: 'John Barla, a tribal leader who worked in Alipurduar tea gardens as a

    youth, swept the constituency with 54.4% (7.5 lakh votes) against TMC''s

    Dasrath Tirkey (36.7%). Kalchini block contributed to this sweeping BJP

    surge, driven by anti-TMC incumbency and tribal solidarity. The win

    established BJP as the dominant force in the Dooars belt and foreshadowed

    the 2021 assembly sweep.

    '
