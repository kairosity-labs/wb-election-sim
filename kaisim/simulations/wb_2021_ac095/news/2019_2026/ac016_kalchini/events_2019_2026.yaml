- slug: nrc_assam_documentation_anxiety
  date: '2019-08-31'
  temporal: episodic
  scope: national
  intensity: 5
  headline: Assam NRC excludes 19 lakh; Dooars tea-garden tribal workers face acute
    documentation anxiety
  summary: 'The NRC final list triggered deep fear among Kalchini tea-garden workers

    whose families migrated from Jharkhand and Odisha generations ago. Many

    second-generation workers lack formal birth records. Garden management

    withholding of employment records for identity proof amplified the

    citizenship-threat narrative. Mamata Banerjee promised WB would not

    implement NRC, providing partial reassurance.

    '
