- slug: covid_lockdown_tea_garden_wage_loss
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: 'COVID lockdown: Dooars tea estates shut; Kalchini workers without wages
    for weeks'
  summary: 'National lockdown (25 March) closed tea estates across the Dooars.

    Workers received no wages from March 25 to April 12. WB gardens reopened

    at 25% capacity (Assam allowed 50%), compounding the inequity. Temporary

    workers (50% of workforce) had no legal wage claim. COVID created layered

    distress: lost wages, food shortage, and eviction fear from garden quarters.

    '
