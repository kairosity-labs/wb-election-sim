  intensity: 4
  headline: Jaldhaka and Torsa overflow; Kalchini belt tea-garden labour lines inundated
  summary: 'Heavy monsoon rainfall caused Jaldhaka and Torsa rivers to breach banks

    in Alipurduar district. Timber from Bhutan''s forests blocked drainage,

    worsening destruction. Losses in North Bengal tea gardens exceeded Rs 50

    crore. Workers in Kalchini faced simultaneous COVID wage loss and flood

    damage to homes — a compound crisis with no state compensation mechanism.

    '
