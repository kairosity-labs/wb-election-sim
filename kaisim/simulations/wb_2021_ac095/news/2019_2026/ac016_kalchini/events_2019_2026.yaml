  intensity: 3
  headline: Duare Sarkar launched; camps in Kalchini gram panchayats enroll tea-garden
    women in welfare schemes
  summary: 'WB''s Duare Sarkar doorstep delivery program began in December 2020,

    deploying TMC workers to enrol beneficiaries for Swasthya Sathi, Khadya

    Sathi, Jai Johar (tribal welfare), and Kanyashree at gram panchayat

    level. Camps in Kalchini''s labour lines gave TMC a visible service-

    delivery role ahead of the 2021 assembly election, though critics noted

    barriers for temporary and contract workers.

