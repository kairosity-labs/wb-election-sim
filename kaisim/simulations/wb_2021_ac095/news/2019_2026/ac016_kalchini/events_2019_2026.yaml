  summary: 'Tribal communities on the Buxa Tiger Reserve fringe adjacent to Kalchini

    block report systematic FRA claim rejection by the Forest Department.

    Relocation proceedings against Jayanti and Bhutia Basti settlements

    continued without resolving community forest rights. This dispossession

    anxiety compounds economic stress and is a perennial mobilisation issue

