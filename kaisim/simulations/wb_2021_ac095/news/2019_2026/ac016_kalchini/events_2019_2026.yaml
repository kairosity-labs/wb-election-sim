  summary: 'John Barla was sworn in as Union Minister of State for Minority Affairs

    on 7 July 2021. BJP portrayed this as fulfilling the tribal community''s

    political aspirations. Barla immediately pledged to work for tea labourers.

    In Kalchini, expectations rose that PF arrears and garden closures would

    be resolved through central intervention — expectations that would remain

    largely unmet, building later disillusionment.

