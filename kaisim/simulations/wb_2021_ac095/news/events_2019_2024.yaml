# Bangaon Uttar (AC-95) — voter-salient event chronology, Dec 2019 → 20 May 2024.
# Built from 3-agent ensemble research (consensus). Each event has:
#   scope:        national | state | district | AC
#   intensity:    1-5 (5 = top-of-mind for affected voters)
#   temporal:     chronic (multi-month drift) | episodic (single-date shock)
#   tags:         which persona-identity tags this touches
#   valence:      tag → "positive"|"negative"|"ambient" (which way it pushes)
#   broadcast:    true if the event reaches everyone via TV/state-press by default
#   sources:      list of URLs (audit-grade)
#
# Selection logic uses scope + intensity + tag-overlap (with persona's tags) +
# media_engagement to decide which personas this event reaches each month.

cutoff_date: "2024-05-20"   # Phase 5 polling for Bangaon LS

events:
  # ───────────── 2020 ─────────────

  - slug: covid_first_wave_lockdown
    date_start: "2020-03-25"
    date_end: "2020-06-30"
    temporal: chronic
    scope: national
    intensity: 5
    headline: "PM Modi announces 21-day national COVID lockdown; migrant labour crisis ensues"
    summary: |
      Modi declared a national lockdown effective 25 Mar 2020. WB is one of
      India's largest source states for inter-state migrant labour. Tens of
      thousands of Bangaon-area Matua men working in Kerala / TN / Maharashtra
      / Gulf were stranded without wages; the "Shramik Specials" returned
      most by June. Reset household earnings baseline downward for 18+ months.
    tags: [out_migrant_household, ag_labourer, urban_trader, petrapole_economy, woman]
    valence:
      out_migrant_household: negative   # ground-level economic shock
      cultivator: ambient
      muslim_voter: ambient
      bjp_supporter: negative           # central govt blamed for chaos
    broadcast: true
    sources:
      - https://www.hrw.org/news/2020/03/27/india-covid-19-lockdown-puts-poor-risk
      - https://en.wikipedia.org/wiki/COVID-19_pandemic_in_India

  - slug: amphan_landfall
    date: "2020-05-20"
    temporal: episodic
    scope: state
    intensity: 5
    headline: "Super Cyclone Amphan landfall near Bakkhali; ~$14bn damage in WB"
    summary: |
      Super-cyclonic landfall ~14:30 IST. ~5,500 homes damaged in N24P alone;
      88,000 ha paddy and 200,000 ha vegetables destroyed. Bangaon sub-division
      saw heavy rain, crop loss, and weeks-long power outages. Allegations of
      relief-list corruption (TMC panchayat-level "cut-money") seeded 2020-21
      anti-incumbency narrative.
    tags: [cultivator, ag_labourer, woman, elderly]
    valence:
      tmc_supporter: negative   # cut-money scandal
      cultivator: negative
    broadcast: true
    sources:
      - https://en.wikipedia.org/wiki/Cyclone_Amphan
      - https://thewire.in/environment/ground-report-cyclone-amphan-bengal-north-24-parganas

