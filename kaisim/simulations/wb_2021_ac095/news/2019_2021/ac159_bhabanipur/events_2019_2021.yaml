  headline: Anti-CAA sit-in protests at Park Circus, Kolkata — sustained through Jan-Mar
    2020
  summary: 'Park Circus maidan in south Kolkata, adjacent to Bhabanipur, hosted sustained
    anti-CAA

    sit-in protests modelled on Delhi''s Shaheen Bagh. Muslim women led the demonstrations,

    drawing solidarity from bhadralok intellectuals and students. The protests kept
    CAA-NRC

    anxiety high among Bhabanipur''s Muslim pocket and reinforced Mamata''s protective

    narrative as the BJP accused her of ''appeasement.''

    '
