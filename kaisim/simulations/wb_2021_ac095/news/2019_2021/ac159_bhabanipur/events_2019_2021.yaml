  headline: Mamata chooses Nandigram over Bhabanipur to fight Suvendu; Sovandeb Chattopadhyay
    holds fort
  summary: 'Mamata Banerjee announced she would contest from Nandigram (her challenger
    Suvendu

    Adhikari''s stronghold) rather than her safe Bhabanipur seat, where she installed
    senior

    TMC minister Sovandeb Chattopadhyay. The move was a high-risk personal statement
    but left

    Bhabanipur as a managed seat. Local Bhabanipur voters felt a mix of pride in Mamata''s

    boldness and concern about her winning from an unfamiliar seat.

    '
