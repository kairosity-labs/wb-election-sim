  summary: 'Mamata Banerjee suffered a leg injury in Nandigram on 10 March 2021 which
    she and

    TMC attributed to a BJP-engineered attack. She continued campaigning from a wheelchair,

    generating massive sympathy especially among women voters. In Bhabanipur, the
    incident

    hardened TMC support; the wheelchair imagery became a rallying symbol for ''Didi''
    loyalists

    and the woman voter bloc.

    '
