  summary: 'Chief Minister Mamata Banerjee led a large protest march through central
    Kolkata against

    the CAA and NRC on 19 December 2019, passing through mixed-religion areas close
    to

    Bhabanipur. The march consolidated her as the dominant anti-CAA leader nationally
    and

    reassured Bhabanipur''s Muslim residents of state protection while signalling
    to

    liberal bhadralok her commitment to constitutional values over BJP majoritarianism.

    '
