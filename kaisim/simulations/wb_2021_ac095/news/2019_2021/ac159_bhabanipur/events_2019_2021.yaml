  headline: 'TMC releases ''Didir Shopoth'' manifesto: Lakshmir Bhandar Rs 500/month
    for every women'
  summary: 'Mamata Banerjee released the TMC''s 2021 election manifesto ''Didir Shopoth''
    (Didi''s

    Pledge), headlined by the Lakshmir Bhandar scheme giving Rs 500/month (Rs 1,000
    for SC/ST)

    to women heads of household. For Bhabanipur''s large domestic-worker and homemaker

    population, this was a direct cash transfer promise. The manifesto also promised

    continued free ration (Khadya Sathi) and 10 lakh government jobs.

    '
