    Chandra Kumar Bose significantly closed the gap, signalling an urban Hindu swing.

    Bhabanipur wards showed a tighter race than 2014, reflecting bhadralok dissatisfaction

    with governance and the BJP''s Hindutva pitch resonating among upper-caste voters.

    '
