- slug: wb_ae2021_bhabanipur_sovandeb_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Sovandeb Chattopadhyay (TMC) wins Bhabanipur by 28,719 votes over BJP's
    Rudranil Ghosh
  summary: 'In the 2021 West Bengal Assembly election, TMC''s Sovandeb Chattopadhyay
    secured 73,505

    votes, defeating BJP''s Rudranil Ghosh (44,786). The margin reflected strong TMC
    support

    among Muslim voters (~25%) and the bhadralok, while BJP performed well in Gujarati-Marwari

    wards. The seat was held for Mamata Banerjee who had simultaneously lost Nandigram
    to

    Suvendu Adhikari by a razor-thin margin — necessitating a by-election.

    '
