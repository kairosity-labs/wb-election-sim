  date: '2020-05-20'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Super-cyclone Amphan devastates Kolkata; Bhabanipur suffers tree-fall,
    power outages
  summary: 'Super-cyclone Amphan made landfall near Digha on 20 May 2020, causing
    widespread

    destruction across Kolkata including Bhabanipur. Uprooted trees blocked major
    roads

    and power cuts lasted days in urban south Kolkata. Mamata''s immediate field presence

    and the state''s relief operations boosted her credibility; however, TMC''s reportedly

    uneven distribution of relief funds drew some criticism from opposition.

    '
