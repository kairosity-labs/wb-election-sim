  intensity: 5
  headline: COVID second wave (Delta) devastates Kolkata; hospitals overwhelmed, oxygen
    shortage
  summary: 'The Delta variant-driven second COVID wave hit Kolkata hard from April
    2021. Kolkata''s

    urban hospitals, including SSKM and NRS adjacent to Bhabanipur, ran out of beds
    and

    oxygen. Bhabanipur''s professional and bhadralok families directly experienced
    the crisis

    or knew those who did. Election campaigns were curtailed; the daily death toll
    became

    the dominant political subtext.

    '
