- slug: wb_ae2021_state_result_tmc_landslide
  date: '2021-05-02'
  temporal: episodic
  scope: state
  intensity: 5
  headline: TMC wins 213/294 seats; Mamata re-elected CM but loses Nandigram to Suvendu
  summary: 'TMC won a decisive third term, securing 213 seats against BJP''s 77. But
    the shock of

    Mamata personally losing Nandigram (officially by 1,956 votes, disputed by TMC)
    meant she

    needed a by-election to become MLA within six months to retain the Chief Ministership.

    Bhabanipur was the obvious seat; Sovandeb Chattopadhyay would need to vacate it
    for her.

    The Bhabanipur by-election became the defining post-election political moment.

    '
