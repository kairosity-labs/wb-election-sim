- slug: caa_passed_parliament
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 5
  headline: CAA passed in Parliament; Bhabanipur's Gujarati-Jain community celebrates,
    Muslim pocket anxious
  summary: 'The Citizenship (Amendment) Act 2019 granted fast-track citizenship to
    Hindu, Sikh,

    Buddhist, Jain, Parsi and Christian refugees from three Muslim-majority neighbours.

    In Bhabanipur, wards 70-72 housing Gujarati, Marwari and Jain traders broadly
    welcomed

    the measure. The ~25% Muslim electorate — concentrated in adjacent areas — felt

    directly excluded and feared the CAA-NRC combination. Mamata declared WB would

    never implement NRC, making Bhabanipur a front-row seat for this national fault-line.

    '
