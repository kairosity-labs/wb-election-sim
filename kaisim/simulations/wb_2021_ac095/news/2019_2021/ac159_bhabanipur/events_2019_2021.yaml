- slug: post_poll_violence_kolkata_2021
  date: '2021-05-02'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Post-poll violence erupts across Bengal after TMC win; Kolkata sees BJP
    worker attacks
  summary: 'Following the TMC landslide, violence broke out in multiple districts
    and in Kolkata

    against BJP workers and supporters. The NHRC documented ~1,979 complaints and
    ~15,000

    victims statewide. In urban Kolkata including areas adjacent to Bhabanipur, some
    BJP

    supporters were attacked or displaced. The violence became a BJP rallying issue
    nationally

    and fed into the narrative of ''TMC goonda raj'' in the by-election campaign.

    '
