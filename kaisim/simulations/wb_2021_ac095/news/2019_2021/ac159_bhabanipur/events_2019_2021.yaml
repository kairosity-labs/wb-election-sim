  intensity: 4
  headline: Assam NRC final list excludes 19 lakh; Bengali Hindu anxieties spike across
    Bengal
  summary: 'The final NRC list excluded ~19 lakh people from Assam, disproportionately
    Bengali

    Hindus. In Bhabanipur, educated bhadralok and the large Marwari-Gujarati trading
    community

    watched closely; Muslim residents feared the NRC template could spread to West
    Bengal.

    Mamata called the NRC a ''conspiracy'' — her stand resonated strongly in this
    mixed-religion

    urban constituency.

    '
