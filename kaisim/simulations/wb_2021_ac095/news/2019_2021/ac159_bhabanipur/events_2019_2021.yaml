  date: '2020-12-19'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Suvendu Adhikari quits TMC, joins BJP at Amit Shah rally in Midnapore
  summary: 'Suvendu Adhikari, a powerful TMC leader, resigned from the party and joined
    the BJP at

    an Amit Shah rally on 19 December 2020. For Bhabanipur''s political class, the
    defection

    — the most significant since TMC''s founding — signalled an internal TMC crisis
    and gave

    BJP momentum. The bhadralok and trading communities watched closely whether this

    would prompt further TMC splits ahead of the 2021 elections.

    '
