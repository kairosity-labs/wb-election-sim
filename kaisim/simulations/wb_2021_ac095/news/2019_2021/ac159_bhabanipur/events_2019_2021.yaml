- slug: covid_lockdown_march2020
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: National COVID lockdown collapses Kolkata's urban economy; Bhabanipur
    traders hit
  summary: 'The Modi government''s 21-day nationwide lockdown from 25 March 2020 shuttered

    Bhabanipur''s dense commercial zones — Rashbehari Connector, Gariahat, Hazra Road
    markets —

    overnight. Gujarati and Marwari wholesale and retail traders faced acute cash-flow

    disruption. The bhadralok professional class moved to work-from-home. Both groups

    blamed central government mismanagement; the state government''s relief packages

    were limited but visible.

    '
