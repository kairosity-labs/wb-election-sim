  date: '2020-12-01'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Swasthya Sathi health scheme extended to all WB residents from 1 December
    2020
  summary: 'Mamata Banerjee universalised the Swasthya Sathi cashless health insurance
    (up to

    Rs 5 lakh/family) to cover every West Bengal resident regardless of income or
    caste.

    In urban Bhabanipur, this was especially salient for the city''s large domestic-worker

    and small-trader workforce who lacked formal health coverage. The scheme''s smart-card

    linkage and broad private-hospital empanelment made it tangible to the urban middle
    class.

    '
