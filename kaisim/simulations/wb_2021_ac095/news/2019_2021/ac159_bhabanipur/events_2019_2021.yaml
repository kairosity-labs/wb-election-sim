  summary: 'The BJP''s 2021 manifesto promised full CAA implementation, a Hindutva
    cultural agenda,

    33% reservation for women in government jobs, and a uniform civil code study commission.

    In Bhabanipur, the CAA promise appealed to the Gujarati/Jain community while alarming

    Muslim voters. The manifesto''s ''double engine'' governance pitch resonated with
    some

    bhadralok who saw TMC''s decade as corruption-ridden.

    '
