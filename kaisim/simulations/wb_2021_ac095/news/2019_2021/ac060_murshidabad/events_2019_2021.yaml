  - slug: covid_lockdown_march_2020
    date: "2020-03-25"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "National COVID lockdown halts Murshidabad's silk industry and forces thousands of migrant workers to return"
    summary: |
      The nationwide COVID lockdown devastated Murshidabad's twin economic pillars:
      the silk/mulberry weaving sector and out-migration labour. Tens of thousands of
      Murshidabad residents working in Kerala, Maharashtra, and Gujarat were stranded
      and subsequently returned home by Shramik Special trains through May 2020.
      Silk weaving — the livelihood of Muslim families in Jiaganj, Azimganj and
      Murshidabad town — ground to a halt as wholesale orders collapsed.
