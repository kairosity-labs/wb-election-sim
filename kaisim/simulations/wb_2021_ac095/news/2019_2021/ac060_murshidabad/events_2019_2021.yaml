# Murshidabad (AC-60) — voter-salient event chronology, Jan 2019 → 02 May 2021.
# Window terminates at WB Assembly Election 2021 result day.
# AC-60 is Murshidabad constituency in Murshidabad district (Murshidabad sub-division).
# Muslim-majority (~70% Muslim); historically a nawabi capital with Hazarduari Palace.
# Congress stronghold (Adhir Ranjan's base); 2021 AE: BJP won Murshidabad AC by 2,491 votes.

cutoff_date: "2021-05-02"   # WB AE 2021 counting day

