    headline: "BJP releases 'Sonar Bangla Sankalp Patra'; promises CAA implementation and Rs 3,000/month for women — deeply divisive in Muslim-majority Murshidabad"
    summary: |
      BJP's Sonar Bangla manifesto, released by Amit Shah, promised immediate CAA
      implementation (granting citizenship to non-Muslim refugees), Rs 3,000 monthly
      for women, and a "detect-delete-deport" policy on infiltrators. In Murshidabad,
      where 70% are Muslim, the CAA promise was experienced as a direct threat —
      imams warned that CAA combined with NRC would render Muslims stateless. The
      Rs 3,000 women's payment promise was dismissed as a "jumla" in Muslim households
      given the anti-Muslim framing of the broader manifesto.
