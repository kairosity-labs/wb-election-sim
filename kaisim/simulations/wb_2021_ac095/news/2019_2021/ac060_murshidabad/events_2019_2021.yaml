    intensity: 5
    headline: "Delta wave Covid-19 devastates West Bengal; Murshidabad's hospitals overwhelmed with excess deaths 30x official count"
    summary: |
      The Delta variant's second wave hit Bengal hard in April-May 2021. In Murshidabad
      district, researchers estimated an undercount factor of 30.4 — meaning actual deaths
      were about 30 times official figures. Hospitals in Berhampore were overwhelmed. The
      wave struck during the ongoing AE 2021 campaign, forcing Mamata Banerjee to curtail
      rallies and Election Commission to defer later phases. For Muslim households with
      out-migrant members, the double shock of COVID mortality and income loss was severe.
