    date: "2020-05-10"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Thousands of Murshidabad migrants return by Shramik Special trains from Maharashtra and Kerala; relief camp shortfalls"
    summary: |
      Murshidabad, which has the highest out-migration rate in West Bengal, saw
      thousands of workers return by special trains from southern and western states
      in May 2020. Many returned to find their silk-weaving enterprises shuttered and
      agricultural land waterlogged from late-season rains. Relief camps organised by
      both state government and local Congress panchayat bodies were documented as
      inadequate, providing limited food and no cash. The experience hardened
      out_migrant_household grievances about safety nets.
