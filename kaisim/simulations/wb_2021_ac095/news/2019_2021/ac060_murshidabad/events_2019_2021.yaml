  - slug: wb_ae_2021_murshidabad_bjp_win
    date: "2021-05-02"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "BJP's Mohan Haldar wins Murshidabad AC by 2,491 votes over TMC's Shaoni Singha Roy in historic upset"
    summary: |
      In a major upset, BJP's Mohan Haldar won the Murshidabad Assembly seat (AC-60) in the
      2021 AE, defeating TMC's Shaoni Singha Roy by just 2,491 votes out of ~2.27 lakh cast.
      Haldar received 95,967 votes (42%) to Roy's 93,476 (41.3%). It was one of only two seats
      BJP captured in the entire Murshidabad district, where TMC swept 18 of 20 seats.
      The result reflected Hindu bhadralok consolidation behind BJP in this mixed-composition
      constituency; Congress collapsed entirely, with its base partly absorbed by TMC's Roy
      who had switched from Congress in 2021.
    tags: [muslim_voter, bhadralok, bjp_supporter, tmc_supporter, upper_caste_hindu]
