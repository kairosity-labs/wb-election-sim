  - slug: murshidabad_monsoon_flood_2020
    date: "2020-07-20"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Bhagirathi and Padma rivers breach embankments; tens of thousands displaced in Murshidabad district"
    summary: |
      Annual monsoon floods inundated large swathes of Murshidabad district in July 2020,
      with the Bhagirathi and Padma rivers breaching embankments at multiple points. Farming
      households in low-lying areas lost standing crops of paddy and vegetables. The flood
      compounded COVID-related economic distress, as no MGNREGA work had been available and
      migrant remittances had collapsed. State relief delivery was patchy, reinforcing
      community dependence on local Congress panchayat networks.
