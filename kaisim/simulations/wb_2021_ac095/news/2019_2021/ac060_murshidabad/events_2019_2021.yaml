  - slug: murshidabad_anti_caa_protests_december_2019
    date: "2019-12-14"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Mass anti-CAA demonstrations sweep Murshidabad town; thousands gather near Hazarduari"
    summary: |
      Within days of CAA's passage, thousands of Muslim residents, madrassa students and
      civil society activists staged large demonstrations in Murshidabad town near the
      Hazarduari complex. The protests were peaceful but intense, with imams leading prayers
      for constitutional protection. Congress and Left leaders joined the rallies, positioning
      against BJP's citizenship agenda. The scale of mobilisation reflected the constituency's
      deep political consciousness on citizenship rights.
