      (Rs 500/month for general women, Rs 1,000 for SC/ST), Swasthya Sathi health
      insurance for all families, and a student credit card scheme. In Muslim-majority
      Murshidabad where women's economic insecurity is high, the Lakshmir Bhandar
      promise carried strong electoral appeal. Mamata also reaffirmed that CAA and
      NRC would not be implemented in Bengal, directly targeting the Muslim constituency.
