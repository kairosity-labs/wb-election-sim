  - slug: ls_2019_berhampore_adhir_wins
    date: "2019-05-23"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "Adhir Ranjan Chowdhury wins Berhampore Lok Sabha for fifth consecutive time, consolidating Congress hold in Murshidabad"
    summary: |
      Congress veteran Adhir Ranjan Chowdhury retained the Berhampore LS seat for a fifth
      straight term in 2019, defeating TMC and BJP candidates and cementing Congress dominance
      in the Muslim-majority Murshidabad district. Within the Murshidabad AC segment, Congress
      retained strong street-level organisation through mosque networks and block-level workers.
      This victory reinforced Congress as the primary protector of Muslim interests in the district,
      setting up the Congress-TMC contest as the defining rivalry for the 2021 AE.
