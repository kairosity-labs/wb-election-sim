  summary: 'During the 2021 campaign BJP and Suvendu''s team circulated a counter-narrative

    about the 2007 Nandigram protests: that Muslim TMC cadres had later captured

    the panchayats and marginalised the Hindu peasants who fought the land agitation.

    This frame — "Hindus fought and Muslims benefited" — resonated deeply among

    cultivator households in Nandigram-II block (87% Hindu) and among upper caste

    Hindus who perceived TMC''s Muslim-appeasing politics as threatening. Suvendu''s

    personal credibility as a 2007 agitation participant gave the narrative force.

    '
