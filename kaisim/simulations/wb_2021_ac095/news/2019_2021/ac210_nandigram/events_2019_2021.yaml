- slug: cyclone_amphan_may_2020
  date: '2020-05-20'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Super Cyclone Amphan devastates Purba Medinipur; Nandigram farmland and
    housing destroyed
  summary: 'Super Cyclone Amphan made landfall on 20 May 2020 with 175 km/h winds,

    directly hitting Purba Medinipur. In Nandigram, coastal low-lying farmlands

    were inundated, mud-and-thatch housing collapsed, and standing kharif crops

    were destroyed. Damage compounded COVID-19 economic stress. Relief distribution

    became immediately politicised: TMC panchayat leaders controlled allocation;

    BJP accused them of partisan distribution. The event created lasting grievances

    about relief adequacy among cultivator and ag_labourer communities.

    '
