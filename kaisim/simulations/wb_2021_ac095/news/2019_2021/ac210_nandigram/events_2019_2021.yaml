  headline: 'Nandigram polling day: Mamata sits in booth for 2 hours, TMC-BJP clashes,
    63 complaints filed'
  summary: 'On 1 April 2021 (Phase 2 of WB AE), Nandigram saw intense electoral violence

    and mutual accusations. Mamata Banerjee remained at a Boyal village booth for

    nearly two hours alleging BJP workers were blocking voters; she telephoned

    Governor Jagdeep Dhankar from the booth. TMC filed 63 complaints in a single

    day; BJP counter-alleged voter intimidation by TMC musclemen. CAPF was deployed

    throughout but both sides accused forces of bias. The day cemented Nandigram as

    a booth-level warfare constituency where counting results would be disputed.

    '
