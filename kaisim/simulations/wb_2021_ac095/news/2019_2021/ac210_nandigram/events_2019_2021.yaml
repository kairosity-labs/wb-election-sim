  intensity: 4
  headline: Mamata Banerjee injured at Birulia market, Nandigram; alleges BJP attack,
    EC rules accident
  summary: 'On 10 March 2021, after filing her nomination at Haldia SDO, CM Mamata
    Banerjee

    sustained serious leg injuries at Birulia market in Nandigram under disputed

    circumstances. She alleged a BJP-orchestrated attack; EC special observers ruled

    it accidental (car door hitting an iron pillar). Banerjee campaigned in a wheelchair

    thereafter, generating national sympathy and making "beti-bachao" a TMC counter-

    narrative. Nandigram voters were sharply divided on whether the injury was staged

    or genuine — Hindu and Muslim communities split differently on the allegation.

    '
