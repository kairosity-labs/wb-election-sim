- slug: caa_passed_parliament_2019
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: CAA 2019 passed; BJP frames it as Hindu protection, TMC leads protests
    in Bengal
  summary: 'Parliament passed the Citizenship Amendment Act on 11 December 2019, offering

    fast-track citizenship to non-Muslim minorities from three neighbouring countries.

    In predominantly Hindu Nandigram, upper-caste Hindu and bhadralok voters broadly

    welcomed it as a Hindu security measure. Muslim voters (~34% in Nandigram-I block)

    viewed it with alarm. CM Mamata Banerjee declared she would not implement it in

    West Bengal, winning Muslim loyalty but alienating Hindu consolidation.

    '
