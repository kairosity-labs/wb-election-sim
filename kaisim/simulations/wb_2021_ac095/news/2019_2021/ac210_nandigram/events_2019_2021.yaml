- slug: covid_lockdown_march_2020
  date: '2020-03-24'
  temporal: episodic
  scope: national
  intensity: 4
  headline: National COVID lockdown announced; agricultural labourers in Nandigram
    lose daily wages
  summary: 'PM Modi announced a nationwide lockdown from 25 March 2020, halting all

    non-essential activity. In Nandigram''s agrarian economy, cultivators and

    agricultural labourers lost both farm market access and MGNREGA work.

    Out-migrant households faced crisis as family members returned from

    cities. The lockdown triggered acute economic distress that coloured

    all subsequent welfare-scheme delivery perception.

    '
