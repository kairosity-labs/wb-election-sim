  temporal: chronic
  scope: national
  intensity: 5
  headline: 'Nandigram 2007: CPM police firing kills 14 peasants opposing SEZ land
    acquisition'
  summary: 'On 14 March 2007 police opened fire on farmers resisting forced acquisition
    of

    10,000 acres for a Salim Group chemical SEZ, killing at least 14 and leaving

    over 100 missing. The Bhumi Uchhed Pratirodh Committee (BUPC) had blockaded

    Nandigram since January 2007. The massacre became a national scandal that

    ended 34 years of Left Front rule and made Mamata Banerjee a peasant hero —

    yet also embedded a deep distrust of any state land-acquisition in cultivator

    and ag_labourer memory that persists into 2021.

    '
