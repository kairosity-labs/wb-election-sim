- slug: nandigram_2021_result_suvendu_wins
  date: '2021-05-02'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu Adhikari (BJP) defeats Mamata Banerjee (TMC) by 1,956 votes; India's
    most-watched result
  summary: 'On 2 May 2021, Suvendu Adhikari won Nandigram by 1,956 votes (BJP 1,10,764
    vs

    TMC 1,08,808), the narrowest margin in the most-watched constituency in India.

    The 17-round count was marred by server failures, a 4-hour delay, and a dramatic

    17th-round postal ballot swing that reversed earlier TMC leads. Mamata immediately

    alleged fraud, demanded a recount; EC rejected the demand, directing her to court.

    Suvendu''s win made him BJP''s LoP in the West Bengal Assembly. TMC won the state

    with 213 seats — leaving Nandigram as BJP''s symbolic fortress in south Bengal.

    '
