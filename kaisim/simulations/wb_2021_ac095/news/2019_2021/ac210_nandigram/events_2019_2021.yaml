  temporal: episodic
  scope: state
  intensity: 5
  headline: Mamata Banerjee announces she will contest from Nandigram, challenging
    Suvendu directly
  summary: 'At a rally in Nandigram on 18 January 2021, Chief Minister Mamata Banerjee

    announced she would abandon her safe Bhawanipur seat and contest from Nandigram

    against her former protégé Suvendu Adhikari. Suvendu immediately accepted,

    vowing to quit politics if he did not win by 50,000 votes. The announcement

    transformed Nandigram from a district-level contest into the most-watched

    constituency in India — making every local grievance and welfare delivery

    outcome a nationally televised political event.

    '
