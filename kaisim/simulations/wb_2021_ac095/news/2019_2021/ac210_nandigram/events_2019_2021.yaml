  summary: 'The Assam NRC final list published 31 August 2019 left out ~19.6 lakh
    people,

    including a large share of Bengali Hindus, contradicting BJP''s initial anti-Muslim

    framing. In Nandigram, where Hindu cultivators retain memory of displacement anxieties,

    the result created confusion: TMC exploited it as an "anti-Bengali" BJP betrayal

    while BJP promised CAA as the protective shield.

    '
