  headline: Suvendu Adhikari (BJP) files nomination for Nandigram; Adhikari dynasty's
    full weight behind him
  summary: 'Suvendu Adhikari, son of Kanthi MP Sisir Adhikari and sitting Nandigram
    MLA,

    filed as BJP candidate on the day Mamata filed hers. His affidavit showed

    substantial declared assets; he carried no criminal conviction record at

    nomination. His ground machine — built over a decade as TMC transport minister

    and inherited from his father''s Kanthi belt political network — gave BJP a

    booth-level presence in Nandigram far superior to any other seat. Upper caste

    Hindu and bhadralok voters saw him as a known quantity defending Hindu interests.

    '
