- slug: suvendu_adhikari_joins_bjp_dec_2020
  date: '2020-12-19'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu Adhikari quits TMC, joins BJP at Amit Shah rally; Nandigram goes
    to its own MLA
  summary: 'On 19 December 2020, Suvendu Adhikari formally joined BJP at a Midnapore
    rally

    in the presence of Home Minister Amit Shah, ending his decade-long career as

    Mamata Banerjee''s most powerful lieutenant in Purba Medinipur. For Nandigram

    voters who knew him as their sitting MLA since 2016 and the 2007 land-agitation

    hero, his defection was the most consequential single event of the pre-election

    period: his booth-level machine and the Adhikari family network (father Sisir

    as Kanthi MP) immediately pivoted to BJP, rewiring the constituency''s entire

    political calculus overnight.

    '
