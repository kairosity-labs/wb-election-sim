# Sandeshkhali (AC-130) — voter-salient event chronology, Jan 2019 → 02 May 2021.
# Window terminates at WB Assembly Election 2021 result day.
# Constituency: North 24 Parganas, Basirhat sub-division, Sandarbans fringe.
# Reserved: Scheduled Tribe (ST).

