    summary: |
      Sandeshkhali (ST) went to the polls in Phase 1 of the 2021 WB Assembly
      Election on April 6. Central forces were deployed across the Sundarban fringe
      constituencies after BJP filed multiple complaints of TMC booth management.
      Turnout was high. The TMC candidate Sukumar Mahata faced BJP's Dr. Bhaskar
      Sardar in a straight fight, with the CPM fielding a token candidate.
