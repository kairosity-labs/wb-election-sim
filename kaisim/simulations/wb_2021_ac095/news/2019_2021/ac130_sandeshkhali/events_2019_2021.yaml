  - slug: ae2021_sandeshkhali_tmc_wins
    date: "2021-05-02"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "TMC's Sukumar Mahata wins Sandeshkhali by 39,685 votes; BJP's Bhaskar Sardar distant second"
    summary: |
      TMC candidate Sukumar Mahata won Sandeshkhali (ST) with 112,450 votes
      against BJP's Dr. Bhaskar Sardar's 72,765 — a comfortable 39,685-vote
      margin. TMC's vote share was 54.64% against BJP's 35.36%. The result
      reflected the combined pull of Lakshmir Bhandar promises, Muslim bloc
      voting, and TMC's panchayat infrastructure, despite Amphan relief anger.
      CPM was a distant third with negligible share.
