    headline: "Suvendu Adhikari resigns from TMC, joins BJP with nine MLAs; shakes Bengal politics"
    summary: |
      Suvendu Adhikari, a heavyweight TMC organiser from Nandigram, formally
      joined BJP in the presence of Amit Shah on December 19, 2020, along with
      nine TMC MLAs and one MP. The mass defection signalled the most serious
      threat to TMC since 2011 and emboldened BJP's Basirhat belt candidates.
      In Sandeshkhali, where BJP had been gaining ground since 2019, the defection
      raised expectations of anti-TMC consolidation.
