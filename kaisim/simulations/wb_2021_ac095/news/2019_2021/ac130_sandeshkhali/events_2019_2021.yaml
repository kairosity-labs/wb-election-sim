  - slug: krishak_bandhu_launch
    date: "2019-01-31"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "TMC launches Krishak Bandhu scheme — Rs 5,000/acre/year direct income for farmers"
    summary: |
      The Mamata government launched Krishak Bandhu in January 2019, providing
      annual income support of up to Rs 10,000 per acre per farmer plus a Rs 2 lakh
      death benefit for farming families. In Sandeshkhali, where paddy cultivation
      and fish farming are the primary livelihoods, landholding cultivators welcomed
      the scheme, although landless ag-labourers and sharecroppers received less
      benefit. Over 90 lakh farmers statewide were enrolled.
    tags: [cultivator, krishak_bandhu_beneficiary, ag_labourer]
