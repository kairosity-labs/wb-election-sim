    summary: |
      Chief Minister Mamata Banerjee extended Swasthya Sathi — providing up to
      Rs 5 lakh annual health cover — to all West Bengal residents irrespective
      of caste, religion or income, effective December 1, 2020. In Sandeshkhali,
      where access to tertiary healthcare is difficult and tiger-attack injuries
      create sudden medical costs, this scheme's universalisation was particularly
      significant for poor fishing and cultivator households.
