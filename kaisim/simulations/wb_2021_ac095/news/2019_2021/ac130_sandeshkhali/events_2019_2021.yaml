  - slug: nrc_assam_final_list_2019
    date: "2019-08-31"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Assam NRC final list excludes 19 lakh; Muslim Bengali families fear statelessness"
    summary: |
      The Assam NRC final list excluded approximately 19 lakh people, including
      significant numbers of Bengali Muslims. In Sandeshkhali, where Muslim voters
      comprise roughly 35-40% of the electorate and many families have tenuous
      documentation as Sundarban settlers, the NRC triggered acute anxiety about
      possible extension to West Bengal. TMC's vocal opposition to NRC extension
      consolidated Muslim vote behind Mamata.
