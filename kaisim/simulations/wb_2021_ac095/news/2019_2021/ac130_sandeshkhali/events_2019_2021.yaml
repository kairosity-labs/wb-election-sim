    date: "2020-12-01"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "Duare Sarkar programme rolls out; scheme enrollment camps reach Sandeshkhali gram panchayats"
    summary: |
      The Duare Sarkar initiative — delivering 11 state welfare schemes at
      gram panchayat-level camps — launched on December 1, 2020. In Sandeshkhali
      and surrounding Sundarban blocks, where paved road access is limited and
      government offices distant, the doorstep delivery model enabled mass
      enrollment in Swasthya Sathi, Khadya Sathi, and Kanyashree. Over 2.75 crore
      beneficiaries enrolled statewide in Phase I.
