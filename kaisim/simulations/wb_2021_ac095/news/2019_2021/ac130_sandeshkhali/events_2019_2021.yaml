    headline: "TMC wins WB AE 2021 with 213/294 seats; Mamata returns for third term"
    summary: |
      TMC swept the 2021 West Bengal Assembly Election with 213 seats against
      BJP's 77, a decisive mandate. In North 24 Parganas, TMC won the bulk of
      seats including Sandeshkhali. Mamata's personal victory over Suvendu
      Adhikari was reversed in Nandigram, but she returned to power comfortably
      from Bhabanipur in a by-poll. In Sandeshkhali, Lakshmir Bhandar and
      anti-NRC sentiment proved decisive.
