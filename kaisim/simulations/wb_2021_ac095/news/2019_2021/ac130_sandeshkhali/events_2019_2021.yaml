  - slug: covid_lockdown_march2020
    date: "2020-03-25"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "India-wide COVID lockdown strands Sandeshkhali's out-migrant fishermen and labourers"
    summary: |
      The nationwide COVID-19 lockdown from March 25, 2020, cut off hundreds of
      Sandeshkhali residents working as migrant labourers in Kerala, Gujarat and
      Kolkata. Reverse migration flooded the Sundarban fringe villages, creating
      acute food insecurity. With fishing operations curtailed and MGNREGA still
      functioning, the community faced distress; returning migrants were
      stigmatised as potential virus carriers by neighbours.
