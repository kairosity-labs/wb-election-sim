  - slug: mamata_anti_caa_rally_dec2019
    date: "2019-12-26"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "Mamata leads massive anti-NRC-CAA march in Kolkata, reassures Muslim voters"
    summary: |
      CM Mamata Banerjee led a large procession from Raja Bazar to Mullick Bazar,
      declaring West Bengal would never implement NRC or CAA. The rally drew
      widespread Muslim participation and signalled TMC's protection strategy
      for minority voters. In Sandeshkhali, local TMC networks amplified
      the message through mosques and SHG networks, strengthening the TMC-Muslim
      voter bond ahead of the 2021 assembly election.
