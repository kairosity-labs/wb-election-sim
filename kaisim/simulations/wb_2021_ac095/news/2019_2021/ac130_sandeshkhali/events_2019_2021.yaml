    summary: |
      TMC's 2021 election manifesto, released with 10 guarantees, headlined the
      Lakshmir Bhandar scheme offering monthly cash of Rs 1,000 to SC/ST women
      and Rs 500 to general-category women aged 25-60. In Sandeshkhali, a
      predominantly SC/ST reserved constituency with high female poverty, this
      was the single most-discussed welfare promise. Women in fishing and
      agricultural households saw it as tangible income security.
