  - slug: caa_passed_parliament_dec2019
    date: "2019-12-11"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Citizenship Amendment Act passed in Parliament; Bengal erupts in protests"
    summary: |
      Parliament passed CAA on December 11, 2019, offering citizenship to
      non-Muslim refugees from Bangladesh, Pakistan and Afghanistan. In
      Sandeshkhali, Muslim voters viewed this as discriminatory and feared
      CAA-NRC combination would render them stateless. Hindu Namasudra and
      upper-caste Hindu residents saw it as relief for persecuted Bangladeshi
      Hindus. CM Mamata Banerjee declared she would not implement CAA in Bengal.
    tags: [muslim_voter, upper_caste_hindu, tmc_supporter, bjp_supporter]
