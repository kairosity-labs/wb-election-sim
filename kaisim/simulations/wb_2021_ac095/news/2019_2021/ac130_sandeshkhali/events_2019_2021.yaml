    temporal: episodic
    scope: AC
    intensity: 4
    headline: "Basirhat LS retained by TMC's Nusrat Jahan over BJP; Sandeshkhali segment narrowly TMC"
    summary: |
      Nusrat Jahan (TMC) won Basirhat Lok Sabha constituency by a reduced margin,
      with BJP riding a surge across North 24 Parganas. Within the Sandeshkhali
      assembly segment, TMC's lead shrank from 2014 as BJP mobilised Hindu voters
      on CAA/NRC anxieties and anti-cut-money anger. BJP won 18 WB LS seats
      statewide, signalling a competitive 2021 AE challenge.
