  - slug: cyclone_amphan_may2020
    date: "2020-05-20"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "Super Cyclone Amphan makes direct hit on Sandeshkhali; embankments breach, fish stock wiped"
    summary: |
      Amphan, the strongest Bay of Bengal cyclone in two decades, made landfall
      near Sagar on May 20, 2020, and devastated Sandeshkhali and Minakhan blocks.
      Embankments breached in Sandeshkhali II block; the Bidhyadhari river
      embankment suffered three breaches in Minakhan, destroying fish stocks.
      Government evacuated 200,000 people from North 24 Parganas; 5,500 homes
      were damaged district-wide. Paddy fields were inundated with saline water.
    tags: [cultivator, ag_labourer, woman, elderly, khadya_sathi_beneficiary]
