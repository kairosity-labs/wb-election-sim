  - slug: amphan_relief_cutmoney_scam
    date: "2020-06-20"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "TMC panchayat leaders in North 24 Parganas accused of siphoning Amphan relief funds"
    summary: |
      Over 2,100 complaints of Amphan relief corruption poured in to the state
      government within weeks of the cyclone, including from North 24 Parganas.
      Local TMC panchayat members were accused of funnelling compensation to
      relatives whose homes were undamaged, denying funds to genuine victims.
      In Sandeshkhali and surrounding Minakhan blocks, where TMC strongmen already
      ran a parallel authority, this eroded residual goodwill toward the party
      among non-partisan cultivators and women.
