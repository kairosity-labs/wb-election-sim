  - slug: post_ls2019_basirhat_violence
    date: "2019-05-26"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Post-election violence in Basirhat-North 24 Parganas kills TMC and BJP workers"
    summary: |
      Following the 2019 Lok Sabha result, clashes between TMC and BJP workers
      erupted across North 24 Parganas, including Basirhat subdivision, leaving
      multiple workers dead. A TMC worker identified as Qayyum Mollah was shot and
      hacked to death; BJP leaders Pradip and Sukanta Mondal were also killed.
      Violence reinforced fear of TMC muscle among non-TMC voters in Sandeshkhali.
    tags: [bjp_supporter, tmc_supporter, ag_labourer]
