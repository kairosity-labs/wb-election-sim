  # ───────────── 2020 ─────────────

  - slug: covid_lockdown_tea_garden_wage_loss
    date: "2020-03-25"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "National lockdown; Kalchini tea gardens shut, ~2,000+ workers lose daily wage for 3+ weeks"
    summary: |
      The nationwide COVID-19 lockdown from 25 March closed tea estates across
      the Dooars. Workers at gardens in Kalchini block — many already dependent
      on FAWLI from the Kalchini Tea Estate closure — received no wages for
      the period March 25 to April 12. The Ministry of Home Affairs granted
      tea industry an exemption from April 3, but WB gardens operated at only
      25% capacity. Temporary workers (nearly 50% of workforce) had no legal
      claim to wages during closure.
