  - slug: tmc_2021_manifesto_tea_wage
    date: "2021-03-25"
    temporal: episodic
    scope: state
    intensity: 3
    headline: "TMC 2021 manifesto promises wage revision for tea-garden workers and Jai Johar tribal welfare expansion"
    summary: |
      Trinamool Congress's 2021 manifesto included continuation of Jai Johar
      tribal welfare scheme and a commitment to pursue wage revision for tea
      workers. However, unlike BJP's specific land ownership pledge, the TMC
      promise was broadly worded. In Kalchini, where TMC had lost ground since
      2016, the manifesto was seen as too vague on the core wage issue —
      especially with the daily wage still at Rs 202 (having risen from Rs 67
      in 2011 but far below the Rs 351 demand).
