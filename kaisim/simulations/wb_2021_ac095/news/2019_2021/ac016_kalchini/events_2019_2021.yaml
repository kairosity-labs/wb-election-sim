  - slug: dooars_monsoon_flood_2020
    date: "2020-07-15"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Monsoon floods hit Dooars: Jaldhaka and Torsa overflow, tea gardens and labour lines inundated"
    summary: |
      Heavy monsoon rainfall caused the Jaldhaka and Torsa rivers to breach
      banks in Alipurduar district, inundating labour lines in multiple tea
      gardens in the Kalchini belt. Floating timber from Bhutan's forests
      blocked drainage channels, worsening destruction. Damage estimates in
      tea gardens across Dooars ran to over Rs 50 crore. Workers in Kalchini
      faced simultaneous COVID wage loss and flood damage to homes in mid-2020.
