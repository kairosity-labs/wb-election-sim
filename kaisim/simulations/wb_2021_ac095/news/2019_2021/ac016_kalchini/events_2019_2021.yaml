  - slug: kalchini_tea_estate_fawli_scheme
    date: "2019-02-08"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "Kalchini Tea Estate declared sick; ~2,003 workers put under FAWLI scheme at Rs 1,500/month"
    summary: |
      The management of Kalchini Tea Estate announced closure, leaving over
      2,000 workers without wages. The West Bengal government enrolled workers
      under FAWLI (Financial Assistance for Workers of Lockout Industries),
      providing Rs 1,500 per month — a fraction of the daily wage. Workers
      depended on this subsistence stipend for most of 2019, generating deep
      anger at both management and state for failure to reopen the garden.
