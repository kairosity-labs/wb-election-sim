  - slug: alipurduar_ls_2019_bjp_john_barla_wins
    date: "2019-05-23"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "BJP's John Barla (tribal, ex-tea worker) wins Alipurduar LS by 2.44 lakh over TMC's Dasrath Tirkey"
    summary: |
      John Barla, a tribal leader who worked in tea gardens in Alipurduar, swept
      the constituency with 54.4% of the vote (7.5 lakh votes) against TMC's
      Dasrath Tirkey (36.7%). Kalchini block was part of this sweeping BJP
      surge, driven by anti-incumbency against TMC and tribal solidarity with
      Barla. The win established BJP as the dominant force in the Dooars belt
      ahead of the 2021 assembly polls.
