    date: "2021-03-21"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "BJP releases 'Sonar Bangla' manifesto; promises tea-garden land ownership and Tea Workers Development Board"
    summary: |
      The BJP's 2021 WB manifesto specifically pledged land ownership rights
      for tea-garden workers, formation of a Tea Workers' Development Board,
      and grant of pending PF/ESI arrears from closed gardens. In ST-reserved
      Kalchini, the land ownership promise resonated deeply with Oraon and Munda
      workers who have lived in garden quarters for generations without title.
      BJP candidate Bishal Lama used this manifesto plank aggressively in the
      labour lines of Kalchini block.
