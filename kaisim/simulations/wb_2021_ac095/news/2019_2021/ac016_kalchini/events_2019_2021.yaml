    date: "2020-05-20"
    temporal: episodic
    scope: state
    intensity: 3
    headline: "Cyclone Amphan devastates West Bengal; North Bengal / Dooars largely spared but state resources diverted"
    summary: |
      Super Cyclone Amphan caused catastrophic damage across coastal WB
      (estimated ₹1 trillion damage). Alipurduar and the Dooars were not in
      the direct track but experienced heavy rainfall, and state disaster
      response resources were heavily committed to Kolkata and South Bengal.
      Kalchini block's tea-garden workers noted the state's attention was
      elsewhere during a critical period when they needed COVID wage relief,
      deepening perception of North Bengal neglect.
