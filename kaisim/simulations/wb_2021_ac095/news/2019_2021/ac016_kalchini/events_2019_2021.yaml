    headline: "WB launches Duare Sarkar — government doorstep scheme camps begin in tea-garden gram panchayats"
    summary: |
      The Mamata Banerjee government launched Duare Sarkar on 1 December 2020,
      conducting outreach camps at gram panchayat and ward level to enroll
      beneficiaries for Swasthya Sathi, Khadya Sathi, Kanyashree, and Jai Johar
      (tribal welfare). Camps in Kalchini block reach tea-garden labour lines
      in early 2021. The scheme serves as a major pre-election delivery
      platform, giving TMC activists a tangible public-facing role in the garden
      lines ahead of the assembly election.
