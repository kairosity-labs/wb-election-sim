# Kalchini (AC-16, ST) — voter-salient event chronology, Jan 2019 → 02 May 2021.
# Constituency: Kalchini, Alipurduar district, North Bengal (Dooars tea-belt).
# Reserved for Scheduled Tribes (Oraon, Munda, Santali communities dominate).
# Window terminates at WB Assembly Election 2021 result day.
# All wage figures for WB tea gardens; Assam rates differ.

cutoff_date: "2021-05-02"   # WB AE 2021 counting day

