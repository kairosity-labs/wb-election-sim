  - slug: nrc_assam_documentation_anxiety_dooars
    date: "2019-08-31"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Assam NRC excludes 19 lakh; tea-garden tribal workers in Dooars face acute documentation anxiety"
    summary: |
      The Assam NRC final list, excluding 19 lakh people, triggered deep fear
      among tea-garden workers in Kalchini whose families migrated from Jharkhand
      and Odisha generations ago. Many second-generation workers lack formal
      birth records or land documents. NRC anxiety was compounded by garden
      management withholding some employment records needed for identity proof,
      making this a visceral citizenship-threat narrative in the Dooars belt.
    tags: [ag_labourer, out_migrant_household, woman, elderly]
