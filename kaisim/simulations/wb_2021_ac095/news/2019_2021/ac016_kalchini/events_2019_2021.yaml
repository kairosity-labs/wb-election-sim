  - slug: puja_bonus_2020_covid_context
    date: "2020-09-20"
    temporal: episodic
    scope: district
    intensity: 3
    headline: "2020 Puja bonus dispute: managements cite COVID losses to push below-15% bonus in Dooars"
    summary: |
      Tea garden managements in the Dooars used COVID revenue losses as
      justification to resist worker demands for 20% Puja bonus. Trinamool-
      aligned INTUC and left-leaning CITU both opposed the management position,
      but without central force, outcome was a below-expectations settlement.
      Workers in Kalchini gardens received reduced bonuses at a time when
      COVID had already cut real incomes, stoking continued union mobilisation.
