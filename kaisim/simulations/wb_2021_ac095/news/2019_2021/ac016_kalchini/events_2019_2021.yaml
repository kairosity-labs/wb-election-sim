    date: "2021-04-15"
    temporal: episodic
    scope: state
    intensity: 4
    headline: "Lakshmir Bhandar launched: SC/ST women get Rs 1,200/month — tea-garden women in Kalchini key beneficiaries"
    summary: |
      The Mamata Banerjee government launched Lakshmir Bhandar in April 2021
      as a pre-election announcement, providing Rs 1,200/month to SC/ST women
      (and Rs 1,000 to others). For Oraon and Munda women in Kalchini's tea-
      garden labour lines — who are classified as ST — the promise of a
      direct cash transfer represented a meaningful supplement to the daily
      wage income. Duare Sarkar camps in Kalchini block used Lakshmir Bhandar
      registration drives in the final pre-election weeks.
