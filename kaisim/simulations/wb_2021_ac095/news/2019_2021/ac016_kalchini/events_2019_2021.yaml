  - slug: puja_bonus_dispute_2019_dooars
    date: "2019-09-25"
    temporal: episodic
    scope: district
    intensity: 4
    headline: "Puja bonus stalemate in Dooars tea gardens: workers demand 20%, owners offer 10%"
    summary: |
      Annual pre-Durga Puja negotiations between tea garden owners and trade
      unions in the Dooars (164 gardens) broke down in September 2019, with
      owners holding at 10% and unions demanding 20%. Workers at gardens
      including those in Kalchini block staged agitations and threatened work
      stoppages. The Labour Commissioner eventually facilitated a compromise,
      but delayed resolution shortened festival spending and fuelled resentment
      against management-aligned political actors.
