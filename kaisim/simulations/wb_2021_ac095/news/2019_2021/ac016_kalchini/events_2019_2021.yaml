  - slug: caa_passed_parliament_dooars_anxiety
    date: "2019-12-11"
    temporal: episodic
    scope: national
    intensity: 4
    headline: "CAA passed; tribal Hindu tea-garden workers in Dooars have mixed reaction amid NRC anxiety"
    summary: |
      While CAA does not cover tribal workers (who are predominantly Hindu
      and not recent migrants under CAA categories), the legislation intensified
      NRC anxiety in Kalchini. Workers feared that any future NRC exercise in
      WB would treat them like Assam's plantation workers who were excluded
      despite generations of residency. Anti-CAA protests were visible in Siliguri
      and Alipurduar town, creating an atmosphere of civic unease in the belt.
