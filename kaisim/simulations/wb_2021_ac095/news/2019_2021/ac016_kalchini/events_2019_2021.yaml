      In the Dooars belt including Kalchini, the GNLF alliance strengthened
      BJP's ground organisation and provided booth-level workers with hill-
      community linkages. The combined tribal-hill-BJP machine was credited
      with a 53% vote share for Bishal Lama in Kalchini, compared to the state
      BJP average.
