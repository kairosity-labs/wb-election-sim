  - slug: caa_passed_parliament_dec2019
    date: "2019-12-11"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "CAA 2019 passed; Cooch Behar Rajbanshis note they are Hindu OBC/SC — not refugees — so CAA doesn't apply to them"
    summary: |
      CAA grants citizenship to Hindu/Sikh/Buddhist/Jain/Parsi/Christian refugees
      from Bangladesh/Pakistan/Afghanistan entering before 2014. Cooch Behar's
      Rajbanshi community — Hindu, but Indian-origin SC, not refugees — learned they
      are outside CAA's scope. BJP messaging tried to link CAA to NRC-fear relief,
      but locally the D-voter/Foreigners Tribunal threat remained the more salient
      anxiety. Muslim-belt booths in AC-1 became strongly anti-CAA.
