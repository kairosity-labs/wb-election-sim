  - slug: sitalkuchi_cisf_shooting_apr10_2021
    date: "2021-04-10"
    temporal: episodic
    scope: district
    intensity: 5
    headline: "CISF kills 4 voters at Sitalkuchi Booth 126 (AC-9, Cooch Behar) on Phase 4 polling day — shadow falls on entire district"
    summary: |
      On Phase 4 polling day, CISF jawans at Polling Station 126 in Jorpatki area of
      Sitalkuchi AC (AC-9, same Cooch Behar district) fired 6-8 rounds, killing four
      persons (Nur Alam Mian, Maniruzzaman Mian, Samiul Haq, Hamidul Mian). A fifth
      voter, Anand Burman (first-time), was killed outside another booth. EC called it
      self-defence; TMC called it murder. Polling was suspended at that station. Cooch
      Behar Uttar booths (Phase 4) were directly affected in atmosphere — heightened
      fear, reduced Muslim voter turnout, BJP claimed victory on security narrative.
      EC banned politicians from Cooch Behar for 72 hours.
