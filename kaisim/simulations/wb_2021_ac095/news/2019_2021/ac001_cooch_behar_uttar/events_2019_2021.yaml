    date: "2019-05-23"
    temporal: episodic
    scope: AC
    intensity: 5
    headline: "Nisith Pramanik (BJP) wins Cooch Behar LS by 54,321 votes — BJP sweeps North Bengal"
    summary: |
      Nisith Pramanik (BJP) defeated TMC's Paresh Chandra Adhikary by 54,321 votes
      (731,594 vs 677,363). Cooch Behar Uttar segment contributed heavily to BJP's
      margin on a Rajbanshi-Hindu consolidation wave. Pramanik, a local strongman
      from Dinhata, became the dominant BJP face for the entire district and all
      nine assembly segments including AC-1.
