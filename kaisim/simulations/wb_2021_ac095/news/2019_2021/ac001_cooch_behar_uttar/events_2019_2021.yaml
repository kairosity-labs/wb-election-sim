# Cooch Behar Uttar (AC-1) — voter-salient event chronology, Jan 2019 → 02 May 2021.
# Window terminates at WB Assembly Election 2021 result day.
# SC-reserved constituency; Rajbanshi dominant (OBC/SC in WB treated as SC).
# Adjacent to Assam and Bangladesh; D-voter/NRC fear acute; Nisith Pramanik BJP anchor.

cutoff_date: "2021-05-02"   # WB AE 2021 counting day

