  - slug: covid_lockdown_march2020
    date_start: "2020-03-25"
    date_end: "2020-06-30"
    temporal: chronic
    scope: national
    intensity: 5
    headline: "National COVID lockdown: Cooch Behar ag-labourers and tobacco farmers face income collapse"
    summary: |
      Modi's 21-day lockdown (extended multiple times) shut markets, mandis and
      cross-border trade. In Cooch Behar Uttar, tobacco and jute farmers could not
      sell harvests, and seasonal ag-labourers lost wages. Out-migrant workers from
      the district (Rajbanshi men in North Indian cities) returned without earnings.
      PMGKAY free ration partially buffered food security but rural incomes contracted.
