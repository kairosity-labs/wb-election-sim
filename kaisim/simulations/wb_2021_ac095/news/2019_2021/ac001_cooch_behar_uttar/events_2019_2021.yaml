      large parts of Cooch Behar district including northern segments adjacent to
      AC-1. Thousands of acres of aman paddy, jute and tobacco seedlings were
      destroyed. Flood-affected Rajbanshi cultivator households demanded relief;
      allegations of TMC panchayat bias in distributing compensation followed.
