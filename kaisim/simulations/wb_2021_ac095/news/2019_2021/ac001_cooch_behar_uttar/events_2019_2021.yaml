    scope: district
    intensity: 3
    headline: "Greater Cooch Behar People's Association (GCPA) factional alignments shape Rajbanshi gatekeeper politics"
    summary: |
      GCPA (est. 1998) seeks a separate 'Greater Cooch Behar' state and Rajbanshi
      language recognition. Its two factions split between TMC-leaning (Bangshi Badan
      Barman) and BJP-leaning (Anant Maharaj/Ananta Rai). In Cooch Behar Uttar, the
      GCPA functions as a community gatekeeper: its local leaders' endorsements influence
      Rajbanshi bloc votes. BJP successfully courted Anant Rai's faction, signalling
      sympathy for Cooch Behar statehood demand and Rajbanshi OBC/ST recognition.
