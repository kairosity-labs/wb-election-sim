  - slug: nrc_assam_final_list_aug2019
    date: "2019-08-31"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Assam NRC final list excludes 19 lakh; Cooch Behar Rajbanshis face acute cross-border tribunal fear"
    summary: |
      ~19 lakh excluded from Assam NRC; disproportionately Bengalis including Hindus.
      In Cooch Behar — adjacent to Assam — Rajbanshi families with relatives across the
      state line faced immediate panic about being declared foreigners. Cases of Assam
      Foreigners Tribunals issuing notices to Cooch Behar residents (like Dinhata farmer
      Uttam Kumar Brajabasi) became flashpoints. D-voter fear, already present from WB
      voter roll deletions, intensified sharply.
