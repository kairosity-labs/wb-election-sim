  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 5
  headline: Citizenship (Amendment) Act 2019 passed; Hindu-majority Tarakeswar reacts
    with cautious approval
  summary: 'Parliament passed the CAA, granting fast-track citizenship to persecuted
    Hindus from

    Bangladesh, Pakistan and Afghanistan. In Hindu-majority Tarakeswar — a temple-town
    where

    upper-caste bhadralok households are politically attentive — the law was broadly
    welcomed

    as a BJP-delivered Hindu protection measure. Muslim minority voters and secular
    sections

    expressed anxiety, while TMC led anti-CAA protests at the state level.

    '
