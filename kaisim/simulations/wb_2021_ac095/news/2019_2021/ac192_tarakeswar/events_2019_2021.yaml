  headline: Mamata visits 19 temples, recites Chandi-path in Nandigram — soft-Hindutva
    campaign launched
  summary: 'During the 2021 election campaign, Mamata Banerjee made a strategic Hindu
    outreach effort,

    visiting 19 temples and one Muslim shrine in Nandigram and declaring "I am also
    a Brahmin"

    while reciting Chandi-path mantras. In Tarakeswar — a deeply Shiva-devotional
    constituency —

    this signalling was noted by upper-caste Hindu and bhadralok voters, though BJP
    countered

    that her "Chandi-path was full of faults" and her Hindu credentials were theatrical.

    '
