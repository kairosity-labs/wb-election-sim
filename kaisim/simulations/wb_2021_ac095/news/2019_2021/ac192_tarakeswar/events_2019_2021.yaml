  intensity: 5
  headline: Locket Chatterjee (BJP) wins Hooghly LS seat, defeating TMC's Ratna De
    Nag by 73,362 votes
  summary: 'BJP''s Locket Chatterjee swept the Hooghly Lok Sabha constituency — which
    covers Tarakeswar AC —

    with a margin of 73,362 votes, riding a strong Hindu-consolidation wave. Within
    Tarakeswar AC,

    BJP polled ahead of TMC, signalling growing upper-caste Hindu and trader-community
    disenchantment

    with the Mamata government. The result energised BJP''s local panchayat networks.

    '
