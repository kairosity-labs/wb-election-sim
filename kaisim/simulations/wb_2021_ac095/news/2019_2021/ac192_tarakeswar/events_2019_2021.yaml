- slug: shravan_mela_2020_cancelled
  date: '2020-07-14'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Shravani Mela 2020 cancelled for first time in living memory due to COVID-19;
    temple economy devastated
  summary: 'For the first time in decades, the Tarakeswar Shravani Mela — the massive
    month-long

    pilgrimage gathering that draws millions of Shiva devotees every Shravan (July-August)
    —

    was completely cancelled due to COVID-19 restrictions. Flower sellers, puja-material

    traders, dhabas, lodge owners and the panda/pujari community lost their single
    largest

    annual income event. Economic distress in Tarakeswar''s temple-dependent urban
    trader

    community reached crisis levels.

    '
