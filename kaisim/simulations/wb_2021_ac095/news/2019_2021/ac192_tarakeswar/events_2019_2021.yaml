  summary: 'BJP''s 2021 West Bengal manifesto ''Sonar Bangla Sankalp Patra'' promised
    implementation of

    CAA, freeing temples from government control, and religious freedom protections
    that resonated

    strongly with upper-caste Hindu and bhadralok voters in temple-towns like Tarakeswar.

    The manifesto''s commitment to remove the Tarakeswar Development Board''s perceived
    government

    interference in temple management was a specific local talking point.

    '
