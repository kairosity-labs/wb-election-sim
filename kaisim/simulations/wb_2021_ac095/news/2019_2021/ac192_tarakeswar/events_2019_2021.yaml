  date: '2019-07-17'
  temporal: episodic
  scope: AC
  intensity: 4
  headline: 'Shravan mela 2019: Nearly 10 lakh pilgrims walk to Tarakeswar Taraknath
    temple in Shrawan month'
  summary: 'The Shravani Mela at Tarakeswar — the largest fair in West Bengal — drew
    nearly 10 lakh

    devotees who walked barefoot from Baidyabati''s Nimai Tirtha Ghat (~39 km) carrying
    Ganga

    jal to offer to Lord Shiva. Flower sellers, dhaba operators, puja-material vendors
    and

    the entire temple-economy of Tarakeswar — which depends on this annual pilgrimage
    for a

    large share of annual income — thrived. Rail and administration arranged special
    trains.

    '
