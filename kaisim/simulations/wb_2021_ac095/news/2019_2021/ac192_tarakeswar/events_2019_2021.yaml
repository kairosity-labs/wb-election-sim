- slug: hindustan_motors_worker_crisis_ongoing
  date: '2019-09-17'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Hindustan Motors Uttarpara families still without water, electricity five
    years after factory closure
  summary: 'Five years after Hindustan Motors shuttered its iconic Ambassador car
    factory at Uttarpara

    in Hooghly in May 2014, around 70 families remained stranded in the defunct factory
    township

    without basic amenities. Over 1,300 workers had accepted voluntary retirement
    at meagre terms.

    This long-term industrial decline in the Hooghly belt contributed to out-migration
    from

    surrounding areas including Tarakeswar block, swelling the out_migrant_household
    demographic.

    '
