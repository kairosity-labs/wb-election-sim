- slug: covid_lockdown_march_2020
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: India-wide COVID lockdown announced; Tarakeswar temple closed, pilgrimage
    economy collapses
  summary: 'Prime Minister Modi announced a 21-day national lockdown on 24 March 2020.
    Tarakeswar

    Taraknath temple, which draws hundreds of thousands of devotees throughout the
    year,

    shut immediately. Flower sellers, prasad vendors, dhaba operators and puja-material

    traders — the backbone of Tarakeswar''s temple economy — lost their livelihoods
    overnight.

    The economic shock was immediate and severe for this pilgrimage-dependent constituency.

    '
