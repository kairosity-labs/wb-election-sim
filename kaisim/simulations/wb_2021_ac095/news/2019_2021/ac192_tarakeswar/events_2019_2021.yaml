- slug: wb_ae_2021_tarakeswar_tmc_win
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Ramendu Singha Roy (TMC) wins Tarakeswar AC by 7,484 over BJP's Swapan
    Dasgupta; TMC sweeps WB with 213 seats
  summary: 'In a closely watched contest, TMC''s Ramendu Singha Roy defeated high-profile
    BJP candidate

    Swapan Dasgupta by 7,484 votes (96,698 vs ~89,214) in Tarakeswar AC. TMC''s welfare

    promises — especially Lakshmir Bhandar for women — and incumbency advantage outweighed

    BJP''s Hindu consolidation strategy. At the state level, TMC returned to power
    with 213

    of 292 seats, crushing BJP''s bid for power. Dasgupta''s loss was seen as a repudiation

    of BJP''s outsider-candidate strategy in a temple-economy seat.

    '
