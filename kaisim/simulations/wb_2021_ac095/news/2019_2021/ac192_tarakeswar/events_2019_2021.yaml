  date: '2020-01-27'
  temporal: episodic
  scope: state
  intensity: 4
  headline: West Bengal Assembly passes resolution against CAA; Mamata leads torchlight
    marches
  summary: 'The West Bengal Legislative Assembly passed a resolution calling for repeal
    of the CAA on

    27 January 2020. Mamata Banerjee had led massive anti-CAA marches in Kolkata.
    In Hooghly

    district, anti-CAA marches were held at Konnagar. In Tarakeswar, the temple-town
    Hindu

    majority viewed the TMC''s anti-CAA stance with ambivalence, seeing it as appeasement
    politics.

    '
