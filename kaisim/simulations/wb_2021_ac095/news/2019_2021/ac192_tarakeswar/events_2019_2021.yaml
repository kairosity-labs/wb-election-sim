  date: '2020-12-01'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Swasthya Sathi extended to all West Bengal families; Rs 5 lakh health
    cover universalised
  summary: 'From December 2020, West Bengal''s Swasthya Sathi health insurance scheme
    — providing

    Rs 5 lakh annual health coverage per family — was extended to cover all residents

    regardless of caste, religion or profession. In Tarakeswar''s peri-urban households,

    including trader and cultivator families, enrolment surged through Duare Sarkar
    camps.

    The scheme became a key TMC welfare plank in the run-up to the 2021 elections.

    '
