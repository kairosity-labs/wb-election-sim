  headline: BJP fields veteran journalist Swapan Dasgupta — a Rajya Sabha MP — as
    candidate from Tarakeswar AC
  summary: 'BJP fielded high-profile ideologue and Rajya Sabha MP Swapan Dasgupta
    as its candidate

    from Tarakeswar, in a seat it believed it could swing. Dasgupta — a prominent
    voice for

    Hindu nationalism — was expected to consolidate upper-caste Hindu, bhadralok and
    trader

    votes who had favoured BJP in 2019 LS. His candidature made Tarakeswar a nationally

    watched constituency and intensified BJP ground activity.

    '
