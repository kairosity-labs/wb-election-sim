  headline: Mamata launches 'Duare Sarkar' — doorstep delivery of 11 welfare schemes
    across West Bengal
  summary: 'The Duare Sarkar (Government at Your Doorstep) programme launched on 1
    December 2020,

    setting up camps at gram panchayat and municipal ward level to deliver Swasthya
    Sathi,

    Khadya Sathi, Kanyashree and other schemes. In Tarakeswar''s peri-urban areas,
    camps

    registered many beneficiaries who had not previously accessed welfare services,
    boosting

    TMC''s grassroots visibility ahead of the 2021 Assembly elections.

    '
