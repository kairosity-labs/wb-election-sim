  date: '2021-03-16'
  temporal: episodic
  scope: state
  intensity: 4
  headline: TMC 2021 manifesto promises Lakshmir Bhandar Rs 500-1000/month for all
    women — galvanises women voters
  summary: 'The TMC''s 2021 ''Banglar Gorbo Mamata'' election manifesto promised the
    Lakshmir Bhandar

    scheme — Rs 500/month for general category women and Rs 1000 for SC/ST women —
    and

    expansion of Swasthya Sathi and Krishak Bandhu. In Tarakeswar''s peri-urban electorate,

    the welfare promise energised women voters, small cultivator families and out-migrant

    households dependent on supplemental income, creating a significant pro-TMC vote
    bank.

    '
