  date: '2021-04-15'
  temporal: episodic
  scope: state
  intensity: 4
  headline: West Bengal's COVID Delta second wave peaks; elections proceed amid health
    crisis
  summary: 'India''s devastating Delta second wave struck West Bengal in April–May
    2021, overwhelming

    Kolkata and district hospitals. West Bengal conducted eight phases of Assembly
    elections

    despite WHO and opposition concerns. Hooghly district health infrastructure came
    under

    strain; peri-urban Tarakeswar residents faced difficulties accessing medical care
    during

    the wave, which peaked just as election results were announced on 2 May 2021.

    '
