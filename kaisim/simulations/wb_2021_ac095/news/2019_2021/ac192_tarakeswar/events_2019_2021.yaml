- slug: tarakeswar_temple_management_row_firhad
  date: '2019-06-01'
  temporal: chronic
  scope: AC
  intensity: 4
  headline: BJP-linked Hindu groups protest Mamata's appointment of Firhad Hakim as
    Tarakeswar Temple Board chair
  summary: 'A lingering controversy from 2017 — Mamata Banerjee''s appointment of
    Muslim TMC minister

    Firhad Hakim as chairman of the Tarakeswar Development Board — continued to animate
    BJP

    and Hindu nationalist activists in the constituency through the 2019 pre-election
    period.

    Subramanian Swamy had threatened to sue but backed off after Mamata assured non-interference

    in religious activities. The episode remained a recurring BJP talking point on
    "appeasement"

    among bhadralok and upper-caste Hindu voters in Tarakeswar.

    '
