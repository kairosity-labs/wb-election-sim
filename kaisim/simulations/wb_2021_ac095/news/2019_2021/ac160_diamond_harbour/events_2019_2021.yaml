- slug: cyclone_amphan_landfall
  date: '2020-05-20'
  temporal: episodic
  scope: district
  intensity: 5
  headline: Super Cyclone Amphan makes direct hit on South 24 Parganas; Diamond Harbour
    devastated
  summary: 'Cyclone Amphan — the strongest storm to hit Bengal in two decades — made
    landfall on

    20 May 2020, battering Diamond Harbour, Kakdwip, Sagar Island, and adjacent Sundarban

    coastal blocks. Trees, electric poles and thousands of homes were destroyed in
    AC-160.

    The double blow of COVID lockdown and Amphan devastation was catastrophic for
    farming

    and fishing households. India-wide damage estimated at $14 billion.

    '
