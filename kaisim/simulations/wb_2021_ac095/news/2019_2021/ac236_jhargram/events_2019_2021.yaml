  date: '2021-03-25'
  temporal: episodic
  scope: district
  intensity: 4
  headline: Amit Shah and Dilip Ghosh hold joint rally in Jhargram; BJP pledges Jangal
    Mahal development and Van Adhikar Pattas
  summary: 'Union Home Minister Amit Shah addressed a large public rally in Jhargram
    alongside

    BJP state president Dilip Ghosh during the WB 2021 election campaign season.

    Shah promised accelerated Van Adhikar Patta distribution, MGNREGA reform, and

    a tribal-welfare focus under a BJP state government. The rally drew large crowds

    from Santali and Munda villages, reflecting BJP''s genuine organisational strength

    in the region after the 2019 LS win. TMC countered with Birbaha Hansda''s village-

    level roadshows, using Santali songs and community dialect outreach.

    '
