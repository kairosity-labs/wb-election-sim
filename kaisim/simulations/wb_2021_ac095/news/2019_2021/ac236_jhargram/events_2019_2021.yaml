- slug: chhatradhar_mahato_joins_tmc_2020
  date: '2020-07-10'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Former Maoist leader Chhatradhar Mahato joins TMC State Committee; Mamata's
    Jangal Mahal reclamation bid
  summary: 'Chhatradhar Mahato, iconic PCAPA leader convicted under UAPA and released
    on bail,

    formally joined the TMC state committee in July 2020. Mamata Banerjee''s move

    was calculated to reclaim the Jangal Mahal tribal heartland from BJP by co-opting

    the region''s most recognisable adivasi-resistance figure. For many tribal voters
    in

    Jhargram, Mahato symbolised resistance to both the CPI(M) era and police atrocities

    — his TMC entry generated mixed reactions: TMC loyalists welcomed him, while some

    tribal activists distrusted TMC''s motives.

    '
