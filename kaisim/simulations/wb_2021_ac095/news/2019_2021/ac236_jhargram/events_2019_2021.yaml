- slug: duare_sarkar_launch_dec_2020
  date: '2020-12-01'
  temporal: episodic
  scope: state
  intensity: 4
  headline: Duare Sarkar launches 1 December 2020; tribal households in Jhargram enroll
    for Swasthya Sathi and Krishak Bandhu at gram panchayat camps
  summary: 'The state government''s ''Duare Sarkar'' (Government at Your Doorstep)
    programme

    rolled out across West Bengal, with camps at gram panchayat level in Jhargram

    offering enrollment for Swasthya Sathi health insurance, Krishak Bandhu farm-input

    support, and Khadya Sathi food security. Tribal households — many lacking formal

    documentation — found the camp format accessible. TMC credited the scheme as

    proof of welfare delivery in the Jangal Mahal; BJP countered that MGNREGA remained

    blocked and Van Adhikar Pattas undelivered.

    '
