- slug: lakshmir_bhandar_tmc_manifesto_launch_2021
  date: '2021-02-28'
  temporal: episodic
  scope: state
  intensity: 5
  headline: TMC 2021 manifesto promises Lakshmir Bhandar Rs 500–1,000/month to all
    women; tribal women to get Rs 1,000
  summary: 'Mamata Banerjee''s TMC 2021 manifesto announced the Lakshmir Bhandar scheme
    —

    Rs 500/month for general category women and Rs 1,000 for SC/ST women aged 25–60.

    In Jhargram''s ST-majority constituency this was the single most impactful welfare

    promise: almost every eligible Santali and Munda woman household stood to benefit.

    The promise was delivered at Duare Sarkar camps from August 2021 onward, giving

    TMC a strong pre-poll credibility boost among tribal women who are primary voters.

    '
