- slug: fra_patta_distribution_jhargram_2019
  date: '2019-09-10'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Jhargram district distributes 14,594 individual Van Adhikar Pattas covering
    ~3,500 acres but thousands of claims remain pending
  summary: 'By late 2019 Jhargram had formally recognised Individual Forest Rights
    (IFR) for

    14,594 tribal households covering 3,508 acres and 72 Community Forest Rights (CFR),

    yet rights activists documented massive pendency — tens of thousands of claims
    filed

    by Santali, Munda, and Lodha households remained unadjudicated. The gap between

    claims filed and pattas issued became a persistent grievance exploited by both

    BJP and TMC during canvassing.

    '
