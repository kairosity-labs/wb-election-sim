- slug: bjp_sonar_bangla_manifesto_tribal_promise_2021
  date: '2021-03-07'
  temporal: episodic
  scope: state
  intensity: 4
  headline: BJP's 'Sonar Bangla Sankalp Patra' promises tribal university in Jhargram
    and Rs 100 crore tribal self-employment fund
  summary: 'The BJP 2021 manifesto for West Bengal (''Sonar Bangla Sankalp Patra'')
    included a

    promise to establish a Pandit Raghunath Murmu Tribal University in Jhargram and

    allocate Rs 100 crore under Stand Up India for tribal entrepreneurship. These

    were direct appeals to the Santali and adivasi identity in Jhargram. The BJP also

    promised to implement Van Adhikar Patta speedily and regularise forest-dwelling

    families'' encroachments — though critics noted the Centre had control of FRA

    implementation and had not prioritised it in BJP-ruled states.

    '
