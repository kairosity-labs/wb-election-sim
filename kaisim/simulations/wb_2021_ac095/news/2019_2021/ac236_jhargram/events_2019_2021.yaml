- slug: anandadhara_shg_jhargram_tribal_women_2021
  date: '2021-03-10'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Anandadhara SHGs among tribal women in Jhargram act as TMC's ground-level
    campaign network
  summary: 'West Bengal''s Anandadhara (NRLM) programme had formed thousands of self-help
    groups

    (SHGs) across Jhargram district''s tribal blocks including Jhargram, Binpur, Sankrail,

    and Belpahari, with a specific focus on PVTG and tribal women. By the 2021 election,

    SHG meetings served as informal TMC outreach forums: members discussed Lakshmir

    Bhandar, Swasthya Sathi enrollment, and state welfare — with TMC workers attending

    as ''resource persons''. This SHG network was a critical soft-power advantage
    for TMC

    in the tribal interior.

    '
