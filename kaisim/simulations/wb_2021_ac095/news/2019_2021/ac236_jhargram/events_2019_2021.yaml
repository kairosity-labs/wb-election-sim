  intensity: 5
  headline: BJP's Kunar Hembram (tribal engineer) wins Jhargram LS by 11,767 votes
    over TMC's Birbaha Soren
  summary: 'BJP fielded IIT-educated tribal candidate Kunar Hembram against TMC''s
    Birbaha Soren

    in the ST-reserved Jhargram Lok Sabha seat; Hembram won with 626,583 votes vs
    614,816.

    The narrow margin on a 37% BJP Panchayat-vote base signalled a major swing in
    the

    Jangal Mahal tribal belt, reversing TMC''s 2014 win and establishing BJP as a
    credible

    adivasi-identity party in the region.

    '
