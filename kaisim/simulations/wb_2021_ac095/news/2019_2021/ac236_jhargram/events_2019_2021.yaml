  date: '2020-04-01'
  temporal: episodic
  scope: national
  intensity: 3
  headline: Centre raises MGNREGA wage rates by Rs 20 per day as COVID relief; Jhargram
    tribal workers see marginal gain
  summary: 'The Union government announced a Rs 20/day MGNREGA wage hike in early
    April 2020

    as part of COVID relief, raising rates for West Bengal. For tribal labourers in

    Jhargram who returned from stranded migration the increase was welcome, but the

    benefit was undercut by months of delayed wage payment and inadequate workdays

    generated by local panchayat machinery, limiting actual income relief.

    '
