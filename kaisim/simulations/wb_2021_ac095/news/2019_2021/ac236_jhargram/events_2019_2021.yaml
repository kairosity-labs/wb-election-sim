- slug: covid_lockdown_march_2020_reverse_migration
  date: '2020-03-25'
  temporal: episodic
  scope: national
  intensity: 5
  headline: National COVID lockdown strands Jhargram's tribal brick-kiln migrants
    across Gujarat and Rajasthan
  summary: 'Prime Minister Modi''s 24 March 2020 lockdown announcement gave workers
    four hours

    before borders sealed. Thousands of Jhargram tribal workers stranded in brick
    kilns

    in Gujarat, Rajasthan, and Odisha had no income, little food, and no transport
    home

    for weeks. Many walked hundreds of kilometres; some died en route. State government

    organised Shramik Special trains from late May 2020, but returning workers spent

    14-day quarantine in panchayat centres with minimal support — compounding distress

    in a constituency where MGNREGA was already failing.

    '
