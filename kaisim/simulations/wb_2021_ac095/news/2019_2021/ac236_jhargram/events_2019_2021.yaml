- slug: birbaha_hansda_tmc_candidate_jhargram_2021
  date: '2021-03-15'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: TMC fields Birbaha Hansda — Santali film actress and daughter of tribal
    MLAs — as candidate for Jhargram AC
  summary: 'TMC''s candidate selection was a masterstroke of identity politics: Birbaha
    Hansda,

    a celebrated Santali-language actress and daughter of former MLAs, carried both

    cultural capital and grassroots tribal credibility. Her Santal identity, fluency

    in Ol Chiki script, and visible celebration of adivasi culture made her the

    preferred face against BJP''s Sukhamoy Satpathy. BJP countered with Satpathy''s

    development record claims, but the cultural resonance of a Santali actress-MLA

    proved decisive in mobilising tribal women voters especially.

    '
