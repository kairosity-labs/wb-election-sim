- slug: sarna_religion_code_wb_assembly_motion_2021
  date: '2021-01-20'
  temporal: episodic
  scope: state
  intensity: 4
  headline: WB Assembly passes motion for Sarna religion code ahead of election; tribals
    in Jhargram demand separate Census category
  summary: 'The West Bengal Legislative Assembly passed a resolution urging the Central
    Government

    to add a separate Sarna (and Sari) code in Census 2021 for tribal communities

    — Santali, Munda, Ho, Lodha, Bhumij, and others who practice nature worship.

    In Jhargram, where Sarna identity is deeply embedded in Santali cultural life,

    the resolution was widely circulated by TMC workers as a gesture of adivasi

    solidarity. BJP opposed the motion, arguing Sarna adherents are ''essentially

    Hindu'', alienating a section of tribal voters ahead of the election.

    '
