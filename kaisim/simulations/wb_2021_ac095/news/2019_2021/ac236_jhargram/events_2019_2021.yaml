- slug: wb_ae_2021_jhargram_birbaha_hansda_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Birbaha Hansda (TMC) wins Jhargram AC by 38,240 votes; BJP's Sukhamoy
    Satpathy routed
  summary: 'TMC''s Birbaha Hansda polled 109,493 votes against BJP''s Sukhamoy Satpathy''s
    71,253

    — a decisive 38,240-vote margin in the ST-reserved Jhargram assembly constituency.

    The result reversed the BJP''s 2019 LS momentum and re-established TMC''s dominance

    in the tribal belt, driven by Hansda''s Santali cultural identity, the Lakshmir

    Bhandar pre-poll promise, and TMC''s Anandadhara SHG mobilisation. BJP''s Jangal
    Mahal

    temple-Hindutva strategy was rejected by a majority of Santali-Munda voters.

    '
