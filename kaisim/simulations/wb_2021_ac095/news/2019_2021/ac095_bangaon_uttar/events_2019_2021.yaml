  - slug: caa_passed_parliament
    date: "2019-12-11"
    temporal: episodic
    scope: national
    intensity: 5
    headline: "Citizenship (Amendment) Act 2019 passed; Matua belt celebrates, anti-CAA protests across India"
    summary: |
      Parliament passes CAA on 11 Dec 2019. Hindu/Sikh/Buddhist/Jain/Parsi/
      Christian refugees from BD/PAK/Afghanistan who entered before
      31 Dec 2014 made eligible for fast-track citizenship. Thakurnagar
      sweet-distribution; Mamata declares WB will not implement. Defines
      the AC-95 cleavage for next 5 years.
    tags: [matua_refugee, muslim_voter, upper_caste_hindu, bjp_supporter, tmc_supporter]
