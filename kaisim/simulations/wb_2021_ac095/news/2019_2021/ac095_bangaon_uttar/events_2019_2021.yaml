  - slug: boroma_binapani_devi_death
    date: "2019-03-05"
    temporal: episodic
    scope: state
    intensity: 5
    headline: "Boroma Binapani Devi, matriarch of the Matua Mahasangha, dies at 100 in Thakurnagar"
    summary: |
      Spiritual head of the All India Matua Mahasangha and grandmother to both
      Shantanu Thakur (BJP) and Mamatabala Thakur (TMC). Modi attended the
      memorial at Thakurnagar (AC-95). Triggered the open succession war over
      Boroma's residence and the Mahasangha that defines AC-95 politics for
      the next decade.
    tags: [matua_refugee, woman, elderly]
    valence:
      matua_refugee: ambient
      bjp_supporter: positive   # Modi presence
      tmc_supporter: ambient
    broadcast: true
    sources:
