  - slug: amphan_landfall
    date: "2020-05-20"
    temporal: episodic
    scope: state
    intensity: 5
    headline: "Super Cyclone Amphan landfall near Bakkhali; ~$14bn damage in WB"
    summary: |
      Super-cyclonic landfall ~14:30 IST. ~5,500 homes damaged in N24P alone;
      88,000 ha paddy and 200,000 ha vegetables destroyed. Bangaon sub-division
      saw heavy rain, crop loss, and weeks-long power outages. Allegations of
      relief-list corruption (TMC panchayat-level "cut-money") seeded 2020-21
      anti-incumbency narrative.
    tags: [cultivator, ag_labourer, woman, elderly]
    valence:
      tmc_supporter: negative
      cultivator: negative
    broadcast: true
    sources:
