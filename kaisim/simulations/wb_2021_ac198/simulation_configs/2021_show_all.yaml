simulation:
  name: 198_tarakeswar_2021_show_all
  description: "show_all targeting \u2014 every agent receives every event. No cap."
ac_id: 198_tarakeswar
input:
  persona_set: local_qwen_n100
clock:
  start_date: '2020-01-01'
  end_date: '2021-04-10'
  tick_unit: month
  tick_size: 1
  reflection_every_n_ticks: 6
targeting:
  strategy: show_all
  config: {}
update:
  style: park_minimal
reflection:
  enabled: true
  every_n_ticks: 6
  compression_target_tokens: 200
llm:
  provider: openai
  model: Qwen/Qwen3.5-9B
  base_url: http://localhost:30000/v1
  api_key: EMPTY
  reasoning: null
  temperature: 0.7
  max_tokens: 4000
  cache_system_prompt: true
execution:
  async: true
  max_concurrent_personas: 100
output:
  runs_dir: runs
  save_raw_responses: true
  save_feeds_audit: true
election_context:
  ac_name: Tarakeswar
  poll_date_human: 10 April 2021
  election_label: 2021 West Bengal Legislative Assembly Election
  candidates:
    AITC:
      name: Ramendu Sinharay
      note: winner
    BJP:
      name: Swapan Dasgupta
    LF:
      name: Surajit Ghosh (CPI(M))
    INC:
      name: "\u2014"
    Other:
      name: Other / NOTA
ground_truth:
  AITC: 46.96
  BJP: 43.33
  LF: 7.1
  INC: 1.0
  Other: 1.61
