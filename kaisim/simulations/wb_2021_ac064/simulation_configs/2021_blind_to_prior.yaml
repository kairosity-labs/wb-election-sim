simulation:
  name: 064_murshidabad_2021_blind_to_prior
  description: tag_match, but bjp/tmc/left_inc supporter tags masked from agent.
ac_id: 064_murshidabad
input:
  persona_set: local_qwen_n100
clock:
  start_date: '2020-01-01'
  end_date: '2021-04-26'
  tick_unit: month
  tick_size: 1
  reflection_every_n_ticks: 6
targeting:
  strategy: tag_match
  config:
    mask_tags:
    - bjp_supporter
    - tmc_supporter
    - left_inc_supporter
update:
  style: park_minimal
reflection:
  enabled: true
  every_n_ticks: 6
  compression_target_tokens: 200
llm:
  provider: openai
  model: Qwen/Qwen3.5-9B
  base_url: http://localhost:30000/v1
  api_key: EMPTY
  reasoning: null
  temperature: 0.7
  max_tokens: 4000
  cache_system_prompt: true
execution:
  async: true
  max_concurrent_personas: 100
output:
  runs_dir: runs
  save_raw_responses: true
  save_feeds_audit: true
election_context:
  ac_name: Murshidabad
  poll_date_human: 26 April 2021
  election_label: 2021 West Bengal Legislative Assembly Election
  candidates:
    BJP:
      name: Gouri Sankar Ghosh
      note: winner
    AITC:
      name: Shaoni Singha Roy
    INC:
      name: Sheikh Nejauddin
    LF:
      name: "\u2014"
    Other:
      name: Other / NOTA
ground_truth:
  BJP: 41.86
  AITC: 40.78
  INC: 12.58
  LF: 2.5
  Other: 2.28
