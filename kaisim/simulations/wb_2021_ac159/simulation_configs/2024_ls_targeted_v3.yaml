simulation:
  name: 159_bhabanipur_2024_ls_targeted_v3
  description: "v3 sim — A1/A2/A3/B4 active. Tag-match targeting; runs Jan 2020 → 1 June 2024 (Kolkata Dakshin LS Phase-7 polling day). Compares to 2024 LS PC-level proxy."
ac_id: 159_bhabanipur
input:
  persona_set: local_qwen_n100_v3
clock:
  start_date: '2020-01-01'
  end_date: '2024-06-01'
  tick_unit: month
  tick_size: 1
  reflection_every_n_ticks: 6
targeting:
  strategy: tag_match
  config: {}
update:
  style: park_minimal
reflection:
  enabled: true
  every_n_ticks: 6
  compression_target_tokens: 200
intention_probe:
  at_ticks: [12, 24, 36, 48]
llm:
  provider: openai
  model: Qwen/Qwen3.5-9B
  base_url: http://localhost:30000/v1
  api_key: EMPTY
  reasoning: null
  temperature: 0.7
  max_tokens: 4000
  cache_system_prompt: true
execution:
  async: true
  max_concurrent_personas: 100
output:
  runs_dir: runs
  save_raw_responses: true
  save_feeds_audit: true
election_context:
  ac_name: Bhabanipur (LS-segment of Kolkata Dakshin PC)
  poll_date_human: 1 June 2024
  election_label: 2024 Indian Lok Sabha Election (Kolkata Dakshin PC, Phase 7)
  candidates:
    AITC:
      name: Mala Roy
      note: incumbent TMC MP from Kolkata Dakshin
    BJP:
      name: Debasree Chaudhuri
      note: BJP challenger, ex-Union MoS Women & Child Development
    LF:
      name: Saira Shah Halim (CPI(M))
    INC:
      name: "—"
    Other:
      name: Other / NOTA
ground_truth:
  AITC: 53.4
  BJP: 38.9
  LF: 5.9
  INC: 0.8
  Other: 1.0
