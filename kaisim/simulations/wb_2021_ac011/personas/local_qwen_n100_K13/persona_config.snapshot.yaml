persona_set:
  name: local_qwen_n100
  description: gpt-oss-20b (sglang DP=8, reasoning=medium) generated personas, n=100,
    with verifier feedback.
generation:
  sampler: llm_batch
  target_n: 100
  batch_size: 8
  parallel_calls: 13
  max_correction_batches: 3
  max_consecutive_zero_batches: 3
  seed: 42
vote:
  enabled: true
  field_name: vote_2019_LS
  parties:
  - BJP
  - AITC
  - INC
  - LF
  - Other
  blending:
    method: log_odds_mean
    inputs:
    - table: vote_given_religion
      parent: religion
      weight: 1.5
    - table: vote_given_caste
      parent: caste
      weight: 1.5
    - table: vote_given_gender
      parent: gender
      weight: 0.7
    - table: vote_given_welfare
      parent: welfare_dominant
      weight: 1.0
  welfare_overlap:
    method: precedence
    precedence:
    - Krishak_Bandhu
    - Kanyashree
    - Sabuj_Sathi
    - Swasthya_Sathi
    - Khadya_Sathi
verifier:
  tolerance:
    cell_z_max: 2.5
    composite_chisq_max: 800.0
    tier_A_axis_pp: 2.0
    tier_BC_axis_pp: 3.0
    tier_DE_axis_pp: 4.0
    joint_cell_pp: 5.0
    aggregate_vote_pp: 2.0
  tier_weights:
    A: 4.0
    B: 3.0
    C: 2.0
    D: 1.5
    E: 1.0
llm:
  provider: openai
  model: Qwen/Qwen3.5-9B
  base_url: http://localhost:30000/v1
  api_key: EMPTY
  reasoning: null
  temperature: 0.7
  max_tokens: 14000
  cache_system_prompt: true
prompts:
  batch_guidance: prompts/batch_guidance.md
  news_context: news/persona_context_pre2019.md
