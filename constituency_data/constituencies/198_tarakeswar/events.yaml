  headline: Hindustan Motors Uttarpara families still without water, electricity five years
    after factory closure
  summary: 'Five years after Hindustan Motors shuttered its iconic Ambassador car factory
    at Uttarpara

    in Hooghly in May 2014, around 70 families remained stranded in the defunct factory township

    without basic amenities. Over 1,300 workers had accepted voluntary retirement at meagre
    terms.

