  intensity: 3
  headline: BJP ramps up Ghar Wapsi and temple-building drives in Jangal Mahal after LS 2019
    win
  summary: 'Emboldened by the Lok Sabha result, BJP affiliates VHP and Bajrang Dal intensified

    Ghar Wapsi (reconversion) campaigns and organised temple-building activities among

    Santali and Munda villages in Jhargram district, framing tribal identity as Hindu

    identity to counter Sarna/adivasi-distinctiveness narratives. This cultural push

    was backed by BJP state president Dilip Ghosh''s outreach in Jangal Mahal and

    created significant counter-mobilisation among Sarna adherents.

    '
