- slug: post_poll_violence_jhargram_bjp_party_office_2021
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 4
  headline: BJP party office in Jhargram ransacked in post-poll violence; BJP workers flee
    homes
  summary: 'Within 24 hours of TMC''s sweeping state victory, BJP workers in Jhargram reported

    targeted violence — the local BJP party office was ransacked by suspected TMC

    supporters, and BJP booth workers from tribal villages reported being driven from

    their homes. Jhargram featured in opposition petitions to the Governor and subsequent

    NHRC investigations. The violence deepened tribal BJP supporters'' grievances but

    did not dislodge TMC''s administrative control. NIA custody of Chhatradhar Mahato

    on 28 March 2021 also added a charged pre-election legal backdrop.

    '
