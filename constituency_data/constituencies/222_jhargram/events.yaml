  headline: BJP's Kunar Hembram wins Jhargram LS 2019 by 11,767; tribal-belt swing shocks
    TMC
  summary: 'BJP fielded IIT-educated tribal candidate Kunar Hembram against TMC''s Birbaha
    Soren

    in the ST-reserved Jhargram Lok Sabha seat; Hembram won 626,583 vs 614,816 — a

