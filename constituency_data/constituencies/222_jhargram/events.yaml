- slug: jangal_mahal_forest_fire_dry_season_2020
  date: '2020-03-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Dry-season forest fires sweep Jhargram's sal-forest belt; tribal livelihoods disrupted
  summary: 'Jhargram''s sal-dominated forests are among the most fire-prone in southwest Bengal,

    with major fire events occurring every March–May. The 2020 fire season was

    compounded by the COVID lockdown — forest-dependent tribal households lost income

    from NTFP collection (tendu patta, mahua, sal seeds) as fires damaged forest patches

    and lockdown restrictions prevented movement. Repeated annual fires deepened

    the constituency''s chronic livelihood vulnerability.

    '
