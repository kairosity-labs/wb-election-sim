- slug: lodha_sabar_pvtg_pandemic_distress_2020
  date: '2020-05-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Lodha and Sabar PVTG settlements in Jhargram face acute hunger during COVID lockdown
  summary: 'Particularly Vulnerable Tribal Groups (PVTGs) — Lodha and Sabar communities in

    Jhargram''s deep forest fringe — were among the most exposed to COVID food insecurity.

    With no migration income and collection of tendu patta, mahua, and other minor

    forest produce banned under lockdown restrictions, Lodha-Sabar households fell back

    on MGNREGA and PDS, both of which were severely disrupted. State relief camps and

    PVTG-specific welfare transfers came weeks late, and civil society organisations

    documented hunger cases in Belpahari and Sankrail blocks.

    '
