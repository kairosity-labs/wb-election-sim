- slug: mgnrega_jhargram_chronic_deprivation_2019
  date: '2019-10-01'
  temporal: chronic
  scope: district
  intensity: 4
  headline: MGNREGA delivers fewer than 40 days of work annually to Jhargram tribal households;
    wage delays endemic
  summary: 'Jhargram''s tribal households depend critically on MGNREGA as a survival income

    during the dry season (March–June) when agricultural work disappears. Chronic

    underfunding, muster-roll manipulation, and delayed wage transfer meant most

    households received far fewer than the 100-day entitlement. A 2019 civil-society

    survey in the district found median MGNREGA days per household at 38, with many

    reporting non-payment stretching 60–90 days — deepening resentment toward

    the incumbent TMC state machinery.

    '
