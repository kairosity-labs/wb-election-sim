  temporal: chronic
  scope: district
  intensity: 3
  headline: Chhatradhar Mahato's Lalgarh martyrs rally reveals TMC factional tensions in Jangal
    Mahal
  summary: 'Chhatradhar Mahato organised a large rally in Lalgarh honouring three PCAPA

    ''martyrs'', drawing around 5,000 people and visibly challenging the mainstream

    TMC district leadership in Jhargram. The event exposed internal TMC rifts

    between the Mahato faction (with deep Jangal Mahal roots) and party regulars

