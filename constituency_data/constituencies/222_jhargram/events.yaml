  intensity: 5
  headline: TMC's Kalipada Saren wins Jhargram LS 2024 by 1,74,048 votes; BJP collapses in
    tribal belt
  summary: 'TMC''s Kalipada Saren won the Jhargram ST-reserved Lok Sabha seat with 743,478
    votes,

    defeating BJP''s Dr. Pranat Tudu by a massive 1,74,048 margin. The result confirmed

    the reversal of BJP''s 2019 Jhargram gain — a decisive tribal rejection of BJP''s

    Hindutva approach after five years of MGNREGA freeze, unfulfilled Van Adhikar Patta

    promises, and the exit of tribal MP Kunar Hembram. TMC''s welfare narrative —

    Lakshmir Bhandar, Duare Sarkar, Sarna recognition — dominated.

