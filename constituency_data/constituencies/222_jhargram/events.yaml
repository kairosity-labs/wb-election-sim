- slug: mgnrega_partial_restart_local_impact_2026
  date: '2026-01-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: MGNREGA partially restarted in Jhargram but tribal households report bureaucratic
    delays and low work-day generation in 2026 election year
  summary: 'Despite the December 2025 MGNREGA restart, Jhargram tribal labourers reported
    in

    early 2026 that biometric attendance requirements, slow job-card renewal, and limited

    work-day generation meant the actual benefit remained far below the 100-day

    entitlement. The Centre''s stringent compliance conditions were blamed by TMC;

    BJP argued the state''s administration was deliberately underperforming to

    blame the Centre. The issue remained live and unresolved on the eve of voting.

    '
