- slug: seasonal_migration_brick_kilns_jhargram
  date: '2019-11-15'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: Tens of thousands of Jhargram tribal workers migrate annually to Gujarat/Rajasthan
    brick kilns as dry-season survival strategy
  summary: 'Every October–November, young Santali, Munda, and Bhumij men from Jhargram travel

    to brick kilns in Gujarat, Rajasthan, Odisha, and Andhra Pradesh, often lured by

    contractors with cash advances (a form of debt bondage). Out-migrant households

    constitute a large share of Jhargram''s electorate; during elections many return

    or cast postal votes. Their grievances — unpaid MGNREGA, no local industry,

    and absent Van Adhikar Pattas — shaped the 2019 anti-incumbency against TMC.

    '
  tags:
  - out_migrant_household
  - ag_labourer
  - cultivator
  valence:
    out_migrant_household: negative
    ag_labourer: negative
  broadcast: false
  sources:
  - https://journalofsocialsciences.org/vol7no1/lived-experiences-of-interstate-migrant-workers-during-covid-19-lockdown-an-oral-history-in-west-bengal/
