- slug: jangalmahal_unemployment_chronic_2025
  date: '2025-01-01'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Unemployment in Jangal Mahal remains the defining voter concern in 2025; educated
    and uneducated alike compelled to migrate
  summary: 'Jhargram''s development deficit remained stark in 2025: no major industry, irrigation

    covering less than half of agricultural land, a single paddy crop for most cultivators,

    and young men from tribal villages routinely migrating to Delhi, Gujarat, Maharashtra,

    and southern states for work. Even educated tribal youth found no local jobs.

    The peace dividend of the post-Maoist normalisation had not translated into

    structural economic change — the central unresolved narrative heading into 2026.

    '
