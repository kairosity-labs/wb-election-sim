- slug: tea_garden_pf_esi_non_payment_alipurduar
  date: '2019-09-15'
  temporal: chronic
  scope: district
  intensity: 4
  headline: Alipurduar tea gardens routinely skip PF and ESI deposits; workers have no social
    security net
  summary: 'Reports from North Bengal tea-belt document widespread non-deposit of

    Provident Fund (PF) contributions by garden managements in Alipurduar.

    The Jalpaiguri regional PF office has filed multiple FIRs against garden

    authorities in recent years, but enforcement is slow. ESI coverage is

    absent for most Dooars workers, meaning any illness sends families into

    debt. The chronic failure of PF/ESI is a key driver of worker

    out-migration from Kalchini block.

    '
