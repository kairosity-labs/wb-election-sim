  summary: 'Kalchini (AC-16, ST) voted in Phase-1 of the WB 2026 Assembly elections

    on 23 April 2026. North Bengal reported over 91% voter turnout, among the

    highest in the state, reflecting intense competitive mobilisation by BJP

    (with Bishal Lama) and TMC (with Birendra Bara). CAPF presence at booths

    across the tea-garden labour lines was widely reported to have reduced

    management-related booth intimidation. The result is to be declared on

