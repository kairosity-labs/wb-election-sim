  summary: 'The regional PF office in Jalpaiguri filed an FIR against Patkapara Tea

    Garden Authority in Alipurduar police station for non-deposit of

    Provident Fund contributions of garden workers — part of a pattern of 36

    FIRs in five years. Fines of Rs 12.71 crore were imposed on garden

    managements across the Alipurduar-Jalpaiguri belt. In Kalchini, CITU and

    NTW union leaders used each FIR filing to demonstrate legal effectiveness

    against management malfeasance.

