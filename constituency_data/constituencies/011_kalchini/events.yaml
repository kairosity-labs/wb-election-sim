- slug: buxa_forest_rights_rejection
  date: '2019-11-01'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Forest rights (Van Adhikar Patta) claims rejected in Buxa Tiger Reserve fringe
    villages
  summary: 'Tribal communities living on the fringe of Buxa Tiger Reserve, adjacent

    to Kalchini block, report that Forest Rights Act (FRA) claims submitted

    to the state Forest Department have been wrongfully rejected. Van panchayat

    pradhans from Jayanti and other Buxa-edge settlements stated that the

    Forest Department continues relocation proceedings rather than settling

    community forest rights. This dispossession anxiety is persistent and

    deepens tribals'' sense of political neglect.

    '
