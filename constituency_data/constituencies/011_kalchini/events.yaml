  summary: 'TMC national general secretary Abhishek Banerjee, addressing a rally in

    Alipurduar on 3 January 2026 as part of his ''Abar Jitbe Bangla'' tour,

    pledged to raise the daily tea wage to Rs 300 within 30 days of TMC

    forming the government — via a tripartite meeting within 30 days and

