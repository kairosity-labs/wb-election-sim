  intensity: 4
  headline: BJP fields Bishal Lama (Kalchini, Oraon community, B.A. graduate) for Kalchini
    ST seat
  summary: 'Bishal Lama, a local social worker and grassroots BJP karyakarta from

    Kalchini with tribal identity, was declared BJP''s candidate for Kalchini

    (ST) assembly seat. Lama''s local roots and tribal community affiliation

    contrasted with incumbent TMC''s Pasang Lama, and his emphasis on tea-

    garden land rights and PF recovery from the BJP manifesto gave him

    credibility in the labour lines. His candidacy unified the tribal vote

    behind BJP in the constituency.

