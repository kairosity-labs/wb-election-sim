- slug: we_2021_kalchini_bishal_lama_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Bishal Lama (BJP) wins Kalchini by 28,576 votes over Pasang Lama (TMC)
  summary: 'BJP''s Bishal Lama won the Kalchini (ST) assembly seat with 1,03,104

    votes (53% share), defeating TMC''s Pasang Lama by 28,576 votes — one of

    the largest margins in North Bengal. The result reflected the complete

    consolidation of the Oraon, Munda, and Santali tea-garden vote behind

    the BJP. North Bengal overall gave BJP 31 of 54 seats; Alipurduar district

    was a clean BJP sweep, with John Barla''s influence as Union Minister

    credited for the scale of the victory.

    '
