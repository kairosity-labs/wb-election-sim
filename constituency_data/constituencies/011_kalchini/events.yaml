  headline: 'Floods devastate North Bengal tea gardens Oct 2025: Rs 100 crore+ loss, Kalchini
    belt inundated'
  summary: 'Torrential rainfall in October 2025 caused flooding across North Bengal''s

    tea belt, with losses estimated at over Rs 100 crore in Dooars gardens.

    Approximately 500-700 hectares of tea gardens were destroyed; damage to

    labour lines, irrigation equipment, and prepared tea leaves was

    documented. Mamata Banerjee visited Alipurduar to distribute relief

    materials and interact with tea-garden workers. The floods underscored

    climate vulnerability as an enduring economic risk for Kalchini''s workers.

    '
