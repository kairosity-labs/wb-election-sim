  headline: Former Union Minister John Barla (tribal BJP icon) joins TMC; cites BJP blocking
    tribal welfare
  summary: 'John Barla — Alipurduar''s former BJP MP and Union Minister with deep tribal

    and tea-garden roots — joined the Trinamool Congress on 15 May 2025. Barla

    accused BJP of blocking his Rs 160 crore tribal hospital project and

    "neglecting Adivasis." The defection was a major symbolic blow to BJP''s

    tribal narrative in Kalchini. For Oraon, Munda, and Santali workers who

    had backed Barla in 2019-2021, the switch complicated the "BJP as tribal

    champion" narrative ahead of the 2026 election.

