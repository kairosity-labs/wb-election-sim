- slug: sir_voter_roll_bhabanipur_deletions
  date_start: '2025-10-27'
  date_end: '2026-02-15'
  temporal: chronic
  scope: AC
  intensity: 5
  headline: SIR deletes 47,094 voters from Bhabanipur rolls; ~40% reportedly Muslim; TMC alleges
    targeting
  summary: 'The ECI''s Special Intensive Revision (SIR) of West Bengal electoral rolls resulted
    in

    47,094 voter deletions in Bhabanipur constituency — 44,786 at draft stage and 2,324 at

    final publication — with over 14,000 under adjudication. Analysis by Alt News and others

    suggested a higher proportion of Muslim voters were deleted, potentially altering the

    Muslim-heavy ward balance. Mamata launched a ''vote-for-revenge'' campaign around the

    deletions. The issue became one of the most contested pre-election narratives in

    Bhabanipur''s 2026 campaign.

    '
