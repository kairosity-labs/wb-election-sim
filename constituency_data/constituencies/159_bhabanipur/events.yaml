  headline: TMC's Mala Roy wins Kolkata Dakshin LS 2024 by 1,36,427 votes
  summary: 'In the Phase-7 Lok Sabha election on 25 May 2024, TMC''s Mala Roy won Kolkata
    Dakshin

    with 5,73,119 votes against BJP''s Debasree Chaudhuri''s 4,17,927 — a margin of 1,36,427.

    Within Bhabanipur, Mamata''s strong personal connection, Lakshmir Bhandar delivery and

    Muslim consolidation drove TMC above its 2021 by-election performance. The result

    suggested BJP''s urban Kolkata peak of 2021 had not been sustained into 2024.

    '
