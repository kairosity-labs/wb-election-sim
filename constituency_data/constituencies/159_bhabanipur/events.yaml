  headline: BJP fields Priyanka Tibrewal; CPI(M) fields Srijib Biswas for Bhabanipur bypoll
  summary: 'BJP announced Priyanka Tibrewal, a Bengali-speaking Marwari lawyer known for petitions
    on

    post-poll violence, as its candidate. Tibrewal''s Marwari identity was intended to appeal
    to

    the Gujarati-Marwari trader community in Bhabanipur''s wards 70-72. CPI(M) fielded Srijib

    Biswas to contest the seat Mamata needed to retain her Chief Ministership.

    '
