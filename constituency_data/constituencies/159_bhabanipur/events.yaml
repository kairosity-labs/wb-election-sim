- slug: bhabanipur_bypoll_mamata_wins_58k_margin
  date: '2021-10-03'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Mamata wins Bhabanipur bypoll by record 58,389 votes; retains Chief Ministership
  summary: 'Mamata Banerjee won the Bhabanipur by-election by 58,389 votes (85,263 vs Tibrewal''s

    26,428; CPI(M)''s Srijib Biswas polled 4,226). The margin — larger than any previous win

    in the constituency — was driven by near-unanimous Muslim support, strong women turnout,

    and significant portion of the Gujarati-Marwari community voting for Mamata. The result

    secured her third term as Chief Minister and established Bhabanipur as her citadel.

    '
