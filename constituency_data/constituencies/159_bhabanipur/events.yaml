- slug: phase2_polling_day_bhabanipur_2026
  date: '2026-04-26'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Bhabanipur votes in Phase-2 WB AE 2026; Mamata vs Suvendu under massive CAPF cover
  summary: 'Bhabanipur (AC-159) is scheduled to vote in Phase-2 of the 2026 West Bengal Assembly

    elections on 29 April 2026 — the day after this file''s cutoff. The contest pits incumbent

    CM Mamata Banerjee (TMC) against Leader of Opposition Suvendu Adhikari (BJP) in the most

    watched seat of the 2026 election. Voter turnout in the 2026 election was reported at

    91.58% statewide — the highest ever. Results are due on 4 May 2026.

    '
