  headline: 'Bhabanipur by-election: 53.3% voter turnout amid heavy security; Mamata votes
    in home constituency'
  summary: 'The Bhabanipur by-election was held on 30 September 2021 with tight security and
    a 53.3%

    voter turnout. Mamata Banerjee personally cast her vote in Bhabanipur, the constituency

    she has represented since 2011. Scuffles broke out between BJP and TMC workers. The

    election was existential for Mamata — a loss would have forced her to vacate the Chief

    Minister''s post.

    '
