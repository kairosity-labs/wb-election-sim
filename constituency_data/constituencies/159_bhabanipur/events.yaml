- slug: wb_ae2021_bhabanipur_sovandeb_wins
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Sovandeb Chattopadhyay (TMC) wins Bhabanipur AE 2021 by 28,719 votes
  summary: 'In the May 2021 Assembly election, TMC''s Sovandeb Chattopadhyay secured 73,505
    votes,

    defeating BJP''s Rudranil Ghosh (44,786). The margin reflected strong TMC support among

    Muslims and the bhadralok. Simultaneously, Mamata lost Nandigram to Suvendu Adhikari,

    creating the constitutional need for a Bhabanipur by-election. Sovandeb immediately

    indicated he would vacate the seat for Mamata.

    '
