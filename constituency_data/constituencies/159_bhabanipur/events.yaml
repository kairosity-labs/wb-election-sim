  date: '2021-09-16'
  temporal: episodic
  scope: AC
  intensity: 4
  headline: Mamata personally meets Gujarati and Marwari traders in Bhabanipur ahead of bypoll
  summary: 'Recognising the decisive role of the Gujarati and Marwari voter bloc, Mamata Banerjee
    held

    targeted meetings with traders in Bhabanipur wards 70-72. Her pitch emphasised state

    protection for business against COVID disruption and GST complexity, countering BJP''s

    appeal to this traditionally BJP-leaning community. Many traders, who had suffered lockdown

    losses, ultimately voted for Mamata.

    '
