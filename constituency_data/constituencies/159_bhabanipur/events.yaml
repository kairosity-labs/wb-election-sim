  headline: Mamata leaves Bhabanipur rally midway as TMC and BJP supporters clash
  summary: 'Chief Minister Mamata Banerjee was forced to leave a campaign rally in Bhabanipur
    midway

    when clashes broke out between TMC and BJP supporters, reportedly triggered by BJP workers

    disrupting the event. Mamata alleged BJP deliberately disrupted her rally; Suvendu Adhikari

