  headline: Recurring monsoon waterlogging in south Kolkata; Bhabanipur roads flood repeatedly
  summary: 'Monsoon 2022 again inundated multiple roads in and around Bhabanipur due to Kolkata''s

    aging colonial-era drainage system and unplanned construction. The issue ranked among
    the

    top voter complaints in urban south Kolkata — a direct indictment of KMC governance under

    TMC. Opposition parties highlighted KMC''s failure to upgrade drainage infrastructure

    despite repeated promises.

    '
