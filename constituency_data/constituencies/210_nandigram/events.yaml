  headline: Nandigram votes in Phase 1 (23 Apr 2026); 91.78% statewide turnout; Suvendu
    votes and campaigns
  summary: 'Nandigram went to the polls on 23 April 2026 in West Bengal''s Phase 1
    election.

    BJP''s Suvendu Adhikari voted in Nandigram and urged "peaceful polling." TMC''s

    Pabitra Kar also voted. Statewide Phase 1 turnout was 91.78%, the highest since

    Independence. Tensions were reported at certain booths but CAPF deployment limited

    violence compared to 2021. The result — to be declared 4 May 2026 — will determine

    whether Nandigram remains BJP''s fortress or TMC''s Pabitra Kar strategy of fracturing

    the 2007 veterans'' vote produces a surprise.

    '
