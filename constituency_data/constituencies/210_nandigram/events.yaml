  headline: 'Post-poll violence: BJP offices ransacked, workers attacked, families displaced
    in Nandigram'
  summary: 'In days following 2 May 2021, Nandigram saw severe post-poll violence: BJP offices

    ransacked, workers attacked, families displaced from villages. The Home Ministry

    sought a state report. BJP held nationwide dharnas on 5 May. TMC counter-alleged

    BJP provocation. For cultivator and ag_labourer households, the violence created

    weeks of acute insecurity and displacement — a wound that BJP continued to invoke

    through 2026 as evidence of TMC''s coercive political culture.

    '
