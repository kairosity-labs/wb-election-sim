- slug: lakshmir_bhandar_penetration_nandigram_2022
  date: '2022-01-01'
  temporal: episodic
  scope: AC
  intensity: 3
  headline: Lakshmir Bhandar reaches majority of Nandigram women; Rs 500–1000/month becomes
    routine transfer
  summary: 'By early 2022, Lakshmir Bhandar was well-penetrated across Nandigram''s rural

    households. The direct bank transfers created a reliable monthly income touchpoint

    that became a principal political loyalty anchor for woman voters toward TMC.

    BJP could not match the scheme''s direct-delivery credibility because it was not

    in power in West Bengal. Nandigram women discussed the payment in SHG meetings

    as a TMC governance achievement even amid broader anti-corruption anger.

    '
