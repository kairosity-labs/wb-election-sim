  headline: 'Nandigram''s 2026 campaign: Hindutva ''hub'' framing dominates, 2007 land veterans
    mobilised'
  summary: 'By 2026 Nandigram had evolved from the land-resistance epicentre of 2007 into

    what political observers labelled West Bengal''s "Hindutva ground zero." BJP''s

    campaign wove together the 2007 memory, the post-2021 Hindu consolidation, the

    RG Kar anger, the SIR Muslim disenfranchisement narrative, and the manifesto''s

    UCC/Rs 3,000 women pledge into a unified Hindu-protection frame. Suvendu''s personal

    booth machine — reinforced by CAPF deployment — provided organisational depth.

    TMC''s Pabitra Kar countered by invoking 2007 land veterans marginalised under

    BJP governance, trying to fracture the cultivator base.

    '
