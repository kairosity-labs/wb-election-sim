- slug: nandigram_farm_input_price_stress_chronic
  date_start: '2022-01-01'
  date_end: '2024-05-23'
  temporal: chronic
  scope: district
  intensity: 3
  headline: Farm input price inflation hits Nandigram cultivators; fertiliser, diesel costs
    squeeze margins
  summary: 'From 2022 onward, fertiliser prices rose sharply (following Russia-Ukraine war

    supply disruptions), diesel costs for irrigation pumps increased, and paddy

    MSP hikes lagged input cost rises. Nandigram''s paddy and vegetable cultivators

    faced margin compression. The MGNREGA wage stoppage removed a critical off-season

    income supplement. BJP blamed TMC for not securing central input subsidies; TMC

    blamed BJP for MGNREGA blockage and inadequate MSP. Both parties'' blame frames

    left cultivators with no immediate relief.

    '
