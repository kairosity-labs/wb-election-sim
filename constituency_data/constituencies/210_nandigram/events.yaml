  date: '2021-03-10'
  temporal: episodic
  scope: AC
  intensity: 4
  headline: 'Suvendu Adhikari (BJP) files nomination: sitting MLA, Adhikari dynasty, no criminal
    conviction'
  summary: 'Suvendu Adhikari, son of Kanthi MP Sisir Adhikari and sitting Nandigram MLA

    since 2016, filed as BJP candidate on 10 March 2021. Carrying no criminal

    conviction and substantial declared assets, he presented himself as the local

    son who fought the 2007 land agitation. His ground machine — Nandigram''s most

    extensive booth-level network — was fully activated. Upper caste Hindu, bhadralok,

    and cultivator households responded to his incumbency and Hindutva frame.

    '
