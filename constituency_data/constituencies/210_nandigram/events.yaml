- slug: nandigram_out_migrant_remittance_stress
  date_start: '2020-03-24'
  date_end: '2026-04-22'
  temporal: chronic
  scope: AC
  intensity: 2
  headline: 'Out-migrant household remittances from Nandigram drop: COVID → construction slowdown
    → 2026'
  summary: 'Nandigram has a significant population of out-migrant workers in construction,

    brick kilns, and seasonal agriculture across West Bengal and other states.

    COVID lockdown, post-COVID construction slump, and rising living costs at

    destination cities reduced remittances back to Nandigram households from 2020

    onward. By 2025–26, out_migrant_household families were among the most

    economically stressed in the constituency, receptive to any party promising

    local employment or MGNREGA wage restoration.

    '
