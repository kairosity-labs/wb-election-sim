- slug: nandigram_2021_result_suvendu_wins
  date: '2021-05-02'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu defeats Mamata by 1,956 votes; postal ballot swing ends 17-round
    nail-biter
  summary: 'Suvendu Adhikari (BJP, 1,10,764 votes) defeated Mamata Banerjee (TMC,
    1,08,808)

    by 1,956 votes in the most-watched constituency in India. A 4-hour server outage,

    17th-round postal ballot reversal, and 12 allegedly uncounted EVMs from Muslim-

    majority Samsabad created a disputed result. EC rejected TMC''s recount demand;

    Mamata filed an election petition in Calcutta HC. Suvendu became BJP''s LoP;

    Nandigram became BJP''s fortress in south Bengal despite TMC winning the state
    213-77.

    '
