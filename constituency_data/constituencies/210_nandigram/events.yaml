  temporal: chronic
  scope: AC
  intensity: 3
  headline: 'Post-Amphan housing grievance in Nandigram: thousands still in temporary shelter
    2+ years on'
  summary: 'Two to four years after Cyclone Amphan (May 2020), thousands of Nandigram

    households remained in temporary bamboo-and-plastic shelters awaiting permanent

    housing under Awas Yojana and state housing schemes. TMC panchayat leaders

    controlled beneficiary lists; BJP alleged partisan exclusion of BJP-affiliated

    households. The persistent housing grievance gave BJP a specific, verifiable

    material claim in both 2023 panchayat and 2024 LS campaigns, particularly among

    cultivator and ag_labourer families still displaced.

    '
