  intensity: 4
  headline: 'WB Panchayat 2023: 55 deaths statewide; Nandigram panchayat zones see TMC-BJP
    violence'
  summary: 'West Bengal''s 8 July 2023 panchayat elections produced 55 deaths statewide

    between 8 June and 16 July. In Purba Medinipur including Nandigram''s panchayat

