- slug: caa_passed_parliament_2019
  date: '2019-12-11'
  temporal: episodic
  scope: national
  intensity: 4
  headline: CAA 2019 passed; Hindu Nandigram welcomes protection frame, Muslim voters
    alarmed
  summary: 'The Citizenship Amendment Act passed on 11 December 2019. In predominantly
    Hindu

    Nandigram, upper caste Hindu and bhadralok voters broadly welcomed it as long-

    promised Hindu security. Muslim voters (~34% in Nandigram-I block) viewed it with

    alarm as discriminatory. CM Mamata Banerjee''s refusal to implement it in West
    Bengal

    won Muslim loyalty but deepened Hindu consolidation toward BJP — a polarisation
    that

    structured Nandigram''s electoral chemistry through 2026.

    '
