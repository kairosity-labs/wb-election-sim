  headline: Assam NRC final list excludes 19 lakh including Bengali Hindus; Nandigram
    cultivators anxious
  summary: 'The NRC final list left ~19.6 lakh people out of Assam, including large
    numbers

    of Bengali Hindus — contradicting BJP''s anti-Muslim framing. In Nandigram''s
    Hindu

    cultivator belt, the news raised citizenship anxiety. TMC exploited it as an

    "anti-Bengali" BJP betrayal; BJP promised CAA as the solution. The event

    inaugurated the CAA-NRC-citizenship axis that dominated Nandigram''s political

    conversation through the 2021 election.

    '
