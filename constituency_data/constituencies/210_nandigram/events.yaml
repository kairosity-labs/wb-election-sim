  headline: 'Tamluk LS 2019: BJP surges in Nandigram segment on Hindu consolidation wave'
  summary: 'BJP made significant inroads in the Tamluk Lok Sabha constituency in 2019; the

    Nandigram assembly segment recorded a substantial BJP vote-share increase driven

    by the Modi wave and Hindu consolidation narrative. Suvendu Adhikari''s personal

    influence kept TMC viable, but the swing foreshadowed his decision to defect.

    Upper caste Hindu and bhadralok voters began a durable shift toward BJP that

    would crystallise in 2021.

    '
