  headline: BJP's Abhijit Gangopadhyay wins Tamluk LS 2024 with Suvendu's machine; Nandigram
    delivers BJP lead
  summary: 'Former Calcutta HC judge Abhijit Gangopadhyay (BJP) won the Tamluk Lok Sabha

    seat on 4 June 2024, defeating TMC''s Debangshu Bhattacharya. Nandigram, with

    Suvendu Adhikari''s full ground machine mobilised, delivered a strong BJP lead.

    The result confirmed Nandigram''s fortress status for BJP heading into 2026 AE.

    Voter turnout in Tamluk was 84.79%. Suvendu''s Nandigram operation was nationally

    noted as the most effective single-constituency BJP machine in Bengal.

