- slug: nandigram_2026_lakshmir_bhandar_delivery_gap
  date_start: '2025-01-01'
  date_end: '2026-04-22'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: 'Lakshmir Bhandar delivery satisfaction in Nandigram: SIR deletions threaten continuity
    for some women'
  summary: 'By 2025–26, Lakshmir Bhandar was well-penetrated in Nandigram''s female population.

    However, the SIR voter roll deletions threatened scheme continuity for some women

    whose names were struck from registers — creating a link between voter exclusion

    and welfare benefit exclusion anxiety. In Nandigram-I block''s Muslim households,

    women feared both losing voting rights and losing direct bank-transfer access.

    BJP''s Rs 3,000/month promise was framed as a substitute that would reach women

    regardless of the TMC-state machinery, creating a competing loyalty pull.

    '
