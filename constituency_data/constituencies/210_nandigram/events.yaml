  date: '2020-03-24'
  temporal: episodic
  scope: national
  intensity: 4
  headline: 'National COVID lockdown: Nandigram''s agrarian economy suffers acute
    distress'
  summary: 'PM Modi''s 25 March 2020 nationwide lockdown halted Nandigram''s farm
    markets,

    suspended MGNREGA work, and stranded out-migrant household members in cities.

    Agricultural labourers lost daily incomes for weeks; cultivators could not

    sell perishable produce. The lockdown created the baseline economic stress

    against which all welfare scheme delivery was subsequently judged.

    '
