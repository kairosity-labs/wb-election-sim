- slug: suvendu_adhikari_joins_bjp_dec_2020
  date: '2020-12-19'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Suvendu Adhikari quits TMC, joins BJP at Amit Shah rally; Nandigram's
    MLA switches sides
  summary: 'On 19 December 2020 Suvendu Adhikari formally joined BJP at a Midnapore
    rally

    with Amit Shah. For Nandigram — where he was the sitting MLA since 2016, a 2007

    land-agitation hero, and son of Kanthi MP Sisir Adhikari — his defection rewired

    the constituency instantly. His entire booth-level machine, built over a decade

    as TMC''s transport minister, pivoted to BJP, giving the party a ground presence

    it had never achieved otherwise. TMC scrambled to rebuild from scratch.

    '
