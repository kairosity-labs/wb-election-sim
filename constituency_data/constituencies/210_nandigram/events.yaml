  intensity: 5
  headline: Mamata Banerjee announces Nandigram candidacy; Suvendu vows 50,000 vote
    margin or quit
  summary: 'At a rally in Nandigram on 18 January 2021, CM Mamata Banerjee declared
    she would

    abandon safe Bhawanipur and fight Suvendu Adhikari on his home turf. Suvendu

    immediately accepted, pledging to quit politics if he did not win by 50,000 votes.

    The announcement made Nandigram India''s most-watched constituency, converting

    every local grievance — welfare delivery, post-Amphan relief, booth violence —

    into a nationally televised proxy for the state election result.

    '
