  headline: BJP's Hindu consolidation campaign links 2007 Nandigram protest to Muslim-TMC
    narrative
  summary: 'BJP and Suvendu Adhikari''s campaign circulated a reframed 2007 narrative:

    that Muslim TMC cadres had captured panchayats after the land agitation, marginalising

    the Hindu peasants who fought and bled. The "Hindus fought, Muslims benefited"

    frame resonated particularly among Nandigram-II block''s 87% Hindu population and

    upper caste Hindu voters, giving BJP a consolidation edge among precisely the

    communities that had historically backed the land-agitation memory.

    '
