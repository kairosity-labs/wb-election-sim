- slug: mamata_court_challenge_nandigram_result
  date: '2021-05-02'
  temporal: episodic
  scope: AC
  intensity: 4
  headline: Mamata Banerjee files election petition in Calcutta HC challenging Nandigram result
  summary: 'Mamata Banerjee filed an election petition in the Calcutta High Court challenging

    the Nandigram result, alleging corrupt practices including religious polarisation,

    bribery, and counting discrepancies (12 uncounted EVMs from Samsabad, postal

    ballot irregularities). The HC directed EC to preserve all documents and videos.

    The case remained pending through 2021, keeping Nandigram''s political wound open

    and providing a legal narrative that TMC mobilised in subsequent years.

    '
