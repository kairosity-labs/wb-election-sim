  headline: Farm input price inflation and MGNREGA blockage squeeze Nandigram cultivators
    2022–26
  summary: 'From 2022 onward, fertiliser prices rose sharply, diesel costs for irrigation

    pumps increased, and paddy MSP hikes lagged input cost rises. Simultaneously,

    the MGNREGA wage blockage removed the critical off-season income supplement for

    Nandigram''s ag_labourers. Cultivators faced margin compression from both ends.

    BJP blamed TMC for not securing central input subsidies; TMC blamed BJP for

    MGNREGA blockage. Both frames left cultivators with no relief — creating a

    latent economic frustration that softened TMC''s cultivator loyalty through 2026.

    '
