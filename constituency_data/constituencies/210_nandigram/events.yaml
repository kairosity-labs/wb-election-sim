  date: '2022-06-01'
  temporal: episodic
  scope: AC
  intensity: 3
  headline: Krishak Bandhu farm support payments reach Nandigram cultivators; scheme satisfaction
    mixed
  summary: 'Krishak Bandhu farmer support payments were delivered across Purba Medinipur

    by mid-2022. In Nandigram, cultivators received the annual payments, though

    the amounts (Rs 4,000–10,000/year depending on land holding) were perceived as

    inadequate relative to input-cost inflation, farm-input price rises, and

    MGNREGA wage arrears. Satisfaction was positive for receipt but low for adequacy —

    a classic scheme delivery vs delivery satisfaction divergence feeding muted

    farmer political response.

