  temporal: chronic
  scope: AC
  intensity: 2
  headline: 'Swasthya Sathi utilisation in Nandigram: coverage high, hospital quality grievances
    persistent'
  summary: 'Swasthya Sathi health insurance penetration across Nandigram households was high

    by 2022, with most families holding cards. However, utilisation at empanelled

    hospitals exposed quality and denial-of-treatment grievances: private hospitals

    sometimes declined Swasthya Sathi patients, and government hospitals had long

    queues. For elderly Nandigram voters, the scheme''s coverage was welcomed but

    access disappointments were common talking points. BJP pointed to Ayushman Bharat

    as a superior central alternative.

    '
