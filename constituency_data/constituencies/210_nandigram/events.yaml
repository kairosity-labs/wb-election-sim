- slug: cyclone_amphan_may_2020
  date: '2020-05-20'
  temporal: episodic
  scope: state
  intensity: 5
  headline: Super Cyclone Amphan directly hits Purba Medinipur; Nandigram farmland
    and housing destroyed
  summary: 'Super Cyclone Amphan (175 km/h, landfall 20 May 2020) directly hit Purba
    Medinipur.

    In Nandigram, coastal farmlands were inundated, mud-and-thatch housing collapsed,

    and kharif crops were wiped out. Relief allocation was immediately politicised:

    TMC panchayat leaders were accused by BJP of partisan distribution. The grievance

    persisted as a live election issue through 2021 and 2023 panchayat polls, with

    thousands of families still awaiting adequate permanent housing by 2024.

    '
