    final voter mobilisation'
  summary: 'In Nandigram''s 2026 election, three types of community gatekeepers were
    decisive:

    (1) Panchayat leaders (TMC-controlled in most zones) directing Lakshmir Bhandar

    camp access and pushing TMC booth turnout; (2) SHG presidents — typically woman

    leaders with 15–20 member networks — whose daily welfare-scheme interactions

    made them credible opinion intermediaries for or against the Rs 1,500 vs Rs 3,000

    promise comparison; (3) Mosque community heads in Nandigram-I block, who used

    Friday prayers to energise both anti-SIR protest and TMC get-out-the-vote drives.

