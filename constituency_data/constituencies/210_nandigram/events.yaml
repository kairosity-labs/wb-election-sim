  date: '2021-03-10'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Mamata Banerjee (TMC) files nomination from Nandigram; sitting CM faces home test
  summary: 'Chief Minister Mamata Banerjee''s nomination filing at Haldia turned into a

    mass TMC rally. Her affidavit declared modest assets consistent with her

    "common person" political brand. Contesting on the platform of Didir Shopoth

    welfare delivery, her campaign particularly targeted woman voters through Lakshmir

    Bhandar promises and SHG networks. Muslim voters in Nandigram-I block (~34%)

    were solidly mobilised behind her. Upper caste Hindus, however, were drawn

    toward Suvendu''s Hindu-consolidation narrative.

    '
