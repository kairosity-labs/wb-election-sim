- slug: murshidabad_wshg_networks_2022
  date: '2022-03-01'
  temporal: chronic
  scope: district
  intensity: 2
  headline: Women's Self-Help Groups in Murshidabad become primary TMC welfare delivery conduit;
    Muslim women in SHGs enrol for Lakshmir Bhandar
  summary: 'Women''s Self-Help Groups (SHGs) in Murshidabad district expanded post-2021 as
    TMC

    used them as a primary conduit for Lakshmir Bhandar enrolment and welfare scheme

    awareness. For Muslim women — who often lack individual documentation access —

    SHG membership provided an institutionalised pathway to state welfare. The network

    of SHGs, closely aligned with TMC''s panchayat structures, became an important

    political mobilisation tool in Muslim-majority rural areas of the district.

