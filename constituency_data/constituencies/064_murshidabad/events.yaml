- slug: mamata_anti_caa_campaign_murshidabad_2021
  date: '2021-03-25'
  temporal: episodic
  scope: district
  intensity: 4
  headline: Mamata Banerjee holds campaign rally in Murshidabad district, pledges CAA-NRC
    will never be implemented in Bengal
  summary: 'During the 2021 assembly election campaign, Mamata Banerjee held rallies in

    Murshidabad district reiterating her pledge that CAA and NRC would not be

    implemented while she is CM. The promise was the single most galvanising message

    for the Muslim electorate. TMC also highlighted welfare schemes including Duare

    Sarkar, Swasthya Sathi health cards, and food grain entitlements under Khadya

    Sathi. Mamata''s personal credibility as protector of Muslim citizenship rights

    drove significant Congress-to-TMC vote migration in the district.

    '
