- slug: wb_2021_tmc_sweeps_district
  date: '2021-05-02'
  temporal: episodic
  scope: district
  intensity: 5
  headline: TMC sweeps 18 of 20 Murshidabad district seats on Muslim vote consolidation; Congress
    wiped out at assembly level
  summary: 'TMC won 18 of 20 seats in Murshidabad district in the 2021 AE, capturing 54% of

    district votes. Despite Adhir Ranjan''s dominance at the Lok Sabha level, Congress

    collapsed at the state assembly level, winning zero seats and polling only 14% in

    the district. The result confirmed the shift of Muslim voters from Congress to TMC,

    driven by Mamata Banerjee''s strong anti-CAA/NRC stance and the welfare promises

    including Duare Sarkar and Lakshmir Bhandar (announced post-election). BJP won

    only Murshidabad and Baharampur ACs.

    '
