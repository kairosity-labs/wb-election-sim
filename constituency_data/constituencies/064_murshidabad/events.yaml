    removed; Muslim voters disproportionately affected'
  summary: 'West Bengal''s Special Intensive Revision (SIR) of electoral rolls removed nearly

    91 lakh voters statewide; Murshidabad district recorded the highest deletions at

    4.5 lakh. In Muslim-majority constituencies of the district, approximately 90% of

