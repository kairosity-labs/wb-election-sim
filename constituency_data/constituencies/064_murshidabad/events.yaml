  headline: Murshidabad designated most sensitive district in WB AE 2026; ECI special scanner
    applied to all 20 seats
  summary: 'Election Commission designated Murshidabad as the most sensitive district for
    the

    2026 West Bengal Assembly elections, placing all 20 assembly segments under special

    security scanner. The designation followed the Waqf Act violence of April 2025,

    the Ram Navami clashes of March 2026, and the SIR voter deletion controversy.

    Mamata Banerjee held multiple rallies in the district alleging BJP was orchestrating

    communal violence to polarise voters. BJP countered with demands for stronger

    central oversight.

    '
