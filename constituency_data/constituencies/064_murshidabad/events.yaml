- slug: murshidabad_ac60_phase1_polling_2026
  date: '2026-04-23'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Murshidabad AC-60 goes to polls in Phase 1; BJP's Gouri Sankar Ghosh faces TMC's
    Shaoni Singha Roy under CAPF oversight
  summary: 'Murshidabad AC-60 voted in Phase 1 of the 2026 WB Assembly Elections on April
    23,

    with BJP''s Gouri Sankar Ghosh defending the 2021 margin of 2,491 votes against

    TMC''s Shaoni Singha Roy. The election was conducted under unprecedented CAPF security

    coverage. Key issues in the constituency included SIR voter roll deletions (with

    Murshidabad topping the state in deletions), the Waqf Act violence, the Ram Navami

    clashes, and the welfare scheme continuation question. West Bengal recorded a

    highest-ever 91.58% voter turnout statewide in Phase 1.

    '
