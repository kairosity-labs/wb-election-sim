  headline: 'Super Cyclone Amphan: direct hit on Sandeshkhali; embankments breach,
    fish stocks wiped'
  summary: 'Amphan directly struck the Sandeshkhali-Minakhan belt on May 20, 2020.

    Embankments on the Bidhyadhari river suffered three breaches; the entire

    fish stock of Minakhan was destroyed. 5,500 homes damaged, 420 sq km

    inundated across North 24 Parganas; 38 NDRF teams deployed in Sandeshkhali

    and Hasnabad. Paddy fields remained under saline water for months, cancelling

    the kharif season.

    '
