- slug: tiger_attacks_chronic_sundarban_2022
  date: '2022-06-01'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: Tiger attacks on Sundarban fishermen average 2/month; forest ban limits legal
    livelihood
  summary: 'Human-tiger conflict in the Sundarbans runs at approximately two incidents

    per month, with fishermen the primary victims. Sandeshkhali and adjacent

    blocks sit on the forest fringe; illegal entry into the tiger reserve is

    driven by poverty after Amphan and Yaas destroyed legal fishing grounds.

    High Court restrictions on boat licenses further restrict community access,

    pushing fishermen toward riskier unlicensed trips into the forest.

    '
