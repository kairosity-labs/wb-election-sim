- slug: shg_women_rainwater_sundarban
  date: '2023-03-01'
  temporal: chronic
  scope: AC
  intensity: 2
  headline: Women SHGs in Sandeshkhali implement rainwater harvesting to counter post-cyclone
    salinity
  summary: 'Women''s self-help groups (SHGs) in Sandeshkhali and surrounding Sundarban

    blocks began implementing rainwater harvesting systems to counter the

    persistent salinity of freshwater ponds after Amphan and Yaas. SHGs also

    planted mangroves along embankments. Sandeshkhali Maa Saroda Women & Rural

    Welfare Society, active since 2009, continued providing skill training in

    fish farming, crab farming, and food processing to SHG members.

    '
