  date: '2024-02-08'
  temporal: episodic
  scope: AC
  intensity: 5
  headline: Hundreds of Sandeshkhali women protest with brooms against TMC land grab and sexual
    assault
  summary: 'On February 8, 2024, hundreds of women — Dalit, Adivasi, and tribal — took

    to the streets of Sandeshkhali with brooms, sticks and farming tools.

    They demanded the arrest of Sheikh Shahjahan, Shiba Prasad Hazra and Uttam

    Sardar, alleging land grabbing (paddy fields converted to fish ponds) and

    sexual harassment. Rekha Patra emerged as a protest face. The Calcutta High

    Court took suo motu cognizance on February 13, 2024.

    '
