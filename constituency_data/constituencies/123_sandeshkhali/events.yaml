  date: '2021-05-26'
  temporal: episodic
  scope: district
  intensity: 5
  headline: Cyclone Yaas floods Sandeshkhali; embankments washed away, saline intrusion
    worsens
  summary: 'Cyclone Yaas (Very Severe) struck the Sundarban coast on May 26, 2021,

    a month after the WB election result. Sandeshkhali block saw embankment

    washouts and village-level flooding from saline surge. Among the six most

    affected North 24 Parganas blocks. West Bengal lost an estimated Rs 21,000

    crore statewide; the Sundarban''s 53 of 54 freshwater ponds were contaminated

    with saline seawater. The back-to-back Amphan-Yaas devastation deepened

    Sundarban communities'' existential climate vulnerability.

    '
