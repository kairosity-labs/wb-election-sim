  intensity: 5
  headline: COVID lockdown strands Sandeshkhali out-migrants; 2.5-3 lakh reverse-migrate
    to Sundarban
  summary: 'The nationwide COVID lockdown forced an estimated 2.5-3 lakh out-migrants

    to return to the Sundarban fringe, crowding into Sandeshkhali''s fragile

    island economy. Fishing was curtailed; MGNREGA provided partial relief.

    Returning migrants were stigmatised as virus carriers. The combined COVID-

    cyclone shock of 2020 was the deepest livelihood disruption for Sandeshkhali

    households in a generation.

    '
