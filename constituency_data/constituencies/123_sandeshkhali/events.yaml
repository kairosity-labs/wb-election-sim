- slug: covid_reverse_migration_sundarban_tiger
  date: '2020-05-15'
  temporal: chronic
  scope: district
  intensity: 3
  headline: COVID-forced reverse migration into Sundarban spikes human-tiger conflict
  summary: 'As 2.5-3 lakh out-migrants returned to the Sundarban fringe including

    Sandeshkhali, poverty drove many into restricted forest zones for fishing

    and honey collection, elevating tiger attacks. Research documented an

    unprecedented increase in fatal human-tiger encounters after the lockdown.

    Fishing community households bore the worst of the combined COVID-cyclone

    economic shock, with no government safety net reaching deep-forest workers.

    '
