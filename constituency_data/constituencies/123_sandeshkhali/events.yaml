  intensity: 3
  headline: Sundarban tiger attacks average 2/month; COVID-driven reverse migration
    worsened conflict
  summary: 'Human-tiger conflict in the Sundarbans runs at an average of two incidents

    per month, with fishermen as primary victims. Sandeshkhali''s fringe location

    means households routinely send members into restricted zones for honey, fish

    and firewood. After Amphan and COVID reduced livelihoods, forest dependency

    increased. High Court restrictions on Boat License Certificates further squeezed

    legal access, trapping the fishing community between starvation and tiger risk.

    '
