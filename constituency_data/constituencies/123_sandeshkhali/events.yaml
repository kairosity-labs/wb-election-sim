  headline: CAA passed; communal polarisation sharpens in Sandeshkhali between Hindu
    and Muslim voters
  summary: 'The Citizenship Amendment Act passed on December 11, 2019 deepened

    communal polarisation in Sandeshkhali. Muslim voters (35-40% of electorate)

    viewed CAA combined with NRC as an existential threat to their citizenship;

    upper-caste Hindu and Namasudra voters saw it as belated relief for persecuted

    Bangladeshi Hindus. Mamata''s refusal to implement CAA consolidated Muslim

    support for TMC into an unbreakable bloc.

    '
