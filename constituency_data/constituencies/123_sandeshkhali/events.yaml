  intensity: 5
  headline: ED team attacked by Shahjahan's supporters in Sandeshkhali; three officers injured,
    Shahjahan flees
  summary: 'On January 5, 2024, an Enforcement Directorate team arrived in Sandeshkhali

    to question Sheikh Shahjahan in connection with the Jyotipriya Mallick ration

    scam. Shahjahan''s supporters assaulted the officers, injuring three, destroyed

