- slug: sitalkuchi_cisf_shooting_apr10_2021
  date: '2021-04-10'
  temporal: episodic
  scope: district
  intensity: 5
  headline: CISF kills 4 voters at Sitalkuchi Booth 126 on Phase 4 day — shadow over entire
    Cooch Behar district including AC-1
  summary: 'CISF jawans at PS 126, Sitalkuchi AC (AC-9, same district) fired 6-8 rounds killing

    four persons (Nur Alam Mian, Maniruzzaman Mian, Samiul Haq, Hamidul Mian); first-

    time voter Anand Burman shot at another booth. EC suspended polling at PS 126 and

    banned politicians from Cooch Behar for 72 hours. AC-1 booths also experienced

    elevated fear and depressed Muslim turnout on the same Phase 4 day. TMC framed it

    as BJP-CISF murder; BJP claimed self-defence against booth capturers. This became

    Cooch Behar''s defining political wound for the following five years.

    '
