- slug: tobacco_jute_farm_income_stress_chronic
  date_start: '2020-01-01'
  date_end: '2024-05-07'
  temporal: chronic
  scope: AC
  intensity: 3
  headline: 'Chronic farm stress: tobacco MSP stagnation and jute mill closures depress Cooch
    Behar Uttar rural incomes'
  summary: 'Cooch Behar Uttar cultivates tobacco (winter), paddy and jute (kharif). Post-2020,

    tobacco prices at mandis stagnated while input costs (fertiliser, pesticide) rose

    20-30%. Several jute mills in North Bengal reduced operations or closed. Combined

    with MGNREGA block from 2022 and annual flood damage, per-household farm income

    in Rajbanshi cultivator families fell over the 2020-2024 period. This was the

    durable economic grievance beneath partisan swings.

    '
