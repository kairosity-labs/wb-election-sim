- slug: cooch_behar_flood_chronic_vulnerability
  date_start: '2019-01-01'
  date_end: '2026-04-26'
  temporal: chronic
  scope: district
  intensity: 3
  headline: 'Chronic Torsa-Kaljani-Teesta flood vulnerability: annual crop damage, silt burial,
    inadequate state response'
  summary: 'Cooch Behar faces annual flooding from the Torsa, Kaljani and Teesta rivers (Himalayan

    glacier melt + monsoon). Each year, thousands of acres of aman paddy and jute are

    damaged or destroyed; farmers lose 20-40% of annual income in bad years. State flood

    relief is slow and is perceived as politically biased. Neither TMC nor BJP has

    delivered comprehensive embankment repair. The chronic vulnerability shapes a

    durable economic grievance in all Cooch Behar rural blocks including AC-1.

    '
