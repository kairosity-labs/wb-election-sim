  headline: 'D-voter and Foreigners Tribunal: Cooch Behar Rajbanshis face chronic citizenship
    anxiety at the border'
  summary: 'WB voter rolls in Cooch Behar carry "D" (declared foreign) markings against

    contested entries, disenfranchising affected voters. Assam Foreigners Tribunal

    notices to WB Rajbanshi residents (e.g., Uttam Kumar Brajabasi, Dinhata Block)

    created fear that the citizenship dragnet could reach any family. The D-voter

    problem is distinct from CAA — it applies to long-settled Rajbanshi Hindus, not

    just Muslim immigrants. Mamata raised it as BJP''s citizenship harassment of Bengali

    Hindus. The anxiety remained unresolved through the 2024 LS election.

    '
