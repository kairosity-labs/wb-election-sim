  intensity: 3
  headline: 'Rajbanshi language 8th Schedule demand: BJP 2026 promise; GCPA community gatekeeper
    splits between TMC-BJP factions'
  summary: 'GCPA (est. 1998, ~33 lakh Rajbanshi population in Bengal) has consistently demanded

    Rajbanshi language recognition in the Constitution''s Eighth Schedule and a separate

    Cooch Behar state. BJP''s 2026 Sankalp Patra explicitly promised Rajbanshi inclusion

    in the 8th Schedule. TMC''s GCPA faction (Bangshi Badan Barman, holding state govt

    positions) offered parity in scheme delivery. BJP''s Anant Maharaj (Rajya Sabha)

    leads the other faction. The gatekeeper split creates competing community signals

    in each AC-1 Rajbanshi para — whose endorsement matters more at the booth level.

    '
