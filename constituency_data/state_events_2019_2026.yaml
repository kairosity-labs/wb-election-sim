  intensity: 5
  headline: Assam NRC excludes 19 lakh; tea-garden tribal workers in Dooars face acute documentation
    anxiety
  summary: 'The Assam NRC final list triggered deep fear among tea-garden workers in

    Kalchini whose families migrated from Jharkhand and Odisha generations

    ago. Many second-generation workers lack formal birth records or land

    documents. NRC anxiety was compounded by garden managements withholding

    some employment records needed for identity proof, making this a visceral

    citizenship-threat narrative in the Dooars belt. Mamata Banerjee

    reassured workers that WB had regularised settlements and would not

    implement NRC.

    '
