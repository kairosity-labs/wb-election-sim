- slug: nandigram_2007_land_firing_chronic
  date_start: '2007-01-02'
  date_end: '2026-04-26'
  temporal: chronic
  scope: national
  intensity: 5
  headline: 'Nandigram 2007: CPM police firing kills 14 peasants; land-acquisition trauma
    frames all politics'
  summary: 'On 14 March 2007 police opened fire on farmers resisting forced acquisition of

    10,000 acres for a Salim Group chemical SEZ, killing at least 14. The Bhumi

    Uchhed Pratirodh Committee had blockaded Nandigram since January 2007. The

    massacre ended 34 years of Left Front rule and embedded a permanent anti-land-

    acquisition reflex in cultivator and ag_labourer memory. By 2026, it persists

    as a founding mythological event invoked by all parties: TMC claims credit for

    resisting CPM; BJP''s Suvendu claims personal participation; CPM cannot contest

    its own culpability.

    '
