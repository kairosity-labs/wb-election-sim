- slug: nrc_assam_final_list_2019
  date: '2019-08-31'
  temporal: episodic
  scope: national
  intensity: 3
  headline: Assam NRC final list excludes 19 lakh; tribal D-voter anxiety spreads to Jhargram
  summary: 'The Assam NRC result caused anxiety across West Bengal, including in Jhargram''s

    tribal belt where many Santali and Munda households lack formal land documents.

    Unlike the Matua belt, the fear was not refugee status but D-voter tagging — tribal

    households with forest-based livelihoods and no formal documentation worried about

    citizenship challenges. BJP leveraged this by contrasting tribal Hindus'' citizen

    status with alleged Muslim infiltrators, while TMC argued tribals needed state

    protection against a BJP-led NRC.

    '
